<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light only">
<meta name="theme-color" content="#ffffff" id="meta-theme-color">
<meta name="apple-mobile-web-app-status-bar-style" content="default" id="meta-apple-status">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<title>Starship Recruiter</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --dither: conic-gradient(#000 0.25turn, transparent 0.25turn 0.5turn, #000 0.5turn 0.75turn, transparent 0.75turn);
  color-scheme: light only;
}

html, body {
  color-scheme: light only;
}

@media (prefers-color-scheme: dark) {
  html, body { background-color: #fff !important; color: #000 !important; }
  input, button, select, textarea { background-color: #fff !important; color: #000 !important; }
}

body {
  background-color: #fff;
  color: #000;
  background-image: none;
  font-family: "VT323", monospace;
  user-select: none;
  -webkit-user-select: none;
  overflow: hidden;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  color: #000;
}

/* ── TOP BAR ── */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: #fff;
  flex-shrink: 0;
  font-size: 20px;
  text-transform: uppercase;
  border-bottom: 2px solid #000;
  z-index: 250;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  transform: translateY(-110%);
  transition: transform 0.35s cubic-bezier(0.2, 0, 0.3, 1);
}
.top-bar.slid-in { transform: translateY(0); }
.top-title { font-weight: 700; }
.top-right { display: flex; gap: 16px; align-items: center; }
.top-cr { font-weight: 700; }

.debug-btn {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  font-size: 16px;
  color: #fff;
  opacity: 1;
}
.debug-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
}
.debug-panel {
  text-align: center;
  padding: 24px;
}
.debug-days {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 280px;
}
.debug-day-btn {
  width: 44px;
  height: 36px;
  border: 2px solid #000;
  background: #fff;
  font-family: "VT323", monospace;
  font-size: 18px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.debug-day-btn:active { background: #000; color: #fff; }

/* ── MAIN SCROLL AREA ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px 16px;
  padding-top: calc(12px + 44px);
  padding-bottom: calc(16px + 120px);
}

/* ── SECTION TITLE ROW ── */
.section-title-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.section-title {
  font-size: 20px;
  text-transform: uppercase;
  font-weight: bold;
}
.section-payroll {
  font-size: 20px;
  font-weight: 400;
}

/* ── MISSION PANEL ── */
.mission-card {
  position: relative;
  padding: 12px;
  margin-bottom: 16px;
  background: #fff;
  border: 2px solid #000;
}
.mission-type {
  background: #000; color: #fff; padding: 3px 8px; display: inline-block;
  font-size: 16px; text-transform: uppercase; margin-bottom: 8px;
}
.mission-title { font-size: 22px; font-weight: bold; line-height: 1.1; margin-bottom: 8px; }
.mission-detail { font-size: 18px; margin-top: 6px; }
.mission-req-tag {
  background: #000; color: #fff; padding: 3px 6px; display: inline-block;
  font-size: 16px; text-transform: uppercase; margin-right: 4px; margin-bottom: 4px;
}

.ship-preview {
  background: #000;
  width: 100%;
  height: 130px;
  margin-bottom: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  clip-path: polygon(
    0 4px, 2px 4px, 2px 2px, 4px 2px, 4px 0,
    calc(100% - 4px) 0, calc(100% - 4px) 2px, calc(100% - 2px) 2px, calc(100% - 2px) 4px, 100% 4px,
    100% calc(100% - 4px), calc(100% - 2px) calc(100% - 4px), calc(100% - 2px) calc(100% - 2px), calc(100% - 4px) calc(100% - 2px), calc(100% - 4px) 100%,
    4px 100%, 4px calc(100% - 2px), 2px calc(100% - 2px), 2px calc(100% - 4px), 0 calc(100% - 4px)
  );
}
.ship-preview img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
}

/* Manual entries */
.manual-entry {
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 2px dotted #000;
}
.manual-name {
  font-size: 20px;
  font-weight: bold;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.manual-icon {
  width: 24px; height: 24px;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.manual-icon img { width: 18px; height: 18px; image-rendering: pixelated; }
.manual-desc { font-size: 17px; line-height: 1.1; margin-top: 2px; }
.manual-hates { font-size: 17px; margin-top: 2px; }

/* ── CARDS GRID ── */
.cards-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ── CARD ── */
.mc-wrap {
  position: relative;
  aspect-ratio: 168 / 210;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: transform 0.15s ease;
}
.mc-wrap:active { transform: scale(0.96); }
.mc-wrap.bounce { animation: cardBounce 0.2s ease; }
@keyframes cardBounce {
  0% { transform: scale(1); }
  40% { transform: scale(0.95); }
  100% { transform: scale(1); }
}

.mc-border {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 3;
}

.mc-inner {
  position: absolute;
  top: 2px; left: 2px; right: 2px; bottom: 2px;
  background: #fff;
  padding: 6px 8px 5px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
}

/* Selected state: dither overlay — card stays in pool */
.mc-dither {
  position: absolute;
  top: 2px; left: 2px; right: 2px; bottom: 2px;
  background-image: var(--dither);
  background-size: 2px 2px;
  z-index: 4;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.05s;
}
.mc-wrap.selected .mc-dither { opacity: 1; }

.mc-hired {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 5;
  pointer-events: none;
}
.mc-hired span {
  font-family: 'Press Start 2P', cursive;
  font-size: 16px;
  color: #fff;
  text-transform: uppercase;
}
.mc-wrap.selected .mc-hired { display: flex; }

.mc-cost-float {
  position: absolute;
  left: 0; right: 0;
  top: 35%;
  text-align: center;
  font-family: 'VT323', monospace;
  font-size: 20px;
  color: #fff;
  z-index: 6;
  pointer-events: none;
  animation: costFloat 0.6s ease-out forwards;
}
@keyframes costFloat {
  0% { opacity: 1; transform: translateY(0); }
  70% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-40px); }
}

.mc-head { display: flex; justify-content: space-between; align-items: center; }
.mc-name { font-size: 17px; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.mc-tag {
  position: relative;
  display: inline-flex;
  align-items: center;
  padding: 3px 6px;
  background: transparent;
  line-height: 1;
  min-width: 0;
  flex-shrink: 0;
}
.mc-tag-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: visible;
}
.mc-tag-text { font-size: 14px; color: #fff; line-height: 1; text-transform: uppercase; }

.mc-portrait { width: 100%; height: 108px; overflow: hidden; flex-shrink: 0; }
.mc-portrait img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; pointer-events: none; }

.mc-skills { font-size: 15px; display: flex; justify-content: space-between; width: 100%; }
.mc-skills .hi-stat { font-weight: bold; text-decoration: underline; }
.mc-exp { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.mc-div { height: 2px; border: none; background-image: linear-gradient(to right, #000 2px, transparent 2px); background-size: 4px 2px; background-repeat: repeat-x; flex-shrink: 0; margin-top: auto; }

.mc-foot { display: flex; justify-content: space-between; align-items: center; gap: 4px; }

.mc-hate-row { display: flex; align-items: center; gap: 3px; flex: 1; min-width: 0; }
.mc-hate-label { font-size: 15px; line-height: 1; white-space: nowrap; flex-shrink: 0; }
.mc-hate-bar-track {
  width: 30px; height: 8px;
  position: relative; flex-shrink: 0;
  border: 2px solid #000; overflow: hidden;
}
.mc-hate-bar-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  background-image: var(--dither);
  background-size: 2px 2px;
}
.mc-hate-pct { font-size: 15px; line-height: 1; white-space: nowrap; flex-shrink: 0; }
.mc-hate-pct.high { font-weight: 700; }

.mc-salary { font-size: 15px; font-weight: 700; flex-shrink: 0; }

/* ── MISSION FLAT ROWS ── */
.mission-flat-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 18px;
  font-family: "VT323", monospace;
  text-transform: uppercase;
  padding: 3px 0;
  border-bottom: 1px dashed #ccc;
  line-height: 1;
}
.mission-flat-row:last-of-type { border-bottom: none; }
.mission-flat-label { color: #666; }
.mission-flat-value { font-weight: 700; text-align: right; }

/* ── SLOT INFO ROW ── */
.slot-info-row {
  display: flex;
  align-items: center;
  width: 100%;
  font-size: 17px;
  font-family: "VT323", monospace;
  text-transform: uppercase;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
}
.slot-info-row .stat-val {
  font-size: 17px;
  font-weight: 700;
}
.slot-info-row .stat-val.met {
  background: #000;
  color: #fff;
  padding: 0 3px;
}

/* ── MISSION PROGRESS BAR ── */
.mission-progress-track {
  width: 100%;
  height: 8px;
  border: 2px solid #000;
  background: #fff;
  position: relative;
  overflow: hidden;
}
.mission-progress-fill {
  position: absolute;
  inset: 0;
  right: auto;
  background-image: var(--dither);
  background-size: 2px 2px;
  transition: width 0.2s ease;
}

/* ── BOTTOM BAR (compact — no crew count) ── */
.bottom-bar {
  background: #fff;
  padding: 6px 16px 12px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  border-top: 2px solid #000;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 250;
  transform: translateY(110%);
  transition: transform 0.35s cubic-bezier(0.2, 0, 0.3, 1);
}
.bottom-bar.slid-in { transform: translateY(0); }

/* ── BUTTON ROW ── */
.btn-row {
  display: flex;
  gap: 8px;
  align-items: center;
  width: calc(100% - 0px);
  align-self: stretch;
}
.btn-row .launch-btn {
  margin-left: auto;
}

/* ── ICON BUTTONS (mission / manual) with pixel staircase corners ── */
.icon-btn {
  width: 48px;
  height: 40px;
  flex-shrink: 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  background: #fff;
  border: none;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.icon-btn-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.icon-btn img {
  width: 36px;
  height: 36px;
  image-rendering: pixelated;
  pointer-events: none;
  position: relative;
  z-index: 1;
}
.icon-btn.active .icon-btn-bg polygon { fill: #000; stroke: #000; }
.icon-btn.bounce { animation: btnBounce 0.2s ease; }
@keyframes btnBounce {
  0% { transform: scale(1); }
  40% { transform: scale(0.9); }
  100% { transform: scale(1); }
}

/* ── DRAWER OVERLAY ── */
.drawer-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, #999 1px, transparent 1px);
  background-size: 4px 4px;
  background-color: rgba(255,255,255,0.7);
  z-index: 55;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.drawer-overlay.visible { display: block; }

/* ── BOTTOM BAR — expandable ── */
.bottom-bar {
  background: #fff;
  padding: 8px 16px 14px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  border-top: 2px solid #000;
  z-index: 250;
}

/* When expanded: fixed to bottom, animates max-height */
.bottom-bar.expanded {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  max-height: 85vh;
  transition: max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1);
  overflow: hidden;
  align-items: stretch;
}
.bottom-bar.dragging {
  transition: none;
}

.bottom-bar.expanded .slot-info-row { display: none !important; }
.bottom-bar.expanded .mission-progress-track { display: none !important; }

/* Handle — only visible when expanded */
.bar-handle {
  display: none;
  width: 100%;
  padding: 8px 0 4px;
  justify-content: center;
  align-items: center;
  flex-shrink: 0;
  cursor: grab;
  touch-action: none;
}
.bottom-bar.expanded .bar-handle { display: flex; }
.bar-handle-line {
  width: 40px;
  height: 2px;
  background: #000;
}

/* Expandable content area */
.bar-content {
  display: none;
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 4px 10px 8px;
  min-height: 0;
}
.bottom-bar.expanded .bar-content { display: block; }

/* Slots row — hidden when drawer expanded */
.bottom-bar.expanded .slots-row { display: none !important; }
.bottom-bar.expanded .launch-warning { display: none !important; }

/* ── SLOTS ROW ── */
.slots-row { display: flex; gap: 8px; flex-shrink: 0; align-items: center; justify-content: flex-start; overflow-x: auto; -webkit-overflow-scrolling: touch; touch-action: pan-x; padding-bottom: 2px; width: calc(100% + 16px); margin-right: -16px; scrollbar-width: none; }
.slots-row::-webkit-scrollbar { display: none; }

.slot {
  width: 40px;
  height: 40px;
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: pan-x;
  flex-shrink: 0;
  background-image:
    linear-gradient(to right, #000 50%, transparent 50%),
    linear-gradient(to bottom, #000 50%, transparent 50%),
    linear-gradient(to right, #000 50%, transparent 50%),
    linear-gradient(to bottom, #000 50%, transparent 50%);
  background-size: 4px 2px, 2px 4px, 4px 2px, 2px 4px;
  background-position: top, right, bottom, left;
  background-repeat: repeat-x, repeat-y, repeat-x, repeat-y;
  transition: background-color 0.15s;
}
.slot.filled {
  background-image: none;
  background-color: transparent;
}
.slot-fill-bg { display: none; }
.slot.filled .slot-fill-bg { display: block; }

/* +N overflow indicator */
/* ── LAUNCH BUTTON ── */
.launch-btn {
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  background: none;
  border: none;
  padding: 0;
  font-family: "VT323", monospace;
  height: 40px;
  flex-shrink: 0;
  touch-action: manipulation;
  margin: 0 4px;
  clip-path: polygon(
    0 4px, 2px 4px, 2px 2px, 4px 2px, 4px 0,
    calc(100% - 4px) 0, calc(100% - 4px) 2px, calc(100% - 2px) 2px, calc(100% - 2px) 4px, 100% 4px,
    100% calc(100% - 4px), calc(100% - 2px) calc(100% - 4px), calc(100% - 2px) calc(100% - 2px), calc(100% - 4px) calc(100% - 2px), calc(100% - 4px) 100%,
    4px 100%, 4px calc(100% - 2px), 2px calc(100% - 2px), 2px calc(100% - 4px), 0 calc(100% - 4px)
  );
}
.launch-btn-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.launch-btn-text {
  position: relative;
  z-index: 1;
  color: #fff;
  font-size: 20px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: "VT323", monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 16px;
  height: 100%;
}
.launch-btn:active .launch-btn-bg polygon { fill: #333; }
.launch-btn.bounce { animation: btnBounce 0.2s ease; }
.launch-btn.disabled {
  pointer-events: none;
  clip-path: none;
}
.launch-btn.disabled .launch-btn-bg { display: none; }
.launch-btn.disabled .launch-btn-text {
  color: #000;
  background-image:
    linear-gradient(to right, #000 50%, transparent 50%),
    linear-gradient(to bottom, #000 50%, transparent 50%),
    linear-gradient(to right, #000 50%, transparent 50%),
    linear-gradient(to bottom, #000 50%, transparent 50%);
  background-size: 4px 2px, 2px 4px, 4px 2px, 2px 4px;
  background-position: top, right, bottom, left;
  background-repeat: repeat-x, repeat-y, repeat-x, repeat-y;
}

.launch-warning {
  display: none;
  font-size: 16px;
  text-align: center;
  font-weight: bold;
}

/* ── SPLASH SCREEN ── */
.screen {
  position: fixed;
  inset: 0 0 4px 0;
  z-index: 300;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.screen.hidden { display: none; }
#screen-pre     { z-index: 303; }
#screen-splash  { z-index: 302; }
#screen-welcome { z-index: 301; }
#screen-rules   { z-index: 300; }

/* ── PRE-PAGE ── */
#screen-pre {
  background: #000;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.pre-icon {
  width: 140px;
  height: 140px;
  image-rendering: pixelated;
  display: block;
}
.pre-tap-text {
  margin-top: 60px;
  color: #fff;
  font-family: "VT323", monospace;
  font-size: 18px;
  text-transform: uppercase;
  text-align: center;
}

/* ── LANGUAGE SELECTOR (Page 0) ── */
.pre-lang-title {
  color: #fff;
  font-family: "VT323", monospace;
  font-size: 22px;
  text-transform: uppercase;
  text-align: center;
  margin-top: 32px;
  letter-spacing: 1px;
}
.pre-lang-options {
  display: flex;
  flex-direction: row;
  gap: 20px;
  margin-top: 20px;
  align-items: center;
}
.pre-lang-option {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.pre-lang-option input[type="radio"] {
  display: none;
}
.pre-radio-box {
  width: 16px;
  height: 16px;
  border: 2px solid #fff;
  background: transparent;
  flex-shrink: 0;
  position: relative;
  image-rendering: pixelated;
}
.pre-radio-box::after {
  content: '';
  display: none;
  position: absolute;
  inset: 3px;
  background: #fff;
}
.pre-lang-option input[type="radio"]:checked + .pre-radio-box::after {
  display: block;
}
.pre-lang-label {
  color: #fff;
  font-family: "VT323", monospace;
  font-size: 20px;
  text-transform: uppercase;
}
.pre-continue-row {
  position: absolute;
  bottom: 32px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
}

#screen-splash {
  background: #000;
}
.splash-top {
  position: absolute;
  inset: 0;
  z-index: 0;
}
.splash-top img.splash-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
  display: block;
}
.splash-cta {
  position: absolute;
  bottom: 32px;
  left: 0;
  right: 0;
  z-index: 1;
  display: flex;
  justify-content: center;
  width: 100%;
}

/* Inverted launch button (white bg, black text → black bg, white text inverted) */
.launch-btn-inverted {
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  background: none;
  border: none;
  padding: 0;
  font-family: "VT323", monospace;
  height: 40px;
  flex-shrink: 0;
  touch-action: manipulation;
  clip-path: polygon(
    0 4px, 2px 4px, 2px 2px, 4px 2px, 4px 0,
    calc(100% - 4px) 0, calc(100% - 4px) 2px, calc(100% - 2px) 2px, calc(100% - 2px) 4px, 100% 4px,

function t(key) { return LANG[currentLang][key] || LANG['en'][key] || key; }
function speciesName(raceKey) { return (LANG[currentLang].species || {})[raceKey] || raceKey; }
function roleName(role) { return (LANG[currentLang].roles || {})[role] || role; }
function statLabel(s) { return t(s); }
function missionTitle(enTitle) { return (LANG[currentLang].missionTitles || {})[enTitle] || enTitle; }
function missionTypeName(typeId) { return (LANG[currentLang].missionTypes || {})[typeId] || typeId; }

function selectLang(lang) {
  currentLang = lang;
  const L = LANG[lang];
  document.getElementById('pre-lang-title').innerText = L.selectLang;
  document.getElementById('btn-pre-continue-text').innerText = L.continue;
}


let activeDrawer = null; // 'mission' | 'manual' | null
let collapsedHeight = 0;

function toggleDrawer(type) {
  // Bounce the tapped button
  const btnId = type === 'mission' ? 'btn-mission' : 'btn-manual';
  const btn = document.getElementById(btnId);
  if (btn) { btn.classList.remove('bounce'); requestAnimationFrame(() => btn.classList.add('bounce')); }

  if (activeDrawer === type) {
    closeDrawer();
    return;
  }
  openDrawer(type);
}

function openDrawer(type) {
  const bar = document.getElementById('bottom-bar');
  const overlay = document.getElementById('drawer-overlay');
  const content = document.getElementById('bar-content');

  // If switching between panels while already open
  if (activeDrawer && activeDrawer !== type) {
    content.innerHTML = type === 'mission' ? getMissionHTML() : getManualHTML();
    activeDrawer = type;
    updateIconButtons();
    return;
  }

  activeDrawer = type;

  // Remember collapsed height before expanding
  collapsedHeight = bar.offsetHeight;

  // Populate content
  content.innerHTML = type === 'mission' ? getMissionHTML() : getManualHTML();

  // Update icons
  updateIconButtons();

  // Set initial max-height to collapsed size, then expand
  bar.style.maxHeight = collapsedHeight + 'px';
  bar.classList.add('expanded');
  overlay.classList.add('visible');

  // Next frame: animate to full content height
  requestAnimationFrame(() => {
    bar.style.transition = 'max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1)';
    bar.style.maxHeight = '85vh';
  });
}

function closeDrawer() {
  const bar = document.getElementById('bottom-bar');
  const overlay = document.getElementById('drawer-overlay');

  // If closing during intro, exit intro mode too
  bar.classList.remove('intro-mode');

  // Animate back to collapsed height
  bar.style.transition = 'max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1)';
  bar.style.maxHeight = collapsedHeight + 'px';
  overlay.classList.remove('visible');

  activeDrawer = null;
  updateIconButtons();

  // After animation, remove expanded state
  setTimeout(() => {
    bar.classList.remove('expanded');
    bar.style.maxHeight = '';
    bar.style.transition = '';
    renderSlots();
    updateLaunchState();
  }, 210);
}

function updateIconButtons() {
  const mBtn = document.getElementById('btn-mission');
  const mImg = document.getElementById('icon-mission');
  const aBtn = document.getElementById('btn-manual');
  const aImg = document.getElementById('icon-manual');

  const mActive = activeDrawer === 'mission';
  const aActive = activeDrawer === 'manual';

  if (mBtn) { mBtn.classList.toggle('active', mActive); mImg.src = mActive ? 'images/mission_selected.png' : 'images/mission_default.png'; }
  if (aBtn) { aBtn.classList.toggle('active', aActive); aImg.src = aActive ? 'images/manual_selected.png' : 'images/manual_default.png'; }
}

function getMissionHTML() {
  const m = state.mission;
  const crew = state.roster.filter(a => a !== null).length;
  const reqStr = m.reqs.map(r => `${t(r)} ${m.targets[r]}`).join(', ');
  const shipSrc = `images/ships_${(state.ship.base || state.ship.name).toLowerCase().replace(/\s+/g, '_')}.png`;
  const rawTitle = m.title.charAt(0).toUpperCase() + m.title.slice(1).toLowerCase();
  const mType = missionTypeName(m.type);
  const title = `${mType}: ${missionTitle(rawTitle)}`;
  return `
    <div class="section-title" style="margin-bottom:10px;">${t('missionIntel').toUpperCase()}</div>
    <div class="mission-title" style="font-size:20px; font-family:'VT323',monospace; font-weight:700; margin-bottom:10px; line-height:1.1;">${title}</div>
    <div class="mission-flat-row"><span class="mission-flat-label">${t('requirements')}</span><span class="mission-flat-value">${reqStr}</span></div>
    <div class="mission-flat-row"><span class="mission-flat-label">${t('minSuccess')}</span><span class="mission-flat-value">${m.minReq}%</span></div>
    <div class="mission-flat-row"><span class="mission-flat-label">${t('minCrew')}</span><span class="mission-flat-value">${state.ship.min}</span></div>
    <div class="mission-flat-row"><span class="mission-flat-label">${t('maxCrew')}</span><span class="mission-flat-value">${state.ship.max}</span></div>
    <div class="mission-flat-row"><span class="mission-flat-label">${t('reward')}</span><span class="mission-flat-value">${m.reward} cr</span></div>
    <div class="section-title" style="margin-top:16px; margin-bottom:10px;">${t('yourShip').toUpperCase()}</div>
    <div class="ship-preview"><img src="${shipSrc}" alt="Ship" style="max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated;" onerror="this.style.display='none'"></div>
    <div style="font-size:20px; margin-top:8px;">${state.ship.name}</div>
  `;
}

function getUnlockedSpeciesForDay(day) {
  const allSpecies = Object.keys(RACES);
  const count = Math.min(6 + Math.floor(day / 2), allSpecies.length);
  return allSpecies.slice(0, count);
}

function getManualHTML() {
  let html = `<div class="section-title" style="margin-bottom:10px;">${t('xenoManual').toUpperCase()}</div>`;
  const unlockedSpecies = getUnlockedSpeciesForDay(state.day);
  const sorted = [...unlockedSpecies].sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
  sorted.forEach(rKey => {
    const rd = RACES[rKey];
    const hateNames = rd.hates.map(h => speciesName(h)).join(', ');
    html += `
      <div class="manual-entry">
        <div class="manual-name">
          <div class="manual-icon"><img src="${rd.icon}" alt="${rKey}" onerror="this.style.display='none'"></div>
          ${speciesName(rKey)}
        </div>
        <div class="manual-hates">${t('hates')} <strong>${hateNames}</strong></div>
      </div>`;
  });
  return html;
}


// ── PULL-DOWN GESTURE on the expanded bar ──
(function() {
  const bar = document.getElementById('bottom-bar');
  const handle = document.getElementById('bar-handle');
  const contentEl = document.getElementById('bar-content');
  let startY = 0, startH = 0, dragging = false, captureEl = null;

  function beginDrag(e, el) {
    startY = e.clientY;
    startH = bar.offsetHeight;
    dragging = true;
    captureEl = el;
    bar.classList.add('dragging');
    bar.style.transition = 'none';
    try { el.setPointerCapture(e.pointerId); } catch(ex) {}
  }

  // Handle always initiates drag
  handle.addEventListener('pointerdown', (e) => {
    if (!activeDrawer) return;
    beginDrag(e, handle);
    e.preventDefault();
  });

  // Content initiates drag only when scrolled to top and pulling down
  let contentStartY = 0, contentMaybeDrag = false;
  contentEl.addEventListener('touchstart', (e) => {
    if (!activeDrawer) return;
    if (contentEl.scrollTop <= 0) {
      contentStartY = e.touches[0].clientY;
      contentMaybeDrag = true;
    }
  }, { passive: true });

  contentEl.addEventListener('touchmove', (e) => {
    if (!contentMaybeDrag || dragging) return;
    const dy = e.touches[0].clientY - contentStartY;
    if (dy > 10 && contentEl.scrollTop <= 0) {
      // Intercept scroll — start drag
      contentMaybeDrag = false;
      startY = e.touches[0].clientY;
      startH = bar.offsetHeight;
      dragging = true;
      bar.classList.add('dragging');
      bar.style.transition = 'none';
      contentEl.style.overflowY = 'hidden';
      e.preventDefault();
    } else if (dy < -5) {
      contentMaybeDrag = false; // scrolling up, not a drag
    }
  }, { passive: false });

  contentEl.addEventListener('touchend', () => {
    contentMaybeDrag = false;
    finishDrag();
  });

  // Pointer events on bar for handle-initiated drags
  bar.addEventListener('pointermove', (e) => {
    if (!dragging || !captureEl) return;
    const dy = e.clientY - startY;
    if (dy < 0) return;
    if (activeDrawer) {
      const newH = Math.max(collapsedHeight || 80, startH - dy);
      bar.style.maxHeight = newH + 'px';
    }
    // For slots, we just track dy to decide whether to dismiss
  });

  bar.addEventListener('pointerup', () => {
    if (captureEl) finishDrag();
  });

  bar.addEventListener('pointercancel', () => {
    if (captureEl) {
      dragging = false;
      captureEl = null;
      bar.classList.remove('dragging');
      if (activeDrawer) {
        bar.style.transition = 'max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1)';
        bar.style.maxHeight = '85vh';
      }
    }
  });

  // Touch events on bar for content-initiated drags
  bar.addEventListener('touchmove', (e) => {
    if (!dragging || captureEl) return;
    const dy = e.touches[0].clientY - startY;
    if (dy < 0) return;
    if (activeDrawer) {
      const newH = Math.max(collapsedHeight || 80, startH - dy);
      bar.style.maxHeight = newH + 'px';
    }
    e.preventDefault();
  }, { passive: false });

  bar.addEventListener('touchend', () => {
    if (dragging && !captureEl) finishDrag();
  });

  function finishDrag() {
    if (!dragging) return;
    const dy = (typeof lastClientY !== 'undefined') ? lastClientY - startY : 0;
    dragging = false;
    captureEl = null;
    bar.classList.remove('dragging');
    contentEl.style.overflowY = '';

    if (activeDrawer) {
      const currentH = bar.offsetHeight;
      if (currentH < startH * 0.6) {
        closeDrawer();
      } else {
        bar.style.transition = 'max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1)';
        bar.style.maxHeight = '85vh';
      }
    }
  }
})();

const NAMES = ["Zog", "Blorp", "Kev", "Larz", "Grom", "Vok", "Nebula", "Starla", "Rex", "Tkt"];
const ROLES = ["COMMAND", "OPERATIONS", "SCIENCE", "FORCE", "LOGISTICS"];

let state = { day: 1, money: 800, pool: [], roster: [], mission: null, ship: null, gameOver: false, speciesOrder: [] };

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// ══════════════════════════════════════════════
// APPLICANT GENERATION
// ══════════════════════════════════════════════

function generateApplicantForRace(id, raceKey) {
  const savedDay = state.day;
  state.day = 1; // ensure day-1 stat ranges
  const app = generateApplicant(id, raceKey);
  state.day = savedDay;
  return app;
}

function generateApplicant(id, forceRace) {
  const races = Object.keys(RACES);
  let available = races.slice(0, Math.min(6 + Math.floor(state.day/2), races.length));
  const raceKey = forceRace || available[rand(0, available.length - 1)];
  const rd = RACES[raceKey];
  let str = rand(rd.str[0], rd.str[1]);
  let int = rand(rd.int[0], rd.int[1]);
  let cha = rand(rd.cha[0], rd.cha[1]);
  let hate = rand(0, 100);

  if (raceKey === "Sugorian") hate = rand(0, 50);
  if (raceKey === "Blorg") hate = rand(0, 20);
  if (raceKey === "Sky-Elf") { int = Math.max(str, cha) + rand(1, 10); }
  if (raceKey === "Human") { while (str === int && int === cha) { str++; } }
  if (raceKey === "Beetlegunner") { str = Math.max(str, cha + 1); }
  if (raceKey === "Giant") { str = Math.max(str, int + cha + rand(1, 10)); }
  if (raceKey === "Robomantoid") { hate = rand(20, 100); }
  if (raceKey === "Barbitulian") { int = cha; }
  if (raceKey === "Cheesponge" || raceKey === "Aquasim") { str = Math.min(int, cha) - rand(1, 5); if (str < 1) str = 1; }
  if (raceKey === "Space-Cat") { cha = Math.max(str, int) + rand(1, 10); }
  if (raceKey === "Velkhorian") { hate = rand(0, 60); }
  if (raceKey === "Fungi" || raceKey === "Drakhen") { hate = rand(80, 100); }
  if (raceKey === "Drakhen") { int = str; }
  if (raceKey === "Void-Demon") { cha = str + rand(1, 10); hate = rand(0, 10); }
  if (raceKey === "Oak-Person") { cha = rand(1, 4); }
  if (raceKey === "Long-Neck" || raceKey === "Squid") { int = str + rand(1, 10); }
  if (raceKey === "Sodio") { str = Math.max(str, int + 1); }

  const safeRaceName = raceKey.toLowerCase().replace(/-/g, '');
  const maxImgs = rd.images || 12;
  const portraitVariant = rand(1, maxImgs);
  let mappedName = getNameFor(raceKey, portraitVariant);
  let finalName = mappedName ? mappedName : NAMES[rand(0, NAMES.length - 1)];
  if (raceKey === "Droid" && !mappedName) { finalName += "-" + rand(1, 99); }

  return {
    id: id, name: finalName, race: raceKey,
    str: str, int: int, cha: cha, hate: hate,
    exp: ROLES[rand(0, ROLES.length - 1)],
    portrait: `images/${safeRaceName}/${safeRaceName}_portrait_${portraitVariant}.png`,
    cost: Math.floor((str + int + cha) * 1.5) + rand(5, 15)
  };
}

    { id: "ENFORCEMENT", stat: ["str", "cha"], t: 2, titles: ["Policing lawless sectors"] },
    { id: "VIP PROTECTION", stat: ["str", "cha"], t: 2, titles: ["Escorting dignitaries"] },
    { id: "WARLORD HUNT", stat: ["str", "cha"], t: 2, titles: ["Tracking sector kingpins"] },
    { id: "COLONIZATION", stat: ["str", "int", "cha"], t: 3, titles: ["Establishing a foothold on a hostile world"] },
    { id: "THE GRAND HEIST", stat: ["str", "int", "cha"], t: 3, titles: ["Breaking into a floating fortress"] },
    { id: "PLANETARY EVACUATION", stat: ["str", "int", "cha"], t: 3, titles: ["Saving a civilization from a supernova"] }
  ];
  let available = types.filter(mt => mt.t === 1);
  if (state.day > 4) available = available.concat(types.filter(mt => mt.t === 2));
  if (state.day > 8) available = available.concat(types.filter(mt => mt.t === 3));

  // Day 1: always STR only
  if (state.day === 1) available = types.filter(mt => mt.id === "ASSAULT");
  // Day 2-3: STR or INT only (no CHA)
  else if (state.day <= 3) available = types.filter(mt => mt.t === 1 && (mt.id === "ASSAULT" || mt.id === "RESEARCH"));
  const m = available[rand(0, available.length - 1)];
  const title = m.titles[rand(0, m.titles.length - 1)];
  const targetBase = 45 + Math.floor(state.day * 7.5);
  let targets = {};
  m.stat.forEach(s => targets[s] = targetBase + rand(-5, 5));

  // Dynamic minReq from day 5 onwards; fixed progressive before
  let minReq;
  if (state.day < 7) {
    minReq = Math.min(95, 65 + Math.floor(state.day * 1.2));
  } else {
    const maxSlots = state.ship ? state.ship.max : 5;
    const avgTarget = m.stat.reduce((sum, s) => sum + targets[s], 0) / m.stat.length;
    const statCountBase = 90 - (m.stat.length - 1) * 12;
    const slotsPerTarget = maxSlots / avgTarget;
    const pressureAdj = Math.round((slotsPerTarget - 0.07) * 300);
    let rawMinReq = Math.round(Math.max(50, Math.min(95, statCountBase + pressureAdj)));

    // Lottery spike from day 15: occasionally a brutal mission hits regardless of formula
    if (state.day >= 15) {
      if (m.stat.length === 2 && Math.random() < 0.12) rawMinReq = 90;
      if (m.stat.length === 3 && Math.random() < 0.12) rawMinReq = 85;
    }

    minReq = rawMinReq;
  }

  return { title: title, type: m.id, reqs: m.stat, targets: targets,
    minReq: minReq,
    reward: 500 + (state.day * 90) };
}

function updateShip() {
  // Build ship table: {d, baseName, displayName, max, min}
  // PNG always uses baseName (e.g. "Cargo", "Dreadnought")
  const ships = [];
  let day = 1;
  let maxSlots = 5;

  const earlyMins = {
    'Speeder': 3, 'Courier': 4, 'Interceptor': 4,
    'Scout': 5, 'Shuttle': 5, 'Gunship': 6,
  };

  function addFlat(name, max, min) {
    for (let i = 0; i < 3; i++) {
      ships.push({ d: day++, base: name, display: name, x: max, m: min });
    }
  }

  function addClassed(name, classes) {
    for (let c = 1; c <= classes; c++) {
      ships.push({ d: day++, base: name, display: name + ' [class ' + c + ']', x: maxSlots, m: Math.round(maxSlots * 0.75) });
      maxSlots++;
    }
  }

  // Phase 1: flat ships x3
  addFlat('Speeder',     5, 3);
  addFlat('Courier',     6, 4);
  addFlat('Interceptor', 7, 4);
  addFlat('Scout',       8, 5);
  addFlat('Shuttle',     9, 5);
  addFlat('Gunship',    10, 6);

  // Phase 2: 3 classes each
  maxSlots = 11;
  addClassed('Cargo',      3);
  addClassed('Corvette',   3);
  addClassed('Transport',  3);

  // Phase 3: 5 classes each
  addClassed('Destroyer',       5);
  addClassed('Battleship',      5);
  addClassed('Battlecruiser',   5);
  addClassed('Assault Cruiser', 5);
  addClassed('Heavy Cruiser',   5);
  addClassed('Titan',           5);

  const dreadStart = day;
  const dreadMaxStart = maxSlots;

  const s = ships.find(s => s.d === state.day);
  if (s) {
    state.ship = { name: s.display, base: s.base, max: s.x, min: s.m };
  } else {
    // Dreadnought: +1 max every 2 days
    const cls = Math.floor((state.day - dreadStart) / 2) + 1;
    const maxSlotsDread = dreadMaxStart + Math.floor((state.day - dreadStart) / 2);
    state.ship = {
      name: 'Dreadnought [class ' + cls + ']',
      base: 'Dreadnought',
      max: maxSlotsDread,
      min: Math.round(maxSlotsDread * 0.75)
    };
  }

  state.roster = new Array(state.ship.max).fill(null);
}

function startDay() {
  updateShip();
  state.speciesOrder = [];
  state.mission = generateMission();
  state.pool = [];

  if (state.day === 1) {
    // Fixed Day 1 pool: 2 Humans, 1 Sky-Elf, 2 Droids, 1 Beetlegunner
    const day1Species = ["Human", "Human", "Sky-Elf", "Droid", "Droid", "Beetlegunner"];
    day1Species.forEach((race, i) => {
      state.pool.push(generateApplicantForRace(i, race));
    });
  } else {
    // Pool must be at least 15-20% more than max slots
    const minPool = Math.ceil(state.ship.max * (1.15 + Math.random() * 0.05));
    const poolSize = Math.max(6 + Math.floor(state.day / 2), minPool);
    let attempts = 0;
    while(state.pool.length < poolSize && attempts < 200) {
      let newApp = generateApplicant(state.pool.length);
      if (!state.pool.some(a => a.name === newApp.name)) state.pool.push(newApp);
      attempts++;
    }
    // Day 20+: inject 1-3 extra Drakhen
    if (state.day >= 20) {
      const extraDrakhen = rand(1, 3);
      for (let i = 0; i < extraDrakhen; i++) {
        const app = generateApplicantForRace(state.pool.length, 'Drakhen');
        state.pool.push(app);
      }
    }
  }

  // Reset scroll
  document.querySelector('.scroll-area').scrollTop = 0;
  const sr = document.getElementById('slots-row');
  if (sr) sr.scrollLeft = 0;
  updateUI();

  // Show briefing sheet for every day (day 1 handled by goToGame, day 2+ handled here)
  if (document.getElementById('top-bar').classList.contains('slid-in')) {
    // Bars already visible (day 2+): hide cards, show sheet
    document.getElementById('scroll-area').style.visibility = 'hidden';
    const rulesScreen = document.getElementById('screen-rules');
    rulesScreen.classList.remove('hidden');
    rulesScreen.style.transform = '';
    initRulesSheet();
  }
}

function renderSlots() {
  const slotsRow = document.getElementById('slots-row');
  const max = state.ship.max;

  slotsRow.innerHTML = '';

  if (max > 15) {
    // Compact mode: SLOTS [X/MAX]: icon x count per species
    renderSlotsCompact(slotsRow, max);
  } else {
    for (let i = 0; i < max; i++) {
      slotsRow.insertAdjacentHTML('beforeend', slotHTML(i));
    }
    slotsRow.style.justifyContent = 'flex-start';
  }

  updateMissionProgress();
}

function renderSlotsCompact(slotsRow, max) {
  const hired = state.roster.filter(a => a !== null);
  const count = hired.length;

  // Label
  const label = document.createElement('span');
  label.style.cssText = 'font-family:"VT323",monospace;font-size:17px;white-space:nowrap;flex-shrink:0;margin-right:8px;';
  label.textContent = `SLOTS [${count}/${max}]:`;
  slotsRow.appendChild(label);

  if (count === 0) {
    const empty = document.createElement('span');
    empty.style.cssText = 'font-family:"VT323",monospace;font-size:17px;opacity:0.5;white-space:nowrap;';
    empty.textContent = '— AWAITING CREW —';
    slotsRow.appendChild(empty);
    return;
  }

  // Group by species
  const groups = {};
  hired.forEach(a => { groups[a.race] = (groups[a.race] || 0) + 1; });

  Object.entries(groups).forEach(([race, n]) => {
    const rd = RACES[race];
    if (!rd) return;
    const item = document.createElement('span');
    item.style.cssText = 'display:inline-flex;align-items:center;gap:3px;flex-shrink:0;margin-right:6px;cursor:pointer;';
    item.title = `Tap to remove a ${race}`;
    item.innerHTML = `<img src="${rd.icon}" style="width:20px;height:20px;image-rendering:pixelated;" onerror="this.style.display='none'"><span style="font-family:'VT323',monospace;font-size:17px;white-space:nowrap;">x${n}</span>`;
    item.onclick = () => {
      // Find last slot with this race and remove it
      for (let i = state.roster.length - 1; i >= 0; i--) {
        if (state.roster[i] && state.roster[i].race === race) {
          state.roster[i] = null;
          syncAllSlots();
          updateUI();
          break;
        }
      }
    };
    slotsRow.appendChild(item);
  });
}

function updateMissionProgress() {
  const m = state.mission;
  const hired = state.roster.filter(a => a !== null);
  const crewCount = hired.length;
  const max = state.ship.max;

  // Per-stat satisfaction
  let total = 0;
  const statMet = {};
  m.reqs.forEach(stat => {
    const sum = hired.reduce((acc, a) => acc + a[stat], 0);
    const pct = Math.min(100, (sum / m.targets[stat]) * 100);
    statMet[stat] = pct >= 100;
    total += pct;
  });
  const avg = m.reqs.length > 0 ? total / m.reqs.length : 0;

  // Progress bar
  const fill = document.getElementById('mission-progress-fill');
  if (fill) fill.style.width = avg.toFixed(1) + '%';

  // Info row: MISSION REQ: <stat vals bold, black if met> | SHIP: 0/5
  const minPct = m.minReq;
  const reqParts = m.reqs.map(r => {
    const met = statMet[r];
    return `<span class="stat-val${met ? ' met' : ''}">${t(r)} ${m.targets[r]}</span>`;
  }).join(' &nbsp;|&nbsp; ');

  const minMet = avg >= minPct;
  const minSpan = `<span class="stat-val${minMet ? ' met' : ''}">${t('min')} ${minPct}%</span>`;

  const shipMet = crewCount >= state.ship.min;
  const shipSpan = `<span class="stat-val${shipMet ? ' met' : ''}">${crewCount}/${max}</span>`;

  document.getElementById('slot-info-row').innerHTML =
    `${t('missionLabel')}&nbsp;${reqParts} &nbsp;|&nbsp; ${minSpan} &nbsp;|&nbsp; ${shipSpan}`;

  // Compress letter-spacing only if content overflows one line
  const row = document.getElementById('slot-info-row');
  row.style.letterSpacing = '';
  row.style.fontSize = '17px';
  if (row.scrollWidth > row.clientWidth) {
    row.style.letterSpacing = '-1px';
  }
  if (row.scrollWidth > row.clientWidth) {
    row.style.letterSpacing = '-2px';
  }
  if (row.scrollWidth > row.clientWidth) {
    row.style.fontSize = '15px';
    row.style.letterSpacing = '-1px';
  }
}

function slotHTML(i) {
  const app = state.roster[i];
  let h = `<div class="slot${app ? ' filled' : ''}" onclick="tapSlot(${i})">`;
  h += `<svg class="slot-fill-bg" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;"><polygon fill="#000" points="0,2 2,2 2,0 38,0 38,2 40,2 40,38 38,38 38,40 2,40 2,38 0,38"/></svg>`;
  if (app) h += `<img class="slot-icon" src="${RACES[app.race].icon}" style="position:absolute;width:32px;height:32px;top:4px;left:4px;z-index:2;image-rendering:pixelated;" onerror="this.style.display='none'">`;
  h += `</div>`;
  return h;
}

function updateLaunchState() {
  const crewCount = state.roster.filter(a => a !== null).length;
  const disabled = crewCount === 0;
  const btn = document.getElementById('btn-launch');
  if (btn) btn.classList.toggle('disabled', disabled);

// CARD TAP — original index.html interaction model
// Card stays in pool, gets dither highlight, fills slot
// ══════════════════════════════════════════════

function sortRoster() {
  const filled = state.roster.filter(a => a !== null);
  filled.sort((a, b) => state.speciesOrder.indexOf(a.race) - state.speciesOrder.indexOf(b.race));
  for (let i = 0; i < state.ship.max; i++) state.roster[i] = filled[i] || null;
}

function tapCard(appId) {
  const card = document.getElementById('card-' + appId);
  if (!card) return;

  // Instant bounce via class toggle
  card.classList.remove('bounce');
  requestAnimationFrame(() => card.classList.add('bounce'));

  const app = state.pool.find(a => a.id === appId);
  if (!app) return;

  // Already assigned — unassign
  const rosterIdx = state.roster.findIndex(a => a && a.id === appId);
  if (rosterIdx !== -1) {
    state.roster[rosterIdx] = null;
    card.classList.remove('selected');
    // Compact and sort
    sortRoster();
    renderSlots();
    updateLaunchState();
    updateCostDisplay();
    return;
  }

  // Check funds — allow up to -100cr overdraft
  const currentCost = state.roster.reduce((sum, a) => sum + (a ? a.cost : 0), 0);
  if (state.money - currentCost - app.cost < -100) {
    const warn = document.getElementById('launch-warning');
    warn.innerText = t('creditLimit');
    warn.style.display = 'block';
    setTimeout(() => { warn.innerText = t('hireCrew'); warn.style.display = state.roster.some(a=>a) ? 'none' : 'block'; }, 1500);
    return;
  }

  // Find next empty slot
  const nextSlot = state.roster.indexOf(null);
  if (nextSlot === -1) return;

  // Assign — instant visual feedback first
  card.classList.add('selected');
  state.roster[nextSlot] = app;
  // Track species selection order (first time only)
  if (!state.speciesOrder.includes(app.race)) state.speciesOrder.push(app.race);
  sortRoster();

  // Cost float animation
  const floater = document.createElement('div');
  floater.className = 'mc-cost-float';
  floater.textContent = `-${app.cost} cr`;
  card.appendChild(floater);
  floater.addEventListener('animationend', () => floater.remove());

  // Update just the one slot that changed
  updateSingleSlot(nextSlot);
  updateLaunchState();
  updateCostDisplay();
}

function tapSlot(index) {
  const app = state.roster[index];
  if (!app) return;

  const card = document.getElementById('card-' + app.id);
  if (card) card.classList.remove('selected');

  state.roster[index] = null;
  const filled = state.roster.filter(a => a !== null);
  filled.sort((a, b) => a.race.localeCompare(b.race));
  for (let i = 0; i < state.ship.max; i++) state.roster[i] = filled[i] || null;
  renderSlots();
  updateLaunchState();
  updateCostDisplay();
}

function updateSingleSlot(index) {
  // With dual slot areas (row + expanded), just re-render all
  renderSlots();
}

function updateCostDisplay() {
  const currentCost = state.roster.reduce((sum, a) => sum + (a ? a.cost : 0), 0);
  document.getElementById('ui-money').innerText = state.money - currentCost;
}

// ══════════════════════════════════════════════
// RESOLUTION LOGIC (V4.0 Math)
// ══════════════════════════════════════════════

function launchMission() {
  // Bounce
  const lBtn = document.getElementById('btn-launch');
  if (lBtn) { lBtn.classList.remove('bounce'); requestAnimationFrame(() => lBtn.classList.add('bounce')); }

  const hired = state.roster.filter(a => a !== null);
  if (hired.length === 0) { document.getElementById('launch-warning').style.display = 'block'; return; }

  const cost = hired.reduce((sum, app) => sum + app.cost, 0);
  const preDeductionBalance = state.money;
  state.money -= cost;
  const debitUsed = state.money < 0 ? Math.abs(state.money) : 0;
  let score = 0;

  // 1. RAW SKILL
  let statScores = [];
  state.mission.reqs.forEach(stat => {
    let sum = hired.reduce((acc, app) => acc + app[stat], 0);
    statScores.push((sum / state.mission.targets[stat]) * 100);
  });
  let rawScore = statScores.reduce((a,b)=>a+b, 0) / statScores.length;

  // 2. SHIP EFFICIENCY
  let effPct = hired.length / state.ship.min, effMod = 0;
  if (hired.length === state.ship.max) { effMod = 5; }
  else if (effPct >= 1) { effMod = 0; }
  else if (effPct >= 0.7) { effMod = -20; }
  else if (effPct >= 0.4) { effMod = -40; }
  else if (effPct >= 0.15) { effMod = -60; }
  else { effMod = -70; }

  // 3. CONFLICTS — collect all into a list
  let conflictPenalty = 0, conflictCount = 0;
  let conflictLines = [];
  for(let i=0;i<hired.length;i++) {
    for(let j=i+1;j<hired.length;j++) {
      let a=hired[i], rA=RACES[a.race], b=hired[j], rB=RACES[b.race];
      let aHatesB = rA.hates.includes(b.race)||(rA.hates.includes("ALL")&&a.race!==b.race);
      let bHatesA = rB.hates.includes(a.race)||(rB.hates.includes("ALL")&&b.race!==a.race);
      if (aHatesB && bHatesA) {
        let aW=0,bW=0;
        if(a.str>b.str)aW++;else if(b.str>a.str)bW++;
        if(a.int>b.int)aW++;else if(b.int>a.int)bW++;
        if(a.cha>b.cha)aW++;else if(b.cha>a.cha)bW++;
        if(aW>bW){let p=a.hate*0.3;conflictPenalty+=p;conflictCount++;conflictLines.push({raceA:a.race,raceB:b.race,text:`${speciesName(a.race)} dominated ${speciesName(b.race)} (-${Math.floor(p)}%)`});}
        else if(bW>aW){let p=b.hate*0.3;conflictPenalty+=p;conflictCount++;conflictLines.push({raceA:b.race,raceB:a.race,text:`${speciesName(b.race)} dominated ${speciesName(a.race)} (-${Math.floor(p)}%)`});}
        else{let pA=(a.hate*0.3)/2,pB=(b.hate*0.3)/2;conflictPenalty+=(pA+pB);conflictCount++;conflictLines.push({raceA:a.race,raceB:b.race,text:`${speciesName(a.race)} vs ${speciesName(b.race)} (draw, -${Math.floor(pA+pB)}%)`});}
      } else if(aHatesB){let p=a.hate*0.3;conflictPenalty+=p;conflictCount++;conflictLines.push({raceA:a.race,raceB:b.race,text:`${speciesName(a.race)} attacked ${speciesName(b.race)} (-${Math.floor(p)}%)`});}
      else if(bHatesA){let p=b.hate*0.3;conflictPenalty+=p;conflictCount++;conflictLines.push({raceA:b.race,raceB:a.race,text:`${speciesName(b.race)} attacked ${speciesName(a.race)} (-${Math.floor(p)}%)`});}
    }
  }

  // 4. SYNERGY
  let synergy = 0;
  if (hired.length >= 3 && conflictCount === 0) { synergy = 10; }

  score = Math.floor(rawScore + effMod - conflictPenalty + synergy);
  let overperformance = 0;
  if (score > 100) { overperformance = Math.min(20, score - 100); score = 100; }
  if (score < 0) score = 0;

  // 5. PAYOUT
  let earned = 0, isSuccess = false;
  let fineDetail = '';
  if (score >= state.mission.minReq) {
    isSuccess = true;
    earned = Math.floor(state.mission.reward * (score/100));
    if (overperformance > 0) { let bonus = Math.floor(state.mission.reward * (overperformance/100)); earned += bonus; }
  } else {
    let diff = (state.mission.minReq - score) / 100;
    earned = -Math.floor(state.mission.reward * diff);
    fineDetail = t('fineDetail').replace('%min%', state.mission.minReq).replace('%score%', score);
  }
  state.money += earned;

  // Build structured HTML
  function resRow(label, value, isNet) {
    return `<div class="res-row${isNet?' net':''}"><span class="res-row-label">${label}</span><span class="res-row-value">${value}</span></div>`;
  }
  function resDivider() { return `<div class="res-divider"></div>`; }

  let html = '';

  // Base power
  html += resRow(t('crewPowerOutput'), `${Math.floor(rawScore)}%`);
  html += resDivider();

  // Ship efficiency
  let effLabel = '', effVal = '';
  if (hired.length === state.ship.max) { effLabel = t('effMaxCapacity'); effVal = '+5%'; }
  else if (effPct >= 1) { effLabel = t('effMinMet'); effVal = '0%'; }
  else if (effPct >= 0.7) { effLabel = t('effTier1'); effVal = '-20%'; }
  else if (effPct >= 0.4) { effLabel = t('effTier2'); effVal = '-40%'; }
  else if (effPct >= 0.15) { effLabel = t('effCritical'); effVal = '-60%'; }
  else { effLabel = t('effFatal'); effVal = '-70%'; }
  html += resRow(effLabel, effVal);
  html += resDivider();

  // Conflicts block
  if (conflictCount > 0) {
    html += `<div class="res-conflicts-header">${t('conflictsHeader')} [${conflictCount}]</div>`;
    conflictLines.forEach(c => {
      const iconA = RACES[c.raceA] ? RACES[c.raceA].icon : '';
      const iconB = RACES[c.raceB] ? RACES[c.raceB].icon : '';
      html += `<div class="res-conflict-line" data-conflict="true">
        <div class="res-conflict-icons">
          <img class="res-conflict-icon" src="${iconA}" onerror="this.style.display='none'">
          <span class="res-conflict-vs">VS</span>
          <img class="res-conflict-icon" src="${iconB}" onerror="this.style.display='none'">
        </div>
        <span class="res-conflict-text">${c.text}</span>
      </div>`;
    });
    html += `<div class="res-row"><span class="res-row-label"></span><span class="res-row-value">-${Math.floor(conflictPenalty)}%</span></div>`;
    html += resDivider();
  }

  // Synergy
  if (synergy > 0) {
    html += resRow(t('synergyBonus'), '+10%');
    html += resDivider();
  }

  // Overperformance
  if (overperformance > 0) {
    let bonus = Math.floor(state.mission.reward * (overperformance/100));
    html += resRow(t('overperformBonus'), `+${bonus} CR`);
    html += resDivider();
  }

  // Fine
  if (fineDetail) {
    html += `<div class="res-fine-header">${t('fineApplied')}</div>`;
    html += `<div class="res-fine-detail">${fineDetail}</div>`;
    html += resDivider();
  }

  // Net financial change (no divider after)
  const netStr = earned >= 0 ? `+${earned} CR` : `${earned} CR`;
  html += resRow(t('netFinancialChange'), netStr, true);

  // Reset UI — hide msg and button until animation completes
  document.getElementById('res-score').innerText = '0%';
  document.getElementById('res-score').style.color = '';
  document.getElementById('res-msg').innerText = isSuccess ? t('missionSuccess') : t('missionFailed');
  document.getElementById('res-msg').style.visibility = 'hidden';
  document.getElementById('res-log').innerHTML = '';
  document.getElementById('res-title').innerText = t('debriefing');
  document.getElementById('modal-btn').onclick = function() {
    bounceThen(document.getElementById('modal-btn'), nextDay);
  };
  const willBankrupt = (state.money < -100) || (state.money <= 0);
  document.getElementById('modal-btn-text').innerText = willBankrupt ? t('continue') : t('nextDay');
  document.getElementById('modal-btn').style.visibility = 'hidden';
  document.getElementById('result-overlay').classList.add('visible');
  setStatusBar('dark');
  if (state.money < -100) state.gameOver = true;

  // Score duration is proportional: 2500ms for 100%, so score/100 * 2500
  const scoreEl = document.getElementById('res-score');
  const targetScore = score;
  const duration = (targetScore / 100) * 2500;
  const startTime = performance.now();

  function animateScore(now) {
    if (duration === 0) {
      scoreEl.innerText = targetScore + '%';
      revealMsg();
      return;
    }
    const elapsed = now - startTime;
    const t0 = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - t0, 3);
    scoreEl.innerText = Math.floor(eased * targetScore) + '%';
    if (t0 < 1) {
      requestAnimationFrame(animateScore);
    } else {
      scoreEl.innerText = targetScore + '%';
      revealMsg();
    }
  }
  requestAnimationFrame(animateScore);

  function revealMsg() {
    document.getElementById('res-msg').style.visibility = '';
    // Small pause then start log typewriter
    setTimeout(() => animateLogRows(html), 200);
  }

  function animateLogRows(fullHtml) {
    const logEl = document.getElementById('res-log');
    const parser = new DOMParser();
    const doc = parser.parseFromString(`<div>${fullHtml}</div>`, 'text/html');
    const children = Array.from(doc.querySelector('div').childNodes);
    let i = 0;

    function smoothScroll() { logEl.scrollTop = logEl.scrollHeight; }

    function showNext() {
      if (i >= children.length) {
        document.getElementById('modal-btn').style.visibility = '';
        smoothScroll();
        return;
      }
      const node = children[i];
      const clone = node.cloneNode(true);

      if (clone.nodeType === Node.TEXT_NODE) {
        logEl.appendChild(clone); i++;
        smoothScroll();
        setTimeout(showNext, 200);
        return;
      }

      const fullText = clone.innerText || clone.textContent || '';

      // Divider — instant
      if (fullText.trim().length === 0) {
        logEl.appendChild(clone); i++;
        smoothScroll();
        setTimeout(showNext, 50);
        return;
      }

      // Batch all consecutive conflict lines together within 0.5s total
      if (clone.dataset && clone.dataset.conflict === 'true') {
        const conflictNodes = [];
        while (i < children.length) {
          const c = children[i];
          if (c.nodeType === Node.ELEMENT_NODE && c.dataset && c.dataset.conflict === 'true') {
            conflictNodes.push(c.cloneNode(true)); i++;
          } else break;
        }
        const total = conflictNodes.length;
        const perItem = Math.min(200, Math.round(500 / total));
        let ci = 0;
        function showConflict() {
          if (ci >= total) { setTimeout(showNext, 200); return; }
          logEl.appendChild(conflictNodes[ci++]);
          smoothScroll();
          setTimeout(showConflict, perItem);
        }
        showConflict();
        return;
      }

      // res-row with label + right-justified value
      const labelEl = clone.querySelector('.res-row-label');
      const valueEl = clone.querySelector('.res-row-value');
      if (labelEl && valueEl) {
        const fullLabel = labelEl.textContent;
        const fullValue = valueEl.textContent;
        labelEl.textContent = '';
        valueEl.textContent = '';
        logEl.appendChild(clone); i++;
        smoothScroll();
        const liveClone = logEl.lastElementChild;
        const liveLabelEl = liveClone.querySelector('.res-row-label');
        const liveValueEl = liveClone.querySelector('.res-row-value');
        typewriteElement(liveLabelEl, fullLabel, 0, () => {
          liveValueEl.textContent = fullValue;
          smoothScroll();
          setTimeout(showNext, 200);
        });
        return;
      }

      // Everything else (headers, fine detail) — typewrite full text
      clone.innerHTML = '';
      logEl.appendChild(clone); i++;
      smoothScroll();
      const liveEl = logEl.lastElementChild;
      typewriteElement(liveEl, fullText, 0, () => {
        smoothScroll();
        setTimeout(showNext, 200);
      });
    }
    showNext();
  }

  function typewriteElement(el, text, charIndex, onDone) {
    if (charIndex >= text.length) { onDone(); return; }
    el.textContent = text.slice(0, charIndex + 1);
    const delay = 200 / Math.max(text.length, 1);
    setTimeout(() => typewriteElement(el, text, charIndex + 1, onDone), delay);
  }
}

// Bounce button then run callback after animation
function bounceThen(btn, callback) {

    setTimeout(callback, 200);

// ── AUDIO (Web Audio API — works on iOS) ──
let audioCtx = null;
let gainNode = null;
let audioSourceCreated = false;
let fadeTimer = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 1;
    gainNode.connect(audioCtx.destination);
  }
  return audioCtx;
}

function playTheme() {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
  gainNode.gain.cancelScheduledValues(ctx.currentTime);
  gainNode.gain.setValueAtTime(1, ctx.currentTime);

  const audio = document.getElementById('theme-audio');
  // Connect source only once — MediaElementSource can't be recreated
  if (!audioSourceCreated) {
    const src = ctx.createMediaElementSource(audio);
    src.connect(gainNode);
    audioSourceCreated = true;
  }
  audio.currentTime = 0;
  audio.loop = true;
  audio.play().catch(() => {});
}

function stopTheme() {
  if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
  const audio = document.getElementById('theme-audio');
  audio.pause();
  audio.currentTime = 0;
  if (gainNode && audioCtx) {
    gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
    gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
  }
}

function fadeOutTheme(duration) {
  if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
  const ctx = getAudioCtx();
  const audio = document.getElementById('theme-audio');
  gainNode.gain.cancelScheduledValues(ctx.currentTime);
  gainNode.gain.setValueAtTime(gainNode.gain.value, ctx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + duration / 1000);
  fadeTimer = setTimeout(() => {
    audio.pause();
    audio.currentTime = 0;
    gainNode.gain.cancelScheduledValues(ctx.currentTime);
    gainNode.gain.setValueAtTime(1, ctx.currentTime);
    fadeTimer = null;
  }, duration);
}

function pixelFadeIn(onComplete) {
  const canvas = document.getElementById('pixel-transition');
  const W = window.innerWidth;
  const H = window.innerHeight;
  const TILE = 8;
  const cols = Math.ceil(W / TILE);
  const rows = Math.ceil(H / TILE);
  const total = cols * rows;

  // Only init canvas if not already primed
  if (canvas.style.display !== 'block') {
    canvas.width = cols;
    canvas.height = rows;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, cols, rows);
  }

  const ctx = canvas.getContext('2d');

  // Create shuffled list of all pixel blocks
  const tiles = Array.from({ length: total }, (_, i) => i);
  for (let i = tiles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }

  const batchSize = Math.max(1, Math.floor(total / 40));
  let revealed = 0;

  function step() {
    const end = Math.min(revealed + batchSize, total);
    ctx.clearRect(0, 0, cols, rows);
    ctx.fillStyle = '#000';
    for (let i = end; i < total; i++) {
      const t = tiles[i];
      ctx.fillRect(t % cols, Math.floor(t / cols), 1, 1);
    }
    revealed = end;
    if (revealed < total) {
      requestAnimationFrame(step);
    } else {
      canvas.style.display = 'none';
      if (onComplete) onComplete();
    }
  }
  requestAnimationFrame(step);
}

  const W = window.innerWidth;
  const H = window.innerHeight;
  const TILE = 8;
  const cols = Math.ceil(W / TILE);
  const rows = Math.ceil(H / TILE);

  // Prime canvas as solid black cover BEFORE any DOM changes
  canvas.width = cols;
  canvas.height = rows;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cols, rows);

  // Now safe to swap screens — canvas covers the transition
  requestAnimationFrame(() => {
    document.getElementById('screen-pre').classList.add('hidden');
    document.getElementById('screen-welcome').classList.add('hidden');
    document.getElementById('screen-splash').classList.remove('hidden');
    document.getElementById('intro-cover').classList.add('gone');

    // Now animate the dissolve
    pixelFadeIn(null);
  });
}

      <div class="rules-mission-title">${missionLabel}</div>
      <div class="rules-flat-row"><span class="rules-flat-label">${t('requirements')}</span><span class="rules-flat-value">${reqStr}</span></div>
      <div class="rules-flat-row"><span class="rules-flat-label">${t('minSuccess')}</span><span class="rules-flat-value">${m.minReq}%</span></div>
      <div class="rules-flat-row"><span class="rules-flat-label">${t('minCrew')}</span><span class="rules-flat-value">${s.min}</span></div>
      <div class="rules-flat-row"><span class="rules-flat-label">${t('maxCrew')}</span><span class="rules-flat-value">${s.max}</span></div>
      <div class="rules-flat-row"><span class="rules-flat-label">${t('reward')}</span><span class="rules-flat-value">${m.reward} CR</span></div>
    `;
  }

  function buildShipPage(pageEl) {
    const s = state.ship;
    const shipSrc = `images/ships_${(s.base || s.name).toLowerCase().replace(/\s+/g, '_')}.png`;
    // Species newly unlocked this day vs yesterday
    const prevUnlocked = state.day > 1 ? new Set(getUnlockedSpeciesForDay(state.day - 1)) : new Set();
    const newSpecies = getUnlockedSpeciesForDay(state.day).filter(r => !prevUnlocked.has(r));
    const speciesRows = newSpecies.map(r => {
      const icon = RACES[r] ? RACES[r].icon : '';
      return `<div class="rules-species-row">
        <img class="rules-species-icon" src="${icon}" onerror="this.style.display='none'">
        <span class="rules-species-name">${speciesName(r)}</span>
      </div>`;
    }).join('');
    const newSpeciesBlock = newSpecies.length > 0 && state.day > 1 ? `
      <div class="rules-species-section">
        <div class="rules-new-species-header">${t('newSpeciesApplying')}</div>
        <div class="rules-species-list">${speciesRows}</div>
      </div>` : '';

    pageEl.innerHTML = `
      <div class="rules-briefing-header">
        <span class="rules-briefing-day">${t('day').toUpperCase()} ${state.day}</span>
        <span class="rules-briefing-sub">${t('yourShip')}</span>
      </div>
      <div class="rules-divider"></div>
      <div class="rules-ship-section">
        <img class="rules-ship-img" src="${shipSrc}" onerror="this.style.display='none'">
        <div class="rules-ship-name">${s.name}</div>
      </div>
      ${newSpeciesBlock}
    `;
  }

  function populateSheetContent() {
    // Clear all pages first
    for (let i = 1; i <= 6; i++) {
      const p = document.getElementById('rules-page-' + i);
      if (p) p.innerHTML = '';
    }

    if (state.day === 1) {
      // Day 1: 5 pages — cover, rules 1-2 (merged), mission briefing, ship
      document.getElementById('rules-page-1').innerHTML = `
        <div style="margin-top: 60px; text-align: center; font-family: 'VT323', monospace; font-size: 26px; font-weight: bold; line-height: 1.3;">
          ${t('rulesAndBriefing')}
        </div>
        <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">
          <img src="images/doc_icon.png" style="width:80px;height:80px;image-rendering:pixelated;display:block;" onerror="this.style.display='none'">
        </div>
      `;
      document.getElementById('rules-page-2').innerHTML = `
        <ul>
          <li>${t('rule1')}</li>
          <li>${t('rule2')}</li>
          <li>${t('rule3')}</li>
        </ul>
      `;
      document.getElementById('rules-page-3').innerHTML = `
        <ul>
          <li>${t('rule4')}</li>
          <li>${t('rule5')}</li>
          <li>${t('rule6')}</li>
        </ul>
        <div style="position: absolute; bottom: 0px; left: 0; right: 0; font-family: 'VT323', monospace; font-size: 18px; line-height: 1.4; color: #000;">${t('rulesClosing')}</div>
      `;
      document.getElementById('rules-page-4').innerHTML = '';
      buildMissionPage(document.getElementById('rules-page-4'));
      buildShipPage(document.getElementById('rules-page-5'));
    } else {
      // Day 2+: 2 pages — mission briefing, ship + new species
      buildMissionPage(document.getElementById('rules-page-1'));
      buildShipPage(document.getElementById('rules-page-2'));
    }
  }

  function updateRulesUI() {
    document.getElementById('rules-page-text').innerText = `${rulesPage}/${RULES_TOTAL}`;
    document.querySelectorAll('.rules-page').forEach(p => p.classList.remove('active'));
    document.getElementById('rules-page-' + rulesPage).classList.add('active');

    const showPrev = rulesPage > 1;
    document.getElementById('rules-zone-prev').style.display = showPrev ? 'block' : 'none';
    document.getElementById('rules-icon-prev').style.display = showPrev ? 'block' : 'none';

    const isLast = rulesPage === RULES_TOTAL;
    document.getElementById('rules-zone-next').style.display = isLast ? 'none' : 'block';
    document.getElementById('rules-icon-next').style.display = isLast ? 'none' : 'block';

    // Ack button: show once last page reached, never hide again
    const ackRow = document.getElementById('rules-ack-btn-row');
    if (ackRow && isLast) ackRow.classList.add('visible');
  }

  function nextRulesPage() {
    if (rulesPage < RULES_TOTAL) { rulesPage++; updateRulesUI(); }
  }

  function prevRulesPage() {
    if (rulesPage > 1) { rulesPage--; updateRulesUI(); }
  }

  function handlePointerDown(e, side) {
    if (activeDrag) return;
    activeDrag = side;
    startX = e.clientX;
    e.target.setPointerCapture(e.pointerId);
    updateCornerVisuals(side, SHRINK_SIZE);
  }

  function handlePointerMove(e) {
    if (!activeDrag) return;
    let deltaX = e.clientX - startX;
    let targetSize = SHRINK_SIZE;
    if (activeDrag === 'next') targetSize += -deltaX;
    else targetSize += deltaX;
    targetSize = Math.max(SHRINK_SIZE, Math.min(MAX_SIZE, targetSize));
    targetSize = Math.round(targetSize / 2) * 2;
    updateCornerVisuals(activeDrag, targetSize);
    if (targetSize >= MAX_SIZE) {
      const side = activeDrag;
      activeDrag = null;
      if (side === 'next') nextRulesPage();
      else prevRulesPage();
      updateCornerVisuals(side, BASE_SIZE);
    }
  }

  function handlePointerUp(e) {
    if (!activeDrag) return;
    const side = activeDrag;
    activeDrag = null;
    if (side === 'next') nextRulesPage();
    else prevRulesPage();
    updateCornerVisuals(side, BASE_SIZE);
  }

  window.initRulesSheet = function() {
    setStatusBar('light');
    rulesPage = 1;
    RULES_TOTAL = state.day === 1 ? 5 : 2;
    // Reset ack button — starts hidden each day
    const ackRow = document.getElementById('rules-ack-btn-row');
    if (ackRow) ackRow.classList.remove('visible');
    document.getElementById('btn-ack-text').innerText = t('acknowledge').toUpperCase();
    populateSheetContent();
    updateCornerVisuals('prev', BASE_SIZE);
    updateCornerVisuals('next', BASE_SIZE);
    updateRulesUI();

    const zonePrev = document.getElementById('rules-zone-prev');
    const zoneNext = document.getElementById('rules-zone-next');
    const newPrev = zonePrev.cloneNode(true);
    const newNext = zoneNext.cloneNode(true);
    zonePrev.parentNode.replaceChild(newPrev, zonePrev);
    zoneNext.parentNode.replaceChild(newNext, zoneNext);

    newPrev.addEventListener('pointerdown', (e) => handlePointerDown(e, 'prev'));
    newPrev.addEventListener('pointermove', handlePointerMove);
    newPrev.addEventListener('pointerup', handlePointerUp);
    newPrev.addEventListener('pointercancel', handlePointerUp);

    newNext.addEventListener('pointerdown', (e) => handlePointerDown(e, 'next'));
    newNext.addEventListener('pointermove', handlePointerMove);
    newNext.addEventListener('pointerup', handlePointerUp);
    newNext.addEventListener('pointercancel', handlePointerUp);
  };

  window.acknowledgeRules = function() {
    fadeOutTheme(1500);
    goToGameForReal();
  };
})();
</script>
</body>
</html>
