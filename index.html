<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light only">
<meta name="theme-color" content="#ffffff" id="meta-theme-color">
<meta name="apple-mobile-web-app-status-bar-style" content="default" id="meta-apple-status">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<title>Starship Recruiter</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --dither: conic-gradient(#000 0.25turn, transparent 0.25turn 0.5turn, #000 0.5turn 0.75turn, transparent 0.75turn);
  color-scheme: light only;
}

html, body {
  color-scheme: light only;
}

@media (prefers-color-scheme: dark) {
  html, body { background-color: #fff !important; color: #000 !important; }
  input, button, select, textarea { background-color: #fff !important; color: #000 !important; }
}

body {
  background-color: #fff;
  color: #000;
  background-image: none;
  font-family: "VT323", monospace;
  user-select: none;
  -webkit-user-select: none;
  overflow: hidden;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  color: #000;
}

/* ── TOP BAR ── */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: #fff;
  flex-shrink: 0;
  font-size: 20px;
  text-transform: uppercase;
  border-bottom: 2px solid #000;
  z-index: 250;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  transform: translateY(-110%);
  transition: transform 0.35s cubic-bezier(0.2, 0, 0.3, 1);
}
.top-bar.slid-in { transform: translateY(0); }
.top-title { font-weight: 700; }
.top-right { display: flex; gap: 16px; align-items: center; }
.top-cr { font-weight: 700; }

.debug-btn {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  font-size: 16px;
  color: #fff;
  opacity: 1;
}
.debug-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
}
.debug-panel {
  text-align: center;
  padding: 24px;
}
.debug-days {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 280px;
}
.debug-day-btn {
  width: 44px;
  height: 36px;
  border: 2px solid #000;
  background: #fff;
  font-family: "VT323", monospace;
  font-size: 18px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.debug-day-btn:active { background: #000; color: #fff; }

/* ── MAIN SCROLL AREA ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px 16px;
  padding-top: calc(12px + 44px);
  padding-bottom: calc(16px + 120px);
}

/* ── SECTION TITLE ROW ── */
.section-title-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.section-title {
  font-size: 20px;
  text-transform: uppercase;
  font-weight: bold;
}
.section-payroll {
  font-size: 20px;
  font-weight: 400;
}

/* ── MISSION PANEL ── */
.mission-card {
  position: relative;
  padding: 12px;
  margin-bottom: 16px;
  background: #fff;
  border: 2px solid #000;
}
.mission-type {
  background: #000; color: #fff; padding: 3px 8px; display: inline-block;
  font-size: 16px; text-transform: uppercase; margin-bottom: 8px;
}
.mission-title { font-size: 22px; font-weight: bold; line-height: 1.1; margin-bottom: 8px; }
.mission-detail { font-size: 18px; margin-top: 6px; }
.mission-req-tag {
  background: #000; color: #fff; padding: 3px 6px; display: inline-block;
  font-size: 16px; text-transform: uppercase; margin-right: 4px; margin-bottom: 4px;
}

.ship-preview {
  background: #000;
  width: 100%;
  height: 130px;
  margin-bottom: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  clip-path: polygon(
    0 4px, 2px 4px, 2px 2px, 4px 2px, 4px 0,
    calc(100% - 4px) 0, calc(100% - 4px) 2px, calc(100% - 2px) 2px, calc(100% - 2px) 4px, 100% 4px,
    100% calc(100% - 4px), calc(100% - 2px) calc(100% - 4px), calc(100% - 2px) calc(100% - 2px), calc(100% - 4px) calc(100% - 2px), calc(100% - 4px) 100%,
    4px 100%, 4px calc(100% - 2px), 2px calc(100% - 2px), 2px calc(100% - 4px), 0 calc(100% - 4px)
  );
}
.ship-preview img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
}

/* Manual entries */
.manual-entry {
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 2px dotted #000;
}
.manual-name {
  font-size: 20px;
  font-weight: bold;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.manual-icon {
  width: 24px; height: 24px;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.manual-icon img { width: 18px; height: 18px; image-rendering: pixelated; }
.manual-desc { font-size: 17px; line-height: 1.1; margin-top: 2px; }
.manual-desc-text { font-size: 17px; line-height: 1.2; margin-top: 3px; color: #888; }
.manual-hates { font-size: 17px; margin-top: 2px; }

/* New species page in briefing sheet */
.rules-newsp-list { display: flex; flex-direction: column; gap: 14px; margin-top: 4px; }
.rules-newsp-row { display: flex; flex-direction: column; gap: 2px; }
.rules-newsp-name-row { display: flex; align-items: center; gap: 8px; }
.rules-newsp-icon { width: 20px; height: 20px; image-rendering: pixelated; flex-shrink: 0; }
.rules-newsp-name { font-family: 'VT323', monospace; font-size: 20px; color: #000; }
.rules-newsp-desc { font-family: 'VT323', monospace; font-size: 17px; color: #000; line-height: 1.2; }
.rules-newsp-hates { font-family: 'VT323', monospace; font-size: 17px; color: #000; line-height: 1.2; margin-top: 8px; }
.rules-newsp-hatecontext { font-family: 'VT323', monospace; font-size: 17px; color: #888; line-height: 1.2; margin-top: 8px; }

/* ── CARDS GRID ── */
.cards-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ── CARD ── */
.mc-wrap {
  position: relative;
  aspect-ratio: 168 / 210;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: transform 0.15s ease;
}
.mc-wrap:active { transform: scale(0.96); }
.mc-wrap.bounce { animation: cardBounce 0.2s ease; }
@keyframes cardBounce {
  0% { transform: scale(1); }
  40% { transform: scale(0.95); }
  100% { transform: scale(1); }
}

.mc-border {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 3;
}

.mc-inner {
  position: absolute;
  top: 2px; left: 2px; right: 2px; bottom: 2px;
  background: #fff;
  padding: 6px 8px 5px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
}

/* Selected state: dither overlay — card stays in pool */
.mc-dither {
  position: absolute;
  top: 2px; left: 2px; right: 2px; bottom: 2px;
  background-image: var(--dither);
  background-size: 2px 2px;
  z-index: 4;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.05s;
}
.mc-wrap.selected .mc-dither { opacity: 1; }

.mc-hired {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 5;
  pointer-events: none;
}
.mc-hired span {
  font-family: 'Press Start 2P', cursive;
  font-size: 16px;
  color: #fff;
  text-transform: uppercase;
}
.mc-wrap.selected .mc-hired { display: flex; }

.mc-cost-float {
  position: absolute;
  left: 0; right: 0;
  top: 35%;
  text-align: center;
  font-family: 'VT323', monospace;
  font-size: 20px;
  color: #fff;
  z-index: 6;
  pointer-events: none;
  animation: costFloat 0.6s ease-out forwards;
}
@keyframes costFloat {
  0% { opacity: 1; transform: translateY(0); }
  70% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-40px); }
}

.mc-head { display: flex; justify-content: space-between; align-items: center; }
.mc-name { font-size: 17px; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.mc-tag {
  position: relative;
  display: inline-flex;
  align-items: center;
  padding: 3px 6px;
  background: transparent;
  line-height: 1;
  min-width: 0;
  flex-shrink: 0;
}
.mc-tag-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: visible;
}
.mc-tag-text { font-size: 14px; color: #fff; line-height: 1; text-transform: uppercase; }

.mc-portrait { width: 100%; height: 108px; overflow: hidden; flex-shrink: 0; }
.mc-portrait img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; pointer-events: none; }

.mc-skills { font-size: 15px; display: flex; justify-content: space-between; width: 100%; }
.mc-skills .hi-stat { font-weight: bold; text-decoration: underline; }
.mc-exp { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #888; }

.mc-div { height: 2px; border: none; background-image: linear-gradient(to right, #000 2px, transparent 2px); background-size: 4px 2px; background-repeat: repeat-x; flex-shrink: 0; margin-top: auto; }

.mc-foot { display: flex; justify-content: space-between; align-items: center; gap: 4px; }

.mc-hate-row { display: flex; align-items: center; gap: 3px; flex: 1; min-width: 0; }
.mc-hate-label { font-size: 15px; line-height: 1; white-space: nowrap; flex-shrink: 0; }
.mc-hate-bar-track {
  width: 30px; height: 8px;
  position: relative; flex-shrink: 0;
  border: 2px solid #000; overflow: hidden;
}
.mc-hate-bar-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  background-image: var(--dither);
  background-size: 2px 2px;
}
.mc-hate-pct { font-size: 15px; line-height: 1; white-space: nowrap; flex-shrink: 0; }
.mc-hate-pct.high { font-weight: 700; }

.mc-salary { font-size: 15px; font-weight: 700; flex-shrink: 0; }

/* ── MISSION FLAT ROWS ── */
.mission-flat-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 18px;
  font-family: "VT323", monospace;
  text-transform: uppercase;
  padding: 3px 0;
  border-bottom: 1px dashed #ccc;
  line-height: 1;
}
.mission-flat-row:last-of-type { border-bottom: none; }
.mission-flat-label { color: #666; }
.mission-flat-value { font-weight: 700; text-align: right; }

/* ── SLOT INFO ROW ── */
.slot-info-row {
  display: flex;
  align-items: center;
  width: 100%;
  font-size: 17px;
  font-family: "VT323", monospace;
  text-transform: uppercase;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
}
.slot-info-row .stat-val {
  font-size: 17px;
  font-weight: 700;
}
.slot-info-row .stat-val.met {
  background: #000;
  color: #fff;
  padding: 0 3px;
}

/* ── MISSION PROGRESS BAR ── */
.mission-progress-track {
  width: 100%;
  height: 8px;
  border: 2px solid #000;
  background: #fff;
  position: relative;
  overflow: hidden;
}
.mission-progress-fill {
  position: absolute;
  inset: 0;
  right: auto;
  background-image: var(--dither);
  background-size: 2px 2px;
  transition: width 0.2s ease;
}

/* ── BOTTOM BAR (compact — no crew count) ── */
.bottom-bar {
  background: #fff;
  padding: 6px 16px 12px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  border-top: 2px solid #000;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 250;
  transform: translateY(110%);
  transition: transform 0.35s cubic-bezier(0.2, 0, 0.3, 1);
}
.bottom-bar.slid-in { transform: translateY(0); }

/* ── BUTTON ROW ── */
.btn-row {
  display: flex;
  gap: 8px;
  align-items: center;
  width: calc(100% - 0px);
  align-self: stretch;
}
.btn-row .launch-btn {
  margin-left: auto;
}

/* ── ICON BUTTONS (mission / manual) with pixel staircase corners ── */
.icon-btn {
  width: 48px;
  height: 40px;
  flex-shrink: 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  background: #fff;
  border: none;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.icon-btn-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.icon-btn img {
  width: 36px;
  height: 36px;
  image-rendering: pixelated;
  pointer-events: none;
  position: relative;
  z-index: 1;
}
.icon-btn.active .icon-btn-bg polygon { fill: #000; stroke: #000; }
.icon-btn.bounce { animation: btnBounce 0.2s ease; }
@keyframes btnBounce {
  0% { transform: scale(1); }
  40% { transform: scale(0.9); }
  100% { transform: scale(1); }
}

/* ── DRAWER OVERLAY ── */
.drawer-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, #999 1px, transparent 1px);
  background-size: 4px 4px;
  background-color: rgba(255,255,255,0.7);
  z-index: 55;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.drawer-overlay.visible { display: block; }

/* ── BOTTOM BAR — expandable ── */
.bottom-bar {
  background: #fff;
  padding: 8px 16px 14px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  border-top: 2px solid #000;
  z-index: 250;
}

/* When expanded: fixed to bottom, animates max-height */
.bottom-bar.expanded {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  max-height: 85vh;
  transition: max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1);
  overflow: hidden;
  align-items: stretch;
}
.bottom-bar.dragging {
  transition: none;
}

.bottom-bar.expanded .slot-info-row { display: none !important; }
.bottom-bar.expanded .mission-progress-track { display: none !important; }

/* Handle — only visible when expanded */
.bar-handle {
  display: none;
  width: 100%;
  padding: 8px 0 4px;
  justify-content: center;
  align-items: center;
  flex-shrink: 0;
  cursor: grab;
  touch-action: none;
}
.bottom-bar.expanded .bar-handle { display: flex; }
.bar-handle-line {
  width: 40px;
  height: 2px;
  background: #000;
}

/* Expandable content area */
.bar-content {
  display: none;
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 4px 10px 8px;
  min-height: 0;
}
.bottom-bar.expanded .bar-content { display: block; }

/* Slots row — hidden when drawer expanded */
.bottom-bar.expanded .slots-row { display: none !important; }
.bottom-bar.expanded .launch-warning { display: none !important; }

/* ── SLOTS ROW ── */
.slots-row { display: flex; gap: 8px; flex-shrink: 0; align-items: center; justify-content: flex-start; overflow-x: auto; -webkit-overflow-scrolling: touch; touch-action: pan-x; padding-bottom: 2px; width: calc(100% + 16px); margin-right: -16px; scrollbar-width: none; }
.slots-row::-webkit-scrollbar { display: none; }

.slot {
  width: 40px;
  height: 40px;
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: pan-x;
  flex-shrink: 0;
  background-image:
    linear-gradient(to right, #000 50%, transparent 50%),
    linear-gradient(to bottom, #000 50%, transparent 50%),
    linear-gradient(to right, #000 50%, transparent 50%),
    linear-gradient(to bottom, #000 50%, transparent 50%);
  background-size: 4px 2px, 2px 4px, 4px 2px, 2px 4px;
  background-position: top, right, bottom, left;
  background-repeat: repeat-x, repeat-y, repeat-x, repeat-y;
  transition: background-color 0.15s;
}
.slot.filled {
  background-image: none;
  background-color: transparent;
}
.slot-fill-bg { display: none; }
.slot.filled .slot-fill-bg { display: block; }

/* +N overflow indicator */
/* ── LAUNCH BUTTON ── */
.launch-btn {
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  background: none;
  border: none;
  padding: 0;
  font-family: "VT323", monospace;
  height: 40px;
  flex-shrink: 0;
  touch-action: manipulation;
  margin: 0 4px;
  clip-path: polygon(
    0 4px, 2px 4px, 2px 2px, 4px 2px, 4px 0,
    calc(100% - 4px) 0, calc(100% - 4px) 2px, calc(100% - 2px) 2px, calc(100% - 2px) 4px, 100% 4px,
    100% calc(100% - 4px), calc(100% - 2px) calc(100% - 4px), calc(100% - 2px) calc(100% - 2px), calc(100% - 4px) calc(100% - 2px), calc(100% - 4px) 100%,
    4px 100%, 4px calc(100% - 2px), 2px calc(100% - 2px), 2px calc(100% - 4px), 0 calc(100% - 4px)
  );
}
.launch-btn-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.launch-btn-text {
  position: relative;
  z-index: 1;
  color: #fff;
  font-size: 20px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: "VT323", monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 16px;
  height: 100%;
}
.launch-btn:active .launch-btn-bg polygon { fill: #333; }
.launch-btn.bounce { animation: btnBounce 0.2s ease; }
.launch-btn.disabled {
  pointer-events: none;
  clip-path: none;
}
.launch-btn.disabled .launch-btn-bg { display: none; }
.launch-btn.disabled .launch-btn-text {
  color: #000;
  background-image:
    linear-gradient(to right, #000 50%, transparent 50%),
    linear-gradient(to bottom, #000 50%, transparent 50%),
    linear-gradient(to right, #000 50%, transparent 50%),
    linear-gradient(to bottom, #000 50%, transparent 50%);
  background-size: 4px 2px, 2px 4px, 4px 2px, 2px 4px;
  background-position: top, right, bottom, left;
  background-repeat: repeat-x, repeat-y, repeat-x, repeat-y;
}

.launch-warning {
  display: none;
  font-size: 16px;
  text-align: center;
  font-weight: bold;
}

/* ── SPLASH SCREEN ── */
.screen {
  position: fixed;
  inset: 0 0 4px 0;
  z-index: 300;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.screen.hidden { display: none; }
#screen-pre     { z-index: 303; inset: 0; }
#screen-splash  { z-index: 302; inset: 0; }
#screen-welcome { z-index: 301; inset: 0; }
#screen-rules   { z-index: 300; }

/* ── PRE-PAGE ── */
#screen-pre {
  background: #000;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.pre-icon {
  width: 140px;
  height: 140px;
  image-rendering: pixelated;
  display: block;
}
.pre-tap-text {
  margin-top: 60px;
  color: #fff;
  font-family: "VT323", monospace;
  font-size: 18px;
  text-transform: uppercase;
  text-align: center;
}

/* ── LANGUAGE SELECTOR (Page 0) ── */
.pre-lang-title {
  color: #fff;
  font-family: "VT323", monospace;
  font-size: 22px;
  text-transform: uppercase;
  text-align: center;
  margin-top: 32px;
  letter-spacing: 1px;
}
.pre-lang-options {
  display: flex;
  flex-direction: row;
  gap: 20px;
  margin-top: 20px;
  align-items: center;
}
.pre-lang-option {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.pre-lang-option input[type="radio"] {
  display: none;
}
.pre-radio-box {
  width: 16px;
  height: 16px;
  border: 2px solid #fff;
  background: transparent;
  flex-shrink: 0;
  position: relative;
  image-rendering: pixelated;
}
.pre-radio-box::after {
  content: '';
  display: none;
  position: absolute;
  inset: 3px;
  background: #fff;
}
.pre-lang-option input[type="radio"]:checked + .pre-radio-box::after {
  display: block;
}
.pre-lang-label {
  color: #fff;
  font-family: "VT323", monospace;
  font-size: 20px;
  text-transform: uppercase;
}
.pre-continue-row {
  position: absolute;
  bottom: 32px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
}

#screen-splash {
  background: #000;
}
.splash-top {
  position: absolute;
  inset: 0;
  z-index: 0;

    100% calc(100% - 4px), calc(100% - 2px) calc(100% - 4px), calc(100% - 2px) calc(100% - 2px), calc(100% - 4px) calc(100% - 2px), calc(100% - 4px) 100%,

#screen-welcome {

}
.welcome-img-panel {

}

.welcome-text-panel {

/* ── RULES SCREEN ── */
#screen-rules {
  background-color: #fff;

}

/* Acknowledge button on screen-rules (outside sheet) */
.rules-ack-btn-row {

}

.rules-sheet-wrapper {
  position: relative;
  width: 300px;
  height: 420px;
}

.rules-touch-zone {
  position: absolute;
  top: -40px;
  bottom: -10px;
  width: 245px;

  z-index: 100;

  -webkit-tap-highlight-color: transparent;
}
.rules-touch-zone.left  { left: -50px; }
.rules-touch-zone.right { right: -50px; }

.rules-sheet-container {

  height: 100%;

    0 2px, 2px 2px, 2px 0,
    calc(100% - 2px) 0, calc(100% - 2px) 2px, 100% 2px,
    100% calc(100% - 2px), calc(100% - 2px) calc(100% - 2px),

  );

.rules-top-dotted-line {

.rules-sheet-content {

.rules-pages-container {

}

.rules-page { display: none; height: 100%; overflow: hidden; position: relative; }
.rules-page.active { display: flex; flex-direction: column; }
.rules-page ul { margin: 16px 0 0 0; padding-left: 18px; list-style-type: square; }
.rules-page li { margin-bottom: 14px; font-size: 18px; line-height: 1.35; }
.rules-page li:last-child { margin-bottom: 0; }

/* Page 1: Mission briefing */
.rules-briefing-header {
  text-align: center;
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 10px;
  font-family: 'VT323', monospace;
}
.rules-briefing-day {
  font-size: 22px;
  font-weight: bold;
  display: block;
}
.rules-briefing-sub {

}
.rules-mission-title {
  font-size: 20px;
  font-weight: bold;

  margin-bottom: 8px;
}
.rules-mission-type-tag {
  display: inline-block;
  background: #000;
  color: #fff;
  font-size: 18px;

}
.rules-flat-row {
  display: flex;
  justify-content: space-between;

    rgba(0,0,0,0.25) 0px,
    rgba(0,0,0,0.25) 2px,

.rules-flat-label { color: #555; }
.rules-flat-value { font-weight: bold; text-align: right; }

/* New species section pushed ~25% down */
.rules-species-section {
  margin-top: 25%;
}

/* Page 2: Ship + new species */
.rules-ship-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 8px;
}
.rules-ship-img {
  width: 100%;
  height: 90px;
  object-fit: contain;
  image-rendering: pixelated;
  display: block;
  margin-bottom: 4px;
}
.rules-ship-name {
  font-size: 18px;
  font-weight: bold;
  text-align: center;
}
.rules-new-species-header {
  font-size: 18px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  opacity: 0.6;
}
.rules-species-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow-y: auto;
  flex: 1;
}
.rules-species-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.rules-species-icon {
  width: 24px;
  height: 24px;
  image-rendering: pixelated;
  object-fit: contain;
  flex-shrink: 0;
}
.rules-species-name {
  font-size: 18px;
  font-family: 'VT323', monospace;
  color: #000;
}
.rules-divider {
  width: 100%;
  height: 1px;
  background: #000;
  margin: 8px 0;
  opacity: 0.15;
}

.rules-cover-title {
  font-family: 'VT323', monospace;
  font-size: 28px;
  line-height: 1.3;
  text-align: center;
}

.rules-page-num {
  position: absolute;
  bottom: 2px;
  right: 32px;
  font-family: 'VT323', monospace;
  font-size: 20px;
  color: #000;
  line-height: 1;
  pointer-events: none;
  z-index: 4;
}

.rules-corner-icon {
  position: absolute;
  bottom: 0;
  width: 24px;
  height: 24px;
  background-color: #fff;
  overflow: hidden;
  z-index: 10;
  pointer-events: none;
}
.rules-corner-icon.icon-right { right: 0; border-top: 2px solid #000; border-left: 2px solid #000; }
.rules-corner-icon.icon-left  { left: 0;  border-top: 2px solid #000; border-right: 2px solid #000; display: none; }

.rules-corner-icon svg { display: block; width: 100%; height: 100%; }

/* Acknowledged link on last page */
/* Sheet slide-out */
#screen-rules {
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.6, 1);
}
#screen-rules.slide-out {
  transform: translateY(110%);
}

/* ── INTRO MODE — acknowledge button replaces normal btn-row ── */
.btn-row-acknowledge { display: none !important; }
.btn-row-acknowledge {
  display: none;
  width: 100%;
  align-self: stretch;
  justify-content: center;
  align-items: center;
}
/* intro-mode removed */

/* ── GAME UI — hidden until screens are done ── */
#intro-cover {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 299;
  pointer-events: none;
}

/* ── PIXEL TRANSITION CANVAS ── */
#pixel-transition {

  height: 33.333%;
  flex-shrink: 0;
  overflow: hidden;
  background: #000;
}

  height: 100%;

  image-rendering: pixelated;
}
.checkpoint-text {

.checkpoint-btn {

  padding: 14px 0;
  background: #fff;
  color: #000;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  border: none;
  cursor: pointer;
  width: calc(100% - 40px);
  letter-spacing: 0.05em;
}
.checkpoint-btn.hidden { display: none; }

.result-overlay {
  position: fixed;
  inset: -50px 0 0 0;
  background: #000;
  z-index: 400;

  align-items: center;

/* Title */

  font-family: 'VT323', monospace;

}

}

  font-size: 22px;
  font-weight: bold;
  text-align: center;

}

/* Standard row: label left, value right */
.res-row {

  flex: 1;
}

  padding: 6px 0 2px;

  text-align: left;
}
.res-fine-detail {
  padding: 1px 0 6px;
  color: rgba(255,255,255,0.75);
  font-size: 16px;
}

/* Net income row — no divider, bold */
.res-row.net { font-weight: bold; padding-top: 8px; }

.result-btn-row {

  max-width: 340px;
  display: flex;
  justify-content: center;

<!-- PRE-PAGE (Page 0) — Language selector -->

      <input type="radio" name="lang" value="en" checked onchange="selectLang('en')">
      <div class="pre-radio-box"></div>
      <span class="pre-lang-label">English</span>

      <input type="radio" name="lang" value="it" onchange="selectLang('it')">

      <span class="pre-lang-label">Italiano</span>

      <svg class="launch-btn-bg-inv" viewBox="0 0 200 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><polygon fill="#fff" points="0,4 2,4 2,2 4,2 4,0 196,0 196,2 198,2 198,4 200,4 200,36 198,36 198,38 196,38 196,40 4,40 4,38 2,38 2,36 0,36"/></svg>

function t(key) { return LANG[currentLang][key] || LANG['en'][key] || key; }
function speciesName(raceKey) { return (LANG[currentLang].species || {})[raceKey] || raceKey; }
function roleName(role) { return (LANG[currentLang].roles || {})[role] || role; }
function statLabel(s) { return t(s); }
function missionTitle(enTitle) { return (LANG[currentLang].missionTitles || {})[enTitle] || enTitle; }
function missionTypeName(typeId) { return (LANG[currentLang].missionTypes || {})[typeId] || typeId; }

function selectLang(lang) {
  currentLang = lang;
  const L = LANG[lang];
  document.getElementById('pre-lang-title').innerText = L.selectLang;
  document.getElementById('btn-pre-continue-text').innerText = L.continue;
}


let activeDrawer = null; // 'mission' | 'manual' | null
let collapsedHeight = 0;

function toggleDrawer(type) {
  // Bounce the tapped button
  const btnId = type === 'mission' ? 'btn-mission' : 'btn-manual';
  const btn = document.getElementById(btnId);
  if (btn) { btn.classList.remove('bounce'); requestAnimationFrame(() => btn.classList.add('bounce')); }

  if (activeDrawer === type) {
    closeDrawer();
    return;
  }
  openDrawer(type);
}

function openDrawer(type) {
  const bar = document.getElementById('bottom-bar');
  const overlay = document.getElementById('drawer-overlay');
  const content = document.getElementById('bar-content');

  // If switching between panels while already open
  if (activeDrawer && activeDrawer !== type) {
    content.innerHTML = type === 'mission' ? getMissionHTML() : getManualHTML();
    activeDrawer = type;
    updateIconButtons();
    playSfx('button');
    return;
  }

  activeDrawer = type;

  // Remember collapsed height before expanding
  collapsedHeight = bar.offsetHeight;

  // Populate content
  content.innerHTML = type === 'mission' ? getMissionHTML() : getManualHTML();

  // Update icons
  updateIconButtons();

  playSfx('menu_open', 1, 2);
  playSfx('button');
  document.getElementById('btn-launch').style.visibility = 'hidden';

  // Set initial max-height to collapsed size, then expand
  bar.style.maxHeight = collapsedHeight + 'px';
  bar.classList.add('expanded');
  overlay.classList.add('visible');

  // Next frame: animate to full content height
  requestAnimationFrame(() => {
    bar.style.transition = 'max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1)';
    bar.style.maxHeight = '85vh';
  });
}

function closeDrawer() {
  const bar = document.getElementById('bottom-bar');
  const overlay = document.getElementById('drawer-overlay');

  playSfx('menu_close', 1, 2);
  playSfx('button');
  // If closing during intro, exit intro mode too
  bar.classList.remove('intro-mode');

  // Animate back to collapsed height
  bar.style.transition = 'max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1)';
  bar.style.maxHeight = collapsedHeight + 'px';
  overlay.classList.remove('visible');

  activeDrawer = null;
  updateIconButtons();

  // After animation, remove expanded state
  setTimeout(() => {
    bar.classList.remove('expanded');
    bar.style.maxHeight = '';
    bar.style.transition = '';
    document.getElementById('btn-launch').style.visibility = '';
    renderSlots();
    updateLaunchState();
  }, 210);
}

function updateIconButtons() {
  const mBtn = document.getElementById('btn-mission');
  const mImg = document.getElementById('icon-mission');
  const aBtn = document.getElementById('btn-manual');
  const aImg = document.getElementById('icon-manual');

  const mActive = activeDrawer === 'mission';
  const aActive = activeDrawer === 'manual';

  if (mBtn) { mBtn.classList.toggle('active', mActive); mImg.src = mActive ? 'images/mission_selected.png' : 'images/mission_default.png'; }
  if (aBtn) { aBtn.classList.toggle('active', aActive); aImg.src = aActive ? 'images/manual_selected.png' : 'images/manual_default.png'; }
}

function getMissionHTML() {
  const m = state.mission;
  const crew = state.roster.filter(a => a !== null).length;
  const reqStr = m.reqs.map(r => `${t(r)} ${m.targets[r]}`).join(', ');
  const shipSrc = `images/ships_${(state.ship.base || state.ship.name).toLowerCase().replace(/\s+/g, '_')}.png`;
  const rawTitle = m.title.charAt(0).toUpperCase() + m.title.slice(1).toLowerCase();
  const mType = missionTypeName(m.type);
  const title = `${mType}: ${missionTitle(rawTitle)}`;
  return `
    <div class="section-title" style="margin-bottom:10px;">${t('missionIntel').toUpperCase()}</div>
    <div class="mission-title" style="font-size:20px; font-family:'VT323',monospace; font-weight:700; margin-bottom:10px; line-height:1.1;">${title}</div>
    <div class="mission-flat-row"><span class="mission-flat-label">${t('requirements')}</span><span class="mission-flat-value">${reqStr}</span></div>
    ${m.expReq ? `<div class="mission-flat-row"><span class="mission-flat-label">${t('experienceReq')}</span><span class="mission-flat-value">1 ${roleName(m.expReq)}</span></div>` : ''}
    <div class="mission-flat-row"><span class="mission-flat-label">${t('minSuccess')}</span><span class="mission-flat-value">${m.minReq}%</span></div>
    <div class="mission-flat-row"><span class="mission-flat-label">${t('minCrew')}</span><span class="mission-flat-value">${state.ship.min}</span></div>
    <div class="mission-flat-row"><span class="mission-flat-label">${t('maxCrew')}</span><span class="mission-flat-value">${state.ship.max}</span></div>
    <div class="mission-flat-row"><span class="mission-flat-label">${t('reward')}</span><span class="mission-flat-value">${m.reward} cr</span></div>
    <div class="section-title" style="margin-top:16px; margin-bottom:10px;">${t('yourShip').toUpperCase()}</div>
    <div class="ship-preview"><img src="${shipSrc}" alt="Ship" style="max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated;" onerror="this.style.display='none'"></div>
    <div style="font-size:20px; margin-top:8px;">${state.ship.name}</div>
  `;
}

function getUnlockedSpeciesForDay(day) {
  const allSpecies = Object.keys(RACES);
  const count = Math.min(6 + Math.floor(day / 2), allSpecies.length);
  return allSpecies.slice(0, count);
}

function getManualHTML() {
  let html = `<div class="section-title" style="margin-bottom:10px;">${t('xenoManual').toUpperCase()}</div>`;
  const unlockedSpecies = getUnlockedSpeciesForDay(state.day);
  const sorted = [...unlockedSpecies].sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
  sorted.forEach(rKey => {
    const rd = RACES[rKey];
    const hateNames = rd.hates.map(h => speciesName(h)).join(', ');
    html += `
      <div class="manual-entry">
        <div class="manual-name">
          <div class="manual-icon"><img src="${rd.icon}" alt="${rKey}" onerror="this.style.display='none'"></div>
          ${speciesName(rKey)}
        </div>
        <div class="manual-desc-text">${rd.shortDesc || rd.desc}</div>
        <div class="manual-hates">${t('hates')} <strong>${hateNames}</strong></div>
      </div>`;
  });
  return html;
}


// ── PULL-DOWN GESTURE on the expanded bar ──
(function() {
  const bar = document.getElementById('bottom-bar');
  const handle = document.getElementById('bar-handle');
  const contentEl = document.getElementById('bar-content');
  let startY = 0, startH = 0, dragging = false, captureEl = null;

  function beginDrag(e, el) {
    startY = e.clientY;
    startH = bar.offsetHeight;
    dragging = true;
    captureEl = el;
    bar.classList.add('dragging');
    bar.style.transition = 'none';
    try { el.setPointerCapture(e.pointerId); } catch(ex) {}
  }

  // Handle always initiates drag
  handle.addEventListener('pointerdown', (e) => {
    if (!activeDrawer) return;
    beginDrag(e, handle);
    e.preventDefault();
  });

  // Content initiates drag only when scrolled to top and pulling down
  let contentStartY = 0, contentMaybeDrag = false;
  contentEl.addEventListener('touchstart', (e) => {
    if (!activeDrawer) return;
    if (contentEl.scrollTop <= 0) {
      contentStartY = e.touches[0].clientY;
      contentMaybeDrag = true;
    }
  }, { passive: true });

  contentEl.addEventListener('touchmove', (e) => {
    if (!contentMaybeDrag || dragging) return;
    const dy = e.touches[0].clientY - contentStartY;
    if (dy > 10 && contentEl.scrollTop <= 0) {
      // Intercept scroll — start drag
      contentMaybeDrag = false;
      startY = e.touches[0].clientY;
      startH = bar.offsetHeight;
      dragging = true;
      bar.classList.add('dragging');
      bar.style.transition = 'none';
      contentEl.style.overflowY = 'hidden';
      e.preventDefault();
    } else if (dy < -5) {
      contentMaybeDrag = false; // scrolling up, not a drag
    }
  }, { passive: false });

  contentEl.addEventListener('touchend', () => {
    contentMaybeDrag = false;
    finishDrag();
  });

  // Pointer events on bar for handle-initiated drags
  bar.addEventListener('pointermove', (e) => {
    if (!dragging || !captureEl) return;
    const dy = e.clientY - startY;
    if (dy < 0) return;
    if (activeDrawer) {
      const newH = Math.max(collapsedHeight || 80, startH - dy);
      bar.style.maxHeight = newH + 'px';
    }
    // For slots, we just track dy to decide whether to dismiss
  });

  bar.addEventListener('pointerup', () => {
    if (captureEl) finishDrag();
  });

  bar.addEventListener('pointercancel', () => {
    if (captureEl) {
      dragging = false;
      captureEl = null;
      bar.classList.remove('dragging');
      if (activeDrawer) {
        bar.style.transition = 'max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1)';
        bar.style.maxHeight = '85vh';
      }
    }
  });

  // Touch events on bar for content-initiated drags
  bar.addEventListener('touchmove', (e) => {
    if (!dragging || captureEl) return;
    const dy = e.touches[0].clientY - startY;
    if (dy < 0) return;
    if (activeDrawer) {
      const newH = Math.max(collapsedHeight || 80, startH - dy);
      bar.style.maxHeight = newH + 'px';
    }
    e.preventDefault();
  }, { passive: false });

  bar.addEventListener('touchend', () => {
    if (dragging && !captureEl) finishDrag();
  });

  function finishDrag() {
    if (!dragging) return;
    const dy = (typeof lastClientY !== 'undefined') ? lastClientY - startY : 0;
    dragging = false;
    captureEl = null;
    bar.classList.remove('dragging');
    contentEl.style.overflowY = '';

    if (activeDrawer) {
      const currentH = bar.offsetHeight;
      if (currentH < startH * 0.6) {
        closeDrawer();
      } else {
        bar.style.transition = 'max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1)';
        bar.style.maxHeight = '85vh';
      }
    }
  }
})();

const NAMES = ["Zog", "Blorp", "Kev", "Larz", "Grom", "Vok", "Nebula", "Starla", "Rex", "Tkt"];
const ROLES = ["COMMAND", "OPERATIONS", "SCIENCE", "FORCE", "LOGISTICS"];

// ══════════════════════════════════════════════
// SABOTEUR SYSTEM
// ══════════════════════════════════════════════
const SABOTEUR_SPECIES = [
  "Vorrkai","Shreth","Nullian","Phaedrox","Kelthari",
  "Siphonite","Grethali","Vespuloid","Ondrivax","Skethian",
  "Lurathi","Xenoveil","Delvanak","Wraithkin","Pallowform",
  "Echocyte","Sornveth","Vestigant","Calvreth","Umbralite"
];
// Track next saboteur day: randomised between 4-5 days after last appearance


let state = { day: 1, money: 800, pool: [], roster: [], mission: null, ship: null, gameOver: false, speciesOrder: [],
  missionLog: [],      // { day, score, success } per mission
  allTimeHires: {},    // { race: count } all-time
  totalEarned: 0,      // cumulative credits earned (positive payouts only)
  nextSaboteurDay: 14  // first saboteur appears day 14 or 15 (randomised at startDay)
};

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// ══════════════════════════════════════════════
// APPLICANT GENERATION
// ══════════════════════════════════════════════

function generateApplicantForRace(id, raceKey) {
  const savedDay = state.day;
  state.day = 1; // ensure day-1 stat ranges
  const app = generateApplicant(id, raceKey);
  state.day = savedDay;
  return app;
}

function generateSaboteur(id) {
  // Pick random fake species name
  const fakeName = SABOTEUR_SPECIES[rand(0, SABOTEUR_SPECIES.length - 1)];
  // Pick a name from any existing species pool
  const allRaceKeys = Object.keys(NAME_MAP).filter(k => NAME_MAP[k] && NAME_MAP[k].length > 1);
  const randomRaceKey = allRaceKeys[rand(0, allRaceKeys.length - 1)];
  const nameArr = NAME_MAP[randomRaceKey].filter(Boolean);
  const borrowedName = nameArr[rand(0, nameArr.length - 1)];
  // Portrait from saboteur folder (1-30)
  const portraitNum = rand(1, 30);
  const portrait = `images/saboteur/saboteur_portrait_${portraitNum}.png`;
  // High stats — always strong in mission-relevant skills
  const m = state.mission;
  let str = rand(35, 55), int = rand(35, 55), cha = rand(35, 55);
  // Boost mission-relevant stats to make it tempting
  if (m) {
    m.reqs.forEach(s => {
      if (s === 'str') str = rand(55, 80);
      else if (s === 'int') int = rand(55, 80);
      else if (s === 'cha') cha = rand(55, 80);
    });
  }
  const hate = rand(0, 40); // low hate so it doesn't raise suspicion
  const exp = ROLES[rand(0, ROLES.length - 1)];
  const cost = rand(90, 115);
  return {
    id: id,
    name: borrowedName,
    race: fakeName,       // fake species — not in manual
    isSaboteur: true,
    str, int, cha, hate, exp,
    portrait,
    cost,
    icon: null            // no real icon — will be resolved at slot-render time
  };
}

function generateApplicant(id, forceRace) {
  const races = Object.keys(RACES);
  let available = races.slice(0, Math.min(6 + Math.floor(state.day/2), races.length));
  const raceKey = forceRace || available[rand(0, available.length - 1)];
  const rd = RACES[raceKey];
  let str = rand(rd.str[0], rd.str[1]);
  let int = rand(rd.int[0], rd.int[1]);
  let cha = rand(rd.cha[0], rd.cha[1]);
  let hate = rand(0, 100);

  if (raceKey === "Sugorian") hate = rand(0, 50);
  if (raceKey === "Blorg") hate = rand(0, 20);
  if (raceKey === "Sky-Elf") { int = Math.max(str, cha) + rand(1, 10); }
  if (raceKey === "Human") { while (str === int && int === cha) { str++; } }
  if (raceKey === "Beetlegunner") { str = Math.max(str, cha + 1); }
  if (raceKey === "Giant") { str = Math.max(str, int + cha + rand(1, 10)); }
  if (raceKey === "Robomantoid") { hate = rand(20, 100); }
  if (raceKey === "Barbitulian") { int = cha; }
  if (raceKey === "Cheesponge" || raceKey === "Aquasim") { str = Math.min(int, cha) - rand(1, 5); if (str < 1) str = 1; }
  if (raceKey === "Space-Cat") { cha = Math.max(str, int) + rand(1, 10); }
  if (raceKey === "Velkhorian") { hate = rand(0, 60); }
  if (raceKey === "Fungi") { hate = rand(80, 100); }
  if (raceKey === "Drakhen") {
    // 30% chance of a surprisingly low-hate Drakhen
    if (Math.random() < 0.30) hate = rand(10, 20);
    // Trait: always highest stats in pool — enforce minimums
    str = Math.max(str, 60);
    int = Math.max(int, 55);
    cha = Math.max(cha, 35);
  }

  // Cost multipliers by compatibility
  let baseCost = Math.floor((str + int + cha) * 1.5) + rand(5, 15);
  if (raceKey !== "Drakhen") {
    // Hate modifier: low hate = stable = premium, high hate = discount
    if (hate <= 30) {
      const premium = 0.10 + (1 - hate / 30) * 0.10;
      baseCost = Math.round(baseCost * (1 + premium));
    } else if (hate >= 70) {
      const discount = 0.05 + ((hate - 70) / 30) * 0.10;
      baseCost = Math.round(baseCost * (1 - discount));
    }
    // Species compatibility modifier (applied on top)
    const PRICE_UP   = ["Human", "Barbitulian", "Space-Cat", "Velkhorian", "Void-Demon"];
    const PRICE_DOWN = ["Robomantoid", "Fungi", "Giant", "Oak-Person", "Squid", "Beetlegunner"];
    if (PRICE_UP.includes(raceKey)) {
      baseCost = Math.round(baseCost * (1.05 + Math.random() * 0.10));
    } else if (PRICE_DOWN.includes(raceKey)) {
      baseCost = Math.round(baseCost * (0.85 + Math.random() * 0.10));
    }
  }
  if (raceKey === "Drakhen") { int = str; }
  if (raceKey === "Void-Demon") { cha = str + rand(1, 10); hate = rand(0, 10); }
  if (raceKey === "Oak-Person") { cha = rand(1, 4); }
  if (raceKey === "Long-Neck" || raceKey === "Squid") { int = str + rand(1, 10); }
  if (raceKey === "Sodio") { str = Math.max(str, int + 1); }

  // Day 20+ stat scaling: +1 per stat every 2 days beyond day 20, capped at +15
  if (state.day >= 20) {
    const bonus = Math.min(15, Math.floor((state.day - 20) / 2) + 1);
    str += bonus;
    int += bonus;
    cha += bonus;
  }

  const safeRaceName = raceKey.toLowerCase().replace(/-/g, '');
  const maxImgs = rd.images || 12;
  const portraitVariant = rand(1, maxImgs);
  let mappedName = getNameFor(raceKey, portraitVariant);
  let finalName = mappedName ? mappedName : NAMES[rand(0, NAMES.length - 1)];
  if (raceKey === "Droid" && !mappedName) { finalName += "-" + rand(1, 99); }

  return {
    id: id, name: finalName, race: raceKey,
    str: str, int: int, cha: cha, hate: hate,
    exp: ROLES[rand(0, ROLES.length - 1)],
    portrait: `images/${safeRaceName}/${safeRaceName}_portrait_${portraitVariant}.png`,
    cost: baseCost
  };
}

function generateMission() {
  const types = [
    { id: "ASSAULT", stat: ["str"], t: 1, titles: ["Direct fleet engagement", "Pirate suppression", "Orbital defense"] },
    { id: "DIPLOMACY", stat: ["cha"], t: 1, titles: ["Treaty signing", "Trade negotiations", "Gala attendance"] },
    { id: "RESEARCH", stat: ["int"], t: 1, titles: ["Analyzing black holes", "Studying alien flora", "Mapping nebulae"] },
    { id: "RESCUE OP", stat: ["str", "int"], t: 2, titles: ["Extracting survivors from collapsing stations"] },
    { id: "SALVAGE", stat: ["str", "int"], t: 2, titles: ["Breaking apart derelict Dreadnoughts"] },
    { id: "TERRAFORMING", stat: ["str", "int"], t: 2, titles: ["Deploying atmospheric processors"] },
    { id: "ESPIONAGE", stat: ["int", "cha"], t: 2, titles: ["Infiltrating corporate HQs"] },
    { id: "FIRST CONTACT", stat: ["int", "cha"], t: 2, titles: ["Meeting new species"] },
    { id: "SMUGGLING", stat: ["int", "cha"], t: 2, titles: ["Moving contraband"] },
    { id: "ENFORCEMENT", stat: ["str", "cha"], t: 2, titles: ["Policing lawless sectors"] },
    { id: "VIP PROTECTION", stat: ["str", "cha"], t: 2, titles: ["Escorting dignitaries"] },
    { id: "WARLORD HUNT", stat: ["str", "cha"], t: 2, titles: ["Tracking sector kingpins"] },
    { id: "COLONIZATION", stat: ["str", "int", "cha"], t: 3, titles: ["Establishing a foothold on a hostile world"] },
    { id: "THE GRAND HEIST", stat: ["str", "int", "cha"], t: 3, titles: ["Breaking into a floating fortress"] },
    { id: "PLANETARY EVACUATION", stat: ["str", "int", "cha"], t: 3, titles: ["Saving a civilization from a supernova"] }
  ];
  let available = types.filter(mt => mt.t === 1);
  if (state.day > 4) available = available.concat(types.filter(mt => mt.t === 2));
  if (state.day > 8) available = available.concat(types.filter(mt => mt.t === 3));

  // Day 1: always STR only
  if (state.day === 1) available = types.filter(mt => mt.id === "ASSAULT");
  // Day 2-3: STR or INT only (no CHA)
  else if (state.day <= 3) available = types.filter(mt => mt.t === 1 && (mt.id === "ASSAULT" || mt.id === "RESEARCH"));
  // Day 10: force 1-stat mission so expReq is always triggered
  else if (state.day === 10) available = types.filter(mt => mt.t === 1);
  const m = available[rand(0, available.length - 1)];
  const title = m.titles[rand(0, m.titles.length - 1)];
  const targetBase = 45 + Math.floor(state.day * 7.5);
  const targetBaseCha = 45 + Math.floor(state.day * 3);
  let targets = {};
  m.stat.forEach(s => {
    const base = s === 'cha' ? targetBaseCha : targetBase;
    targets[s] = base + rand(-5, 5);
  });

  // Dynamic minReq from day 5 onwards; fixed progressive before
  let minReq;
  if (state.day < 7) {
    minReq = Math.min(95, 65 + Math.floor(state.day * 1.2));
  } else {
    const maxSlots = state.ship ? state.ship.max : 5;
    const avgTarget = m.stat.reduce((sum, s) => sum + targets[s], 0) / m.stat.length;
    const statCountBase = 90 - (m.stat.length - 1) * 12;
    const slotsPerTarget = maxSlots / avgTarget;
    const pressureAdj = Math.round((slotsPerTarget - 0.07) * 300);
    let rawMinReq = Math.round(Math.max(50, Math.min(95, statCountBase + pressureAdj)));

    // Lottery spike from day 15: occasionally a brutal mission hits regardless of formula
    if (state.day >= 15) {
      if (m.stat.length === 2 && Math.random() < 0.12) rawMinReq = 90;
      if (m.stat.length === 3 && Math.random() < 0.12) rawMinReq = 85;
    }

    minReq = rawMinReq;
  }

  // Experience requirement: only on 1-stat missions, from day 10
  // Day 10 mandatory, day 11+ 50% chance
  const EXP_REQ_MAP = {
    'ASSAULT':   'FORCE',
    'DIPLOMACY': 'COMMAND',
    'RESEARCH':  'SCIENCE'
  };
  let expReq = null;
  if (m.t === 1 && state.day >= 10) {
    if (state.day === 10 || Math.random() < 0.5) {
      expReq = EXP_REQ_MAP[m.id] || null;
    }
  }

  return { title: title, type: m.id, reqs: m.stat, targets: targets,
    minReq: minReq, expReq: expReq,
    reward: Math.round((500 + (state.day * 90)) * (m.stat.length === 1 && m.stat[0] === 'cha' ? 1.20 : 1.10)) };
}

function updateShip() {
  // Build ship table: {d, baseName, displayName, max, min}
  // PNG always uses baseName (e.g. "Cargo", "Dreadnought")
  const ships = [];
  let day = 1;
  let maxSlots = 5;

  const earlyMins = {
    'Speeder': 3, 'Courier': 4, 'Interceptor': 4,
    'Scout': 5, 'Shuttle': 5, 'Gunship': 6,
  };

  function addFlat(name, max, min) {
    for (let i = 0; i < 3; i++) {
      ships.push({ d: day++, base: name, display: name, x: max, m: min });
    }
  }

  function addClassed(name, classes) {
    for (let c = 1; c <= classes; c++) {
      ships.push({ d: day++, base: name, display: name + ' [class ' + c + ']', x: maxSlots, m: Math.round(maxSlots * 0.75) });
      maxSlots++;
    }
  }

  // Phase 1: flat ships x3
  addFlat('Speeder',     5, 3);
  addFlat('Courier',     6, 4);
  addFlat('Interceptor', 7, 4);
  addFlat('Scout',       8, 5);
  addFlat('Shuttle',     9, 5);
  addFlat('Gunship',    10, 6);

  // Phase 2: 3 classes each
  maxSlots = 11;
  addClassed('Cargo',      3);
  addClassed('Corvette',   3);
  addClassed('Transport',  3);

  // Phase 3: 5 classes each
  addClassed('Destroyer',       5);
  addClassed('Battleship',      5);
  addClassed('Battlecruiser',   5);
  addClassed('Assault Cruiser', 5);
  addClassed('Heavy Cruiser',   5);
  addClassed('Titan',           5);

  const dreadStart = day;
  const dreadMaxStart = maxSlots;

  const s = ships.find(s => s.d === state.day);
  if (s) {
    state.ship = { name: s.display, base: s.base, max: s.x, min: s.m };
  } else {
    // Dreadnought: +1 max every 2 days
    const cls = Math.floor((state.day - dreadStart) / 2) + 1;
    const maxSlotsDread = dreadMaxStart + Math.floor((state.day - dreadStart) / 2);
    state.ship = {
      name: 'Dreadnought [class ' + cls + ']',
      base: 'Dreadnought',
      max: maxSlotsDread,
      min: Math.round(maxSlotsDread * 0.75)
    };
  }

  state.roster = new Array(state.ship.max).fill(null);
}

function startDay() {
  updateShip();
  state.speciesOrder = [];
  state.mission = generateMission();
  state.pool = [];

  if (state.day === 1) {
    // Fixed Day 1 pool: 2 Humans, 1 Sky-Elf, 2 Droids, 1 Beetlegunner
    const day1Species = ["Human", "Human", "Sky-Elf", "Droid", "Droid", "Beetlegunner"];
    day1Species.forEach((race, i) => {
      state.pool.push(generateApplicantForRace(i, race));
    });
  } else {
    // Pool must be at least 15-20% more than max slots
    const minPool = Math.ceil(state.ship.max * (1.15 + Math.random() * 0.05));
    const poolSize = Math.max(6 + Math.floor(state.day / 2), minPool);
    let attempts = 0;
    while(state.pool.length < poolSize && attempts < 200) {
      let newApp = generateApplicant(state.pool.length);
      if (!state.pool.some(a => a.name === newApp.name)) state.pool.push(newApp);
      attempts++;
    }
    // Tiered Drakhen injection from day 16+
    if (state.day >= 16) {
      let drakhenMin, drakhenMax;
      if (state.day >= 25)      { drakhenMin = 5; drakhenMax = 8; }
      else if (state.day >= 20) { drakhenMin = 4; drakhenMax = 7; }
      else                      { drakhenMin = 3; drakhenMax = 5; }
      const target = rand(drakhenMin, drakhenMax);
      const current = state.pool.filter(a => a.race === 'Drakhen').length;
      const toInject = Math.max(0, target - current);
      let injectAttempts = 0;
      let injected = 0;
      while (injected < toInject && injectAttempts < 100) {
        const app = generateApplicantForRace(state.pool.length, 'Drakhen');
        injectAttempts++;
        if (state.pool.some(a => a.name === app.name)) continue;
        const insertAt = rand(0, state.pool.length);
        state.pool.splice(insertAt, 0, app);
        injected++;
      }
    }
    // Ensure at least 20% of pool has required experience if expReq exists
    if (state.mission.expReq) {
      const minExpCount = Math.ceil(state.pool.length * 0.20);
      const currentExpCount = state.pool.filter(a => a.exp === state.mission.expReq).length;
      const toInjectExp = Math.max(0, minExpCount - currentExpCount);
      let expAttempts = 0;
      let expInjected = 0;
      while (expInjected < toInjectExp && expAttempts < 100) {
        const app = generateApplicant(state.pool.length);
        expAttempts++;
        if (state.pool.some(a => a.name === app.name)) continue;
        app.exp = state.mission.expReq;
        const insertAt = rand(0, state.pool.length);
        state.pool.splice(insertAt, 0, app);
        expInjected++;
      }
    }

    // Saboteur injection from day 14+, every 4-5 days
    // Randomise first saboteur day on day 1 load
    if (state.day === 1) state.nextSaboteurDay = 14 + rand(0, 1);
    if (state.day >= 14 && state.day >= state.nextSaboteurDay) {
      const saboteur = generateSaboteur(state.pool.length);
      const insertAt = rand(0, state.pool.length);
      state.pool.splice(insertAt, 0, saboteur);
      state.nextSaboteurDay = state.day + 4 + rand(0, 1); // next in 4-5 days
    }

    // Re-assign ids to match final positions
    state.pool.forEach((a, idx) => { a.id = idx; });
  }

  // Reset scroll
  document.querySelector('.scroll-area').scrollTop = 0;
  const sr = document.getElementById('slots-row');
  if (sr) sr.scrollLeft = 0;
  updateUI();

  // Show briefing sheet for every day (day 1 handled by goToGame, day 2+ handled here)
  if (document.getElementById('top-bar').classList.contains('slid-in')) {
    // Bars already visible (day 2+): hide cards, show sheet
    document.getElementById('scroll-area').style.visibility = 'hidden';
    const rulesScreen = document.getElementById('screen-rules');
    rulesScreen.classList.remove('hidden');
    rulesScreen.style.transform = '';
    initRulesSheet();
  }
}

function tagBgSVG(w) {
  return `<svg class="mc-tag-bg" viewBox="0 0 ${w} 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;"><polygon fill="#000" points="0,2 2,2 2,0 ${w-2},0 ${w-2},2 ${w},2 ${w},18 ${w-2},18 ${w-2},20 2,20 2,18 0,18"/></svg>`;
}

function tagWidth(species) {
  const name = speciesName(species).toUpperCase();
  // ~7.2px per char for VT323 14px, minimum 48
  return Math.max(48, name.length * 8 + 8);
}

        <div class="mc-skills"><span class="${hl('str')}">${t('str')} ${app.str}</span><span class="${hl('int')}">${t('int')} ${app.int}</span><span class="${hl('cha')}">${t('cha')} ${app.cha}</span></div>
        <div class="mc-exp">${t('exp')}: ${roleName(app.exp)}</div>
