<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light only">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<title>Starship Recruiter</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --dither: conic-gradient(#000 0.25turn, transparent 0.25turn 0.5turn, #000 0.5turn 0.75turn, transparent 0.75turn);
  color-scheme: light only;
}

html, body {
  color-scheme: light only;
}

@media (prefers-color-scheme: dark) {
  html, body { background-color: #fff !important; color: #000 !important; }
  input, button, select, textarea { background-color: #fff !important; color: #000 !important; }
}

body {
  background-color: #fff;
  color: #000;
  background-image: radial-gradient(circle, #ccc 1px, transparent 1px);
  background-size: 16px 16px;
  font-family: "VT323", monospace;
  user-select: none;
  -webkit-user-select: none;
  overflow: hidden;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  color: #000;
}

/* ── TOP BAR ── */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: #fff;
  flex-shrink: 0;
  font-size: 20px;
  text-transform: uppercase;
  border-bottom: 2px solid #000;
  z-index: 50;
}
.top-title { font-weight: 700; }
.top-right { display: flex; gap: 16px; align-items: center; }
.top-cr { font-weight: 700; }

.debug-btn {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  font-size: 16px;
  opacity: 0.0;
}
.debug-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
}
.debug-panel {
  text-align: center;
  padding: 24px;
}
.debug-days {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 280px;
}
.debug-day-btn {
  width: 44px;
  height: 36px;
  border: 2px solid #000;
  background: #fff;
  font-family: "VT323", monospace;
  font-size: 18px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.debug-day-btn:active { background: #000; color: #fff; }

/* ── MAIN SCROLL AREA ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px 16px;
}

/* ── SECTION TITLE ROW ── */
.section-title-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.section-title {
  font-size: 20px;
  text-transform: uppercase;
  font-weight: bold;
}
.section-payroll {
  font-size: 20px;
  font-weight: 700;
}

/* ── MISSION PANEL ── */
.mission-card {
  position: relative;
  padding: 12px;
  margin-bottom: 16px;
  background: #fff;
  border: none;
  box-shadow: inset 0 0 0 2px #000;
  clip-path: polygon(
    0 4px, 2px 4px, 2px 2px, 4px 2px, 4px 0,
    calc(100% - 4px) 0, calc(100% - 4px) 2px, calc(100% - 2px) 2px, calc(100% - 2px) 4px, 100% 4px,
    100% calc(100% - 4px), calc(100% - 2px) calc(100% - 4px), calc(100% - 2px) calc(100% - 2px), calc(100% - 4px) calc(100% - 2px), calc(100% - 4px) 100%,
    4px 100%, 4px calc(100% - 2px), 2px calc(100% - 2px), 2px calc(100% - 4px), 0 calc(100% - 4px)
  );
}
.mission-type {
  background: #000; color: #fff; padding: 3px 8px; display: inline-block;
  font-size: 16px; text-transform: uppercase; margin-bottom: 8px;
}
.mission-title { font-size: 22px; font-weight: bold; line-height: 1.1; margin-bottom: 8px; }
.mission-detail { font-size: 18px; margin-top: 6px; }
.mission-req-tag {
  background: #000; color: #fff; padding: 3px 6px; display: inline-block;
  font-size: 16px; text-transform: uppercase; margin-right: 4px; margin-bottom: 4px;
}

.ship-preview {
  background: #000;
  width: 100%;
  height: 130px;
  margin-bottom: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  clip-path: polygon(
    0 4px, 2px 4px, 2px 2px, 4px 2px, 4px 0,
    calc(100% - 4px) 0, calc(100% - 4px) 2px, calc(100% - 2px) 2px, calc(100% - 2px) 4px, 100% 4px,
    100% calc(100% - 4px), calc(100% - 2px) calc(100% - 4px), calc(100% - 2px) calc(100% - 2px), calc(100% - 4px) calc(100% - 2px), calc(100% - 4px) 100%,
    4px 100%, 4px calc(100% - 2px), 2px calc(100% - 2px), 2px calc(100% - 4px), 0 calc(100% - 4px)
  );
}
.ship-preview img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
}

/* Manual entries */
.manual-entry {
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 2px dotted #000;
}
.manual-name {
  font-size: 20px;
  font-weight: bold;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.manual-icon {
  width: 24px; height: 24px;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.manual-icon img { width: 18px; height: 18px; image-rendering: pixelated; }
.manual-desc { font-size: 17px; line-height: 1.1; margin-top: 2px; }
.manual-hates { font-size: 17px; margin-top: 2px; }

/* ── CARDS GRID ── */
.cards-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ── CARD ── */
.mc-wrap {
  position: relative;
  aspect-ratio: 168 / 210;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: transform 0.15s ease;
}
.mc-wrap:active { transform: scale(0.96); }
.mc-wrap.bounce { animation: cardBounce 0.2s ease; }
@keyframes cardBounce {
  0% { transform: scale(1); }
  40% { transform: scale(0.95); }
  100% { transform: scale(1); }
}

.mc-border {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 3;
}

.mc-inner {
  position: absolute;
  top: 2px; left: 2px; right: 2px; bottom: 2px;
  background: #fff;
  padding: 6px 8px 5px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
}

/* Selected state: dither overlay — card stays in pool */
.mc-dither {
  position: absolute;
  top: 2px; left: 2px; right: 2px; bottom: 2px;
  background-image: var(--dither);
  background-size: 2px 2px;
  z-index: 4;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.05s;
}
.mc-wrap.selected .mc-dither { opacity: 1; }

.mc-hired {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 5;
  pointer-events: none;
}
.mc-hired span {
  font-family: 'Press Start 2P', cursive;
  font-size: 16px;
  color: #fff;
  text-transform: uppercase;
}
.mc-wrap.selected .mc-hired { display: flex; }

.mc-cost-float {
  position: absolute;
  left: 0; right: 0;
  top: 35%;
  text-align: center;
  font-family: 'VT323', monospace;
  font-size: 20px;
  color: #fff;
  z-index: 6;
  pointer-events: none;
  animation: costFloat 0.6s ease-out forwards;
}
@keyframes costFloat {
  0% { opacity: 1; transform: translateY(0); }
  70% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-40px); }
}

.mc-head { display: flex; justify-content: space-between; align-items: center; }
.mc-name { font-size: 17px; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.mc-tag {
  position: relative;
  display: inline-flex;
  align-items: center;
  padding: 3px 6px;
  background: transparent;
  line-height: 1;
  min-width: 0;
  flex-shrink: 0;
}
.mc-tag-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: visible;
}
.mc-tag-text { font-size: 14px; color: #fff; line-height: 1; text-transform: uppercase; }

.mc-portrait { width: 100%; height: 108px; overflow: hidden; flex-shrink: 0; }
.mc-portrait img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; pointer-events: none; }

.mc-skills { font-size: 15px; display: flex; justify-content: space-between; width: 100%; }
.mc-skills .hi-stat { font-weight: bold; text-decoration: underline; }
.mc-exp { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.mc-div { height: 2px; border: none; background-image: linear-gradient(to right, #000 2px, transparent 2px); background-size: 4px 2px; background-repeat: repeat-x; flex-shrink: 0; margin-top: auto; }

.mc-foot { display: flex; justify-content: space-between; align-items: center; gap: 4px; }

.mc-hate-row { display: flex; align-items: center; gap: 3px; flex: 1; min-width: 0; }
.mc-hate-label { font-size: 15px; line-height: 1; white-space: nowrap; flex-shrink: 0; }
.mc-hate-bar-track {
  width: 30px; height: 8px;
  position: relative; flex-shrink: 0;
  border: 2px solid #000; overflow: hidden;
}
.mc-hate-bar-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  background-image: var(--dither);
  background-size: 2px 2px;
}
.mc-hate-pct { font-size: 15px; line-height: 1; white-space: nowrap; flex-shrink: 0; }
.mc-hate-pct.high { font-weight: 700; }

.mc-salary { font-size: 15px; font-weight: 700; flex-shrink: 0; }

/* ── BOTTOM BAR (compact — no crew count) ── */
.bottom-bar {
  background: #fff;
  padding: 8px 16px 14px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  border-top: 2px solid #000;
  position: relative;
  z-index: 60;
}

/* ── BUTTON ROW ── */
.btn-row {
  display: flex;
  gap: 8px;
  align-items: center;
  width: 100%;
}
.btn-row .launch-btn {
  margin-left: auto;
}

/* ── ICON BUTTONS (mission / manual) with pixel staircase corners ── */
.icon-btn {
  width: 48px;
  height: 40px;
  flex-shrink: 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  background: #fff;
  border: none;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.icon-btn-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.icon-btn img {
  width: 36px;
  height: 36px;
  image-rendering: pixelated;
  pointer-events: none;
  position: relative;
  z-index: 1;
}
.icon-btn.active .icon-btn-bg polygon { fill: #000; stroke: #000; }
.icon-btn.bounce { animation: btnBounce 0.2s ease; }
@keyframes btnBounce {
  0% { transform: scale(1); }
  40% { transform: scale(0.9); }
  100% { transform: scale(1); }
}

/* ── DRAWER OVERLAY ── */
.drawer-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, #999 1px, transparent 1px);
  background-size: 4px 4px;
  background-color: rgba(255,255,255,0.7);
  z-index: 55;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.drawer-overlay.visible { display: block; }

/* ── BOTTOM BAR — expandable ── */
.bottom-bar {
  background: #fff;
  padding: 8px 16px 14px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  border-top: 2px solid #000;
  position: relative;
  z-index: 60;
  transition: none;
}

/* When expanded: fixed to bottom, animates max-height */
.bottom-bar.expanded {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  max-height: 85vh;
  transition: max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1);
  overflow: hidden;
  align-items: stretch;
}
.bottom-bar.dragging {
  transition: none;
}

/* Handle — only visible when expanded */
.bar-handle {
  display: none;
  width: 100%;
  padding: 8px 0 4px;
  justify-content: center;
  align-items: center;
  flex-shrink: 0;
  cursor: grab;
  touch-action: none;
}
.bottom-bar.expanded .bar-handle { display: flex; }
.bar-handle-line {
  width: 40px;
  height: 2px;
  background: #000;
}

/* Expandable content area */
.bar-content {
  display: none;
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 4px 10px 8px;
  min-height: 0;
}
.bottom-bar.expanded .bar-content { display: block; }

/* Slots row — hidden when drawer expanded */
.bottom-bar.expanded .slots-row { display: none !important; }
.bottom-bar.expanded .launch-warning { display: none !important; }

/* ── SLOTS ROW ── */
.slots-row { display: flex; gap: 8px; flex-shrink: 0; align-items: center; overflow-x: auto; -webkit-overflow-scrolling: touch; touch-action: pan-x; padding-bottom: 2px; width: calc(100% + 16px); margin-right: -16px; scrollbar-width: none; }
.slots-row::-webkit-scrollbar { display: none; }

.slot {
  width: 50px;
  height: 50px;
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: pan-x;
  flex-shrink: 0;
  background-image:
    linear-gradient(to right, #000 50%, transparent 50%),
    linear-gradient(to bottom, #000 50%, transparent 50%),
    linear-gradient(to right, #000 50%, transparent 50%),
    linear-gradient(to bottom, #000 50%, transparent 50%);
  background-size: 4px 2px, 2px 4px, 4px 2px, 2px 4px;
  background-position: top, right, bottom, left;
  background-repeat: repeat-x, repeat-y, repeat-x, repeat-y;
  transition: background-color 0.15s;
}
.slot.filled {
  background-image: none;
  background-color: transparent;
}
.slot-fill-bg { display: none; }
.slot.filled .slot-fill-bg { display: block; }

/* +N overflow indicator */
/* ── LAUNCH BUTTON ── */
.launch-btn {
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  background: none;
  border: none;
  padding: 0;
  font-family: "VT323", monospace;
  height: 40px;
  flex-shrink: 0;
  touch-action: manipulation;
  margin: 0 4px;
  clip-path: polygon(
    0 4px, 2px 4px, 2px 2px, 4px 2px, 4px 0,
    calc(100% - 4px) 0, calc(100% - 4px) 2px, calc(100% - 2px) 2px, calc(100% - 2px) 4px, 100% 4px,
    100% calc(100% - 4px), calc(100% - 2px) calc(100% - 4px), calc(100% - 2px) calc(100% - 2px), calc(100% - 4px) calc(100% - 2px), calc(100% - 4px) 100%,
    4px 100%, 4px calc(100% - 2px), 2px calc(100% - 2px), 2px calc(100% - 4px), 0 calc(100% - 4px)
  );
}
.launch-btn-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.launch-btn-text {
  position: relative;
  z-index: 1;
  color: #fff;
  font-size: 20px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: "VT323", monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 16px;
  height: 100%;
}
.launch-btn:active .launch-btn-bg polygon { fill: #333; }
.launch-btn.bounce { animation: btnBounce 0.2s ease; }
.launch-btn.disabled {
  pointer-events: none;
  clip-path: none;
}
.launch-btn.disabled .launch-btn-bg { display: none; }
.launch-btn.disabled .launch-btn-text {
  color: #000;
  background-image:
    linear-gradient(to right, #000 50%, transparent 50%),
    linear-gradient(to bottom, #000 50%, transparent 50%),
    linear-gradient(to right, #000 50%, transparent 50%),
    linear-gradient(to bottom, #000 50%, transparent 50%);
  background-size: 4px 2px, 2px 4px, 4px 2px, 2px 4px;
  background-position: top, right, bottom, left;
  background-repeat: repeat-x, repeat-y, repeat-x, repeat-y;
}

.launch-warning {
  display: none;
  font-size: 16px;
  text-align: center;
  font-weight: bold;
}

/* ── RESULT OVERLAY ── */
.result-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.92);
  z-index: 200;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.result-overlay.visible { display: flex; }

.result-modal {
  background: #fff;
  border: 4px solid #000;
  padding: 20px;
  width: 100%;
  max-width: 360px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  box-shadow: 6px 6px 0 #000;
}
.result-modal h2 {
  font-size: 24px;
  text-transform: uppercase;
  border-bottom: 2px solid #000;
  padding-bottom: 6px;
  margin-bottom: 10px;
}
.result-score {
  font-size: 56px;
  font-weight: bold;
  text-align: center;
  margin: 8px 0;
}
.result-msg {
  font-size: 20px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 12px;
}
.result-log {
  border: 2px dashed #000;
  max-height: 160px;
  overflow-y: auto;
  padding: 8px;
  font-size: 15px;
  margin-bottom: 16px;
  background: #fafafa;
  flex-shrink: 1;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <span class="top-title">STARSHIP//RECRUITER</span>
  <span class="debug-btn" onclick="openDebug()">[=]</span>
  <div class="top-right">
    <span class="top-day">DAY <span id="ui-day">1</span></span>
    <span class="top-cr"><span id="ui-money">800</span> CR</span>
  </div>
</div>

<!-- DEBUG OVERLAY -->
<div class="debug-overlay" id="debug-overlay" style="display:none;">
  <div class="debug-panel">
    <div style="font-size:20px;font-weight:bold;margin-bottom:12px;">DEBUG</div>
    <div style="font-size:16px;margin-bottom:8px;">JUMP TO DAY</div>
    <div class="debug-days" id="debug-days"></div>
    <div style="font-size:16px;margin-top:16px;margin-bottom:8px;">SET CREDITS</div>
    <div style="display:flex;gap:8px;align-items:center;justify-content:center;">
      <input id="debug-credits" type="number" min="0" max="10000" style="width:100px;height:36px;border:2px solid #000;font-family:'VT323',monospace;font-size:18px;text-align:center;background:#fff;color:#000;">
      <button class="debug-day-btn" style="width:auto;padding:0 10px;" onclick="debugSetCredits()">SET</button>
    </div>
    <div style="margin-top:16px;"><span class="debug-btn" onclick="closeDebug()">[CLOSE]</span></div>
  </div>
</div>

<!-- SCROLLABLE AREA (always applicants) -->
<div class="scroll-area">
  <div class="section-title-row">
    <div class="section-title" id="pool-title">APPLICANTS [0]</div>
    <div class="section-payroll">HIRED [<span id="ui-hired">0</span>/<span id="ui-max-slots">0</span>]</div>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
</div>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottom-bar">
  <div class="bar-handle" id="bar-handle">
    <div class="bar-handle-line"></div>
  </div>
  <div class="bar-content" id="bar-content"></div>
  <div class="slots-row" id="slots-row"></div>
  <div class="launch-warning" id="launch-warning">HIRE CREW TO LAUNCH</div>
  <div class="btn-row">
    <button class="icon-btn" id="btn-manual" onclick="toggleDrawer('manual')">
      <svg class="icon-btn-bg" viewBox="0 0 48 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><polygon fill="none" stroke="#000" stroke-width="2" points="1,4 3,4 3,2 5,2 5,1 43,1 43,2 45,2 45,4 47,4 47,36 45,36 45,38 43,38 43,39 5,39 5,38 3,38 3,36 1,36"/></svg>
      <img id="icon-manual" src="images/manual_default.png">
    </button>
    <button class="icon-btn" id="btn-mission" onclick="toggleDrawer('mission')">
      <svg class="icon-btn-bg" viewBox="0 0 48 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><polygon fill="none" stroke="#000" stroke-width="2" points="1,4 3,4 3,2 5,2 5,1 43,1 43,2 45,2 45,4 47,4 47,36 45,36 45,38 43,38 43,39 5,39 5,38 3,38 3,36 1,36"/></svg>
      <img id="icon-mission" src="images/mission_default.png">
    </button>
    <button class="launch-btn disabled" id="btn-launch" onclick="launchMission()">
      <svg class="launch-btn-bg" viewBox="0 0 200 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><polygon fill="#000" points="0,4 2,4 2,2 4,2 4,0 196,0 196,2 198,2 198,4 200,4 200,36 198,36 198,38 196,38 196,40 4,40 4,38 2,38 2,36 0,36"/></svg>
      <span class="launch-btn-text">Launch Mission</span>
    </button>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div class="result-overlay" id="result-overlay">
  <div class="result-modal">

      <span class="launch-btn-text">Continue</span>

<script>
// ══════════════════════════════════════════════
// EXPANDABLE BOTTOM BAR
// ══════════════════════════════════════════════

let activeDrawer = null; // 'mission' | 'manual' | null
let collapsedHeight = 0;

function toggleDrawer(type) {
  // Bounce the tapped button
  const btnId = type === 'mission' ? 'btn-mission' : 'btn-manual';
  const btn = document.getElementById(btnId);
  if (btn) { btn.classList.remove('bounce'); requestAnimationFrame(() => btn.classList.add('bounce')); }

  if (activeDrawer === type) {
    closeDrawer();
    return;
  }
  openDrawer(type);
}

function openDrawer(type) {
  const bar = document.getElementById('bottom-bar');
  const overlay = document.getElementById('drawer-overlay');
  const content = document.getElementById('bar-content');

  // If switching between panels while already open
  if (activeDrawer && activeDrawer !== type) {
    content.innerHTML = type === 'mission' ? getMissionHTML() : getManualHTML();
    activeDrawer = type;
    updateIconButtons();
    return;
  }

  activeDrawer = type;

  // Remember collapsed height before expanding
  collapsedHeight = bar.offsetHeight;

  // Populate content
  content.innerHTML = type === 'mission' ? getMissionHTML() : getManualHTML();

  // Update icons
  updateIconButtons();

  // Set initial max-height to collapsed size, then expand
  bar.style.maxHeight = collapsedHeight + 'px';
  bar.classList.add('expanded');
  overlay.classList.add('visible');

  // Next frame: animate to full content height
  requestAnimationFrame(() => {
    bar.style.transition = 'max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1)';
    bar.style.maxHeight = '85vh';
  });
}

function closeDrawer() {
  const bar = document.getElementById('bottom-bar');
  const overlay = document.getElementById('drawer-overlay');

  // Animate back to collapsed height
  bar.style.transition = 'max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1)';
  bar.style.maxHeight = collapsedHeight + 'px';
  overlay.classList.remove('visible');

  activeDrawer = null;
  updateIconButtons();

  // After animation, remove expanded state
  setTimeout(() => {
    bar.classList.remove('expanded');
    bar.style.maxHeight = '';
    bar.style.transition = '';
    renderSlots();
    updateLaunchState();
  }, 210);
}

function updateIconButtons() {
  const mBtn = document.getElementById('btn-mission');
  const mImg = document.getElementById('icon-mission');
  const aBtn = document.getElementById('btn-manual');
  const aImg = document.getElementById('icon-manual');

  const mActive = activeDrawer === 'mission';
  const aActive = activeDrawer === 'manual';

  if (mBtn) { mBtn.classList.toggle('active', mActive); mImg.src = mActive ? 'images/mission_selected.png' : 'images/mission_default.png'; }
  if (aBtn) { aBtn.classList.toggle('active', aActive); aImg.src = aActive ? 'images/manual_selected.png' : 'images/manual_default.png'; }
}

function getMissionHTML() {
  const m = state.mission;
  let reqHTML = m.reqs.map(r => `<span class="mission-req-tag">${r.toUpperCase()}: ${m.targets[r]}</span>`).join(" ");
  const shipSrc = `images/ships_${state.ship.name.toLowerCase().replace(/\s+/g, '_')}.png`;
  return `
    <div class="section-title" style="margin-bottom:10px;">MISSION INTEL</div>
    <div class="mission-card">
      <div class="mission-type">${m.type}</div>
      <div class="mission-title">${m.title}</div>
      <div class="mission-detail">${reqHTML}</div>
      <div class="mission-detail">MIN SUCCESS: <strong>${m.minReq}%</strong></div>
      <div class="mission-detail">REWARD: <strong>${m.reward} CR</strong></div>
    </div>
    <div class="section-title" style="margin-bottom:10px;">YOUR SHIP</div>
    <div class="ship-preview"><img src="${shipSrc}" alt="Ship" style="max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated;" onerror="this.style.display='none'"></div>
    <div style="font-size:20px; margin-bottom:8px;">${state.ship.name} [${state.roster.filter(a=>a).length}/${state.ship.max}]</div>
    <div style="font-size:18px;">MIN CREW: <strong>${state.ship.min}</strong></div>
  `;
}

function getManualHTML() {
  let html = '<div class="section-title" style="margin-bottom:10px;">XENO-BIOLOGY MANUAL</div>';
  let availableRaces = [];
  state.pool.forEach(p => { if(!availableRaces.includes(p.race)) availableRaces.push(p.race); });
  availableRaces.forEach(rKey => {
    const rd = RACES[rKey];
    html += `
      <div class="manual-entry">
        <div class="manual-name">
          <div class="manual-icon"><img src="${rd.icon}" alt="${rKey}" onerror="this.style.display='none'"></div>
          ${rKey}
        </div>
        <div class="manual-desc">${rd.desc}</div>
        <div class="manual-hates">HATES: <strong>${rd.hates.join(", ")}</strong></div>
      </div>`;
  });
  return html;
}

function syncAllSlots() {
  renderSlots();
  updateLaunchState();
}

// ── PULL-DOWN GESTURE on the expanded bar ──
(function() {
  const bar = document.getElementById('bottom-bar');
  const handle = document.getElementById('bar-handle');
  const contentEl = document.getElementById('bar-content');
  let startY = 0, startH = 0, dragging = false, captureEl = null;

  function beginDrag(e, el) {
    startY = e.clientY;
    startH = bar.offsetHeight;
    dragging = true;
    captureEl = el;
    bar.classList.add('dragging');
    bar.style.transition = 'none';
    try { el.setPointerCapture(e.pointerId); } catch(ex) {}
  }

  // Handle always initiates drag
  handle.addEventListener('pointerdown', (e) => {
    if (!activeDrawer) return;
    beginDrag(e, handle);
    e.preventDefault();
  });

  // Content initiates drag only when scrolled to top and pulling down
  let contentStartY = 0, contentMaybeDrag = false;
  contentEl.addEventListener('touchstart', (e) => {
    if (!activeDrawer) return;
    if (contentEl.scrollTop <= 0) {
      contentStartY = e.touches[0].clientY;
      contentMaybeDrag = true;
    }
  }, { passive: true });

  contentEl.addEventListener('touchmove', (e) => {
    if (!contentMaybeDrag || dragging) return;
    const dy = e.touches[0].clientY - contentStartY;
    if (dy > 10 && contentEl.scrollTop <= 0) {
      // Intercept scroll — start drag
      contentMaybeDrag = false;
      startY = e.touches[0].clientY;
      startH = bar.offsetHeight;
      dragging = true;
      bar.classList.add('dragging');
      bar.style.transition = 'none';
      contentEl.style.overflowY = 'hidden';
      e.preventDefault();
    } else if (dy < -5) {
      contentMaybeDrag = false; // scrolling up, not a drag
    }
  }, { passive: false });

  contentEl.addEventListener('touchend', () => {
    contentMaybeDrag = false;
    finishDrag();
  });

  // Pointer events on bar for handle-initiated drags
  bar.addEventListener('pointermove', (e) => {
    if (!dragging || !captureEl) return;
    const dy = e.clientY - startY;
    if (dy < 0) return;
    if (activeDrawer) {
      const newH = Math.max(collapsedHeight || 80, startH - dy);
      bar.style.maxHeight = newH + 'px';
    }
    // For slots, we just track dy to decide whether to dismiss
  });

  bar.addEventListener('pointerup', () => {
    if (captureEl) finishDrag();
  });

  bar.addEventListener('pointercancel', () => {
    if (captureEl) {
      dragging = false;
      captureEl = null;
      bar.classList.remove('dragging');
      if (activeDrawer) {
        bar.style.transition = 'max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1)';
        bar.style.maxHeight = '85vh';
      }
    }
  });

  // Touch events on bar for content-initiated drags
  bar.addEventListener('touchmove', (e) => {
    if (!dragging || captureEl) return;
    const dy = e.touches[0].clientY - startY;
    if (dy < 0) return;
    if (activeDrawer) {
      const newH = Math.max(collapsedHeight || 80, startH - dy);
      bar.style.maxHeight = newH + 'px';
    }
    e.preventDefault();
  }, { passive: false });

  bar.addEventListener('touchend', () => {
    if (dragging && !captureEl) finishDrag();
  });

  function finishDrag() {
    if (!dragging) return;
    const dy = (typeof lastClientY !== 'undefined') ? lastClientY - startY : 0;
    dragging = false;
    captureEl = null;
    bar.classList.remove('dragging');
    contentEl.style.overflowY = '';

    if (activeDrawer) {
      const currentH = bar.offsetHeight;
      if (currentH < startH * 0.6) {
        closeDrawer();
      } else {
        bar.style.transition = 'max-height 0.2s cubic-bezier(0.2, 0, 0.3, 1)';
        bar.style.maxHeight = '85vh';
      }
    }
  }
})();

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// ══════════════════════════════════════════════
// APPLICANT GENERATION
// ══════════════════════════════════════════════

function generateApplicant(id) {
  const races = Object.keys(RACES);
  let available = races.slice(0, Math.min(6 + Math.floor(state.day/2), races.length));
  const raceKey = available[rand(0, available.length - 1)];
  const rd = RACES[raceKey];
  let str = rand(rd.str[0], rd.str[1]);
  let int = rand(rd.int[0], rd.int[1]);
  let cha = rand(rd.cha[0], rd.cha[1]);
  let hate = rand(0, 100);

  if (raceKey === "Sugorian") hate = rand(0, 50);
  if (raceKey === "Blorg") hate = rand(0, 20);
  if (raceKey === "Sky-Elf") { int = Math.max(str, cha) + rand(1, 10); }
  if (raceKey === "Human") { while (str === int && int === cha) { str++; } }
  if (raceKey === "Beetlegunner") { str = Math.max(str, cha + 1); }
  if (raceKey === "Giant") { str = Math.max(str, int + cha + rand(1, 10)); }
  if (raceKey === "Robomantoid") { hate = rand(20, 100); }
  if (raceKey === "Barbitulian") { int = cha; }
  if (raceKey === "Cheesponge" || raceKey === "Aquasim") { str = Math.min(int, cha) - rand(1, 5); if (str < 1) str = 1; }
  if (raceKey === "Space-Cat") { cha = Math.max(str, int) + rand(1, 10); }
  if (raceKey === "Velkhorian") { hate = rand(0, 60); }
  if (raceKey === "Fungi" || raceKey === "Drakhen") { hate = rand(80, 100); }
  if (raceKey === "Drakhen") { int = str; }
  if (raceKey === "Void-Demon") { cha = str + rand(1, 10); hate = rand(0, 10); }
  if (raceKey === "Oak-Person") { cha = rand(1, 4); }
  if (raceKey === "Long-Neck" || raceKey === "Squid") { int = str + rand(1, 10); }
  if (raceKey === "Sodio") { str = Math.max(str, int + 1); }

  const safeRaceName = raceKey.toLowerCase().replace(/-/g, '');
  const maxImgs = rd.images || 12;
  const portraitVariant = rand(1, maxImgs);
  let mappedName = getNameFor(raceKey, portraitVariant);
  let finalName = mappedName ? mappedName : NAMES[rand(0, NAMES.length - 1)];
  if (raceKey === "Droid" && !mappedName) { finalName += "-" + rand(1, 99); }

  return {
    id: id, name: finalName, race: raceKey,
    str: str, int: int, cha: cha, hate: hate,
    exp: ROLES[rand(0, ROLES.length - 1)],
    portrait: `images/${safeRaceName}/${safeRaceName}_portrait_${portraitVariant}.png`,
    cost: Math.floor((str + int + cha) * 1.5) + rand(5, 15)
  };
}

function generateMission() {
  const types = [
    { id: "ASSAULT", stat: ["str"], t: 1, titles: ["Direct fleet engagement", "Pirate suppression", "Orbital defense"] },
    { id: "DIPLOMACY", stat: ["cha"], t: 1, titles: ["Treaty signing", "Trade negotiations", "Gala attendance"] },
    { id: "RESEARCH", stat: ["int"], t: 1, titles: ["Analyzing black holes", "Studying alien flora", "Mapping nebulae"] },
    { id: "RESCUE OP", stat: ["str", "int"], t: 2, titles: ["Extracting survivors from collapsing stations"] },
    { id: "SALVAGE", stat: ["str", "int"], t: 2, titles: ["Breaking apart derelict Dreadnoughts"] },
    { id: "TERRAFORMING", stat: ["str", "int"], t: 2, titles: ["Deploying atmospheric processors"] },
    { id: "ESPIONAGE", stat: ["int", "cha"], t: 2, titles: ["Infiltrating corporate HQs"] },
    { id: "FIRST CONTACT", stat: ["int", "cha"], t: 2, titles: ["Meeting new species"] },
    { id: "SMUGGLING", stat: ["int", "cha"], t: 2, titles: ["Moving contraband"] },
    { id: "ENFORCEMENT", stat: ["str", "cha"], t: 2, titles: ["Policing lawless sectors"] },
    { id: "VIP PROTECTION", stat: ["str", "cha"], t: 2, titles: ["Escorting dignitaries"] },
    { id: "WARLORD HUNT", stat: ["str", "cha"], t: 2, titles: ["Tracking sector kingpins"] },
    { id: "COLONIZATION", stat: ["str", "int", "cha"], t: 3, titles: ["Establishing a foothold on a hostile world"] },
    { id: "THE GRAND HEIST", stat: ["str", "int", "cha"], t: 3, titles: ["Breaking into a floating fortress"] },
    { id: "PLANETARY EVACUATION", stat: ["str", "int", "cha"], t: 3, titles: ["Saving a civilization from a supernova"] }
  ];
  let available = types.filter(t => t.t === 1);
  if (state.day > 4) available = available.concat(types.filter(t => t.t === 2));
  if (state.day > 8) available = available.concat(types.filter(t => t.t === 3));
  const m = available[rand(0, available.length - 1)];
  const title = m.titles[rand(0, m.titles.length - 1)];
  const targetBase = 45 + Math.floor(state.day * 7.5);
  let targets = {};
  m.stat.forEach(s => targets[s] = targetBase + rand(-5, 5));
  return { title: title, type: m.id, reqs: m.stat, targets: targets,
    minReq: Math.min(95, 65 + Math.floor(state.day * 1.2)),
    reward: 500 + (state.day * 90) };
}

function updateShip() {
  const ships = [
    {d:1,n:"Speeder",x:5,m:3},{d:2,n:"Courier",x:5,m:3},{d:3,n:"Interceptor",x:5,m:3},
    {d:4,n:"Scout",x:6,m:4},{d:5,n:"Shuttle",x:6,m:4},{d:6,n:"Gunship",x:6,m:4},
    {d:7,n:"Cargo",x:7,m:4},{d:8,n:"Corvette",x:7,m:4},{d:9,n:"Transport",x:7,m:4},
    {d:10,n:"Destroyer",x:7,m:4},{d:11,n:"Battleship",x:8,m:5},{d:12,n:"Battlecruiser",x:9,m:5},
    {d:13,n:"Assault Cruiser",x:9,m:5},{d:14,n:"Heavy Cruiser",x:9,m:6},
    {d:15,n:"Titan",x:10,m:6}
  ];
  const s = ships.find(s => s.d === state.day) || {n:"Dreadnought",x:10,m:7};
  state.ship = { name: s.n, max: s.x, min: s.m };
  state.roster = new Array(state.ship.max).fill(null);
}

function startDay() {
  updateShip();
  state.mission = generateMission();
  const poolSize = 6 + Math.floor(state.day / 2);
  state.pool = [];
  let attempts = 0;
  while(state.pool.length < poolSize && attempts < 200) {
    let newApp = generateApplicant(state.pool.length);
    if (!state.pool.some(a => a.name === newApp.name)) state.pool.push(newApp);
    attempts++;
  }
  // Reset scroll
  document.querySelector('.scroll-area').scrollTop = 0;
  const sr = document.getElementById('slots-row');
  if (sr) sr.scrollLeft = 0;
  updateUI();
}

function renderSlots() {
  const slotsRow = document.getElementById('slots-row');
  const max = state.ship.max;

  slotsRow.innerHTML = '';
  for (let i = 0; i < max; i++) {
    slotsRow.insertAdjacentHTML('beforeend', slotHTML(i));
  }

  // Left-align when 6+ slots (scrollable), center when fewer
  slotsRow.style.justifyContent = max >= 6 ? 'flex-start' : 'center';
}

function slotHTML(i) {
  const app = state.roster[i];
  let h = `<div class="slot${app ? ' filled' : ''}" onclick="tapSlot(${i})">`;
  h += `<svg class="slot-fill-bg" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;"><polygon fill="#000" points="0,2 2,2 2,0 48,0 48,2 50,2 50,48 48,48 48,50 2,50 2,48 0,48"/></svg>`;

}

function updateLaunchState() {
  const crewCount = state.roster.filter(a => a !== null).length;
  const disabled = crewCount === 0;
  const btn = document.getElementById('btn-launch');
  if (btn) btn.classList.toggle('disabled', disabled);
  const warn = document.getElementById('launch-warning');
  if (warn && !activeDrawer) warn.style.display = disabled ? '' : 'none';
}

function syncAllSlots() {
  renderSlots();
  updateLaunchState();
}

// ══════════════════════════════════════════════
// CARD TAP — original index.html interaction model
// Card stays in pool, gets dither highlight, fills slot
// ══════════════════════════════════════════════

function tapCard(appId) {
  const card = document.getElementById('card-' + appId);
  if (!card) return;

  // Instant bounce via class toggle
  card.classList.remove('bounce');
  requestAnimationFrame(() => card.classList.add('bounce'));

  const app = state.pool.find(a => a.id === appId);
  if (!app) return;

  // Already assigned — unassign
  const rosterIdx = state.roster.findIndex(a => a && a.id === appId);
  if (rosterIdx !== -1) {
    state.roster[rosterIdx] = null;
    card.classList.remove('selected');
    // Compact
    const filled = state.roster.filter(a => a !== null);
    for (let i = 0; i < state.ship.max; i++) state.roster[i] = filled[i] || null;
    renderSlots();
    updateLaunchState();
    updateCostDisplay();
    return;
  }

  // Check funds
  const currentCost = state.roster.reduce((sum, a) => sum + (a ? a.cost : 0), 0);
  if (state.money < currentCost + app.cost) {
    const warn = document.getElementById('launch-warning');
    warn.innerText = 'INSUFFICIENT FUNDS';
    warn.style.display = 'block';
    setTimeout(() => { warn.innerText = 'HIRE CREW TO LAUNCH'; warn.style.display = state.roster.some(a=>a) ? 'none' : 'block'; }, 1500);
    return;
  }

  // Find next empty slot
  const nextSlot = state.roster.indexOf(null);
  if (nextSlot === -1) return;

  // Assign — instant visual feedback first
  card.classList.add('selected');
  state.roster[nextSlot] = app;

  // Cost float animation
  const floater = document.createElement('div');
  floater.className = 'mc-cost-float';
  floater.textContent = `-${app.cost} cr`;
  card.appendChild(floater);
  floater.addEventListener('animationend', () => floater.remove());

  // Update just the one slot that changed
  updateSingleSlot(nextSlot);
  updateLaunchState();
  updateCostDisplay();
}

function tapSlot(index) {
  const app = state.roster[index];
  if (!app) return;

  const card = document.getElementById('card-' + app.id);
  if (card) card.classList.remove('selected');

  state.roster[index] = null;
  const filled = state.roster.filter(a => a !== null);
  for (let i = 0; i < state.ship.max; i++) state.roster[i] = filled[i] || null;
  renderSlots();
  updateLaunchState();
  updateCostDisplay();
}

function updateSingleSlot(index) {
  // With dual slot areas (row + expanded), just re-render all
  renderSlots();
}

function updateCostDisplay() {
  const currentCost = state.roster.reduce((sum, a) => sum + (a ? a.cost : 0), 0);
  document.getElementById('ui-money').innerText = state.money - currentCost;
  const crewCount = state.roster.filter(a => a !== null).length;
  document.getElementById('ui-hired').innerText = crewCount;
}

// ══════════════════════════════════════════════
// RESOLUTION LOGIC (V4.0 Math)
// ══════════════════════════════════════════════

function launchMission() {
  // Bounce
  const lBtn = document.getElementById('btn-launch');
  if (lBtn) { lBtn.classList.remove('bounce'); requestAnimationFrame(() => lBtn.classList.add('bounce')); }

  const hired = state.roster.filter(a => a !== null);
  if (hired.length === 0) { document.getElementById('launch-warning').style.display = 'block'; return; }

  const cost = hired.reduce((sum, app) => sum + app.cost, 0);
  state.money -= cost;
  let logs = [], score = 0;

  // 1. RAW SKILL
  let statScores = [];
  state.mission.reqs.forEach(stat => {
    let sum = hired.reduce((acc, app) => acc + app[stat], 0);
    statScores.push((sum / state.mission.targets[stat]) * 100);
  });
  let rawScore = statScores.reduce((a,b)=>a+b, 0) / statScores.length;
  logs.push(`Base Power Output: ${Math.floor(rawScore)}%`);

  // 2. SHIP EFFICIENCY
  let effPct = hired.length / state.ship.min, effMod = 0;
  if (hired.length === state.ship.max) { effMod = 5; logs.push(`Ship at Max Capacity: +5% Bonus`); }
  else if (effPct >= 1) { effMod = 0; logs.push(`Ship Minimum Crew Met: 0% Penalty`); }
  else if (effPct >= 0.7) { effMod = -20; logs.push(`Understaffed (Tier 1): -20% Penalty`); }
  else if (effPct >= 0.4) { effMod = -40; logs.push(`Understaffed (Tier 2): -40% Penalty`); }
  else if (effPct >= 0.15) { effMod = -60; logs.push(`Skeleton Crew (Tier 3): -60% Penalty`); }
  else { effMod = -70; logs.push(`Fatal Understaffing (Tier 4): -70% Penalty`); }

  // 3. CONFLICTS
  let conflictPenalty = 0, conflictCount = 0;
  for(let i=0;i<hired.length;i++) {
    for(let j=i+1;j<hired.length;j++) {
      let a=hired[i], rA=RACES[a.race], b=hired[j], rB=RACES[b.race];
      let aHatesB = rA.hates.includes(b.race)||(rA.hates.includes("ALL")&&a.race!==b.race);
      let bHatesA = rB.hates.includes(a.race)||(rB.hates.includes("ALL")&&b.race!==a.race);
      if (aHatesB && bHatesA) {
        let aW=0,bW=0;
        if(a.str>b.str)aW++;else if(b.str>a.str)bW++;
        if(a.int>b.int)aW++;else if(b.int>a.int)bW++;
        if(a.cha>b.cha)aW++;else if(b.cha>a.cha)bW++;
        if(aW>bW){let p=10+(a.hate/4);conflictPenalty+=p;conflictCount++;logs.push(`MUTUAL: ${a.race} dominated ${b.race}. -${Math.floor(p)}%`);}
        else if(bW>aW){let p=10+(b.hate/4);conflictPenalty+=p;conflictCount++;logs.push(`MUTUAL: ${b.race} dominated ${a.race}. -${Math.floor(p)}%`);}
        else{let pA=(10+(a.hate/4))/2,pB=(10+(b.hate/4))/2;conflictPenalty+=(pA+pB);conflictCount++;logs.push(`MUTUAL DRAW: Bloody stalemate. -${Math.floor(pA+pB)}%`);}
      } else if(aHatesB){let p=10+(a.hate/4);conflictPenalty+=p;conflictCount++;logs.push(`CONFLICT: ${a.race} attacked ${b.race}. -${Math.floor(p)}%`);}
      else if(bHatesA){let p=10+(b.hate/4);conflictPenalty+=p;conflictCount++;logs.push(`CONFLICT: ${b.race} attacked ${a.race}. -${Math.floor(p)}%`);}
    }
  }

  // 4. SYNERGY
  let synergy = 0;
  if (hired.length >= 3 && conflictCount === 0) { synergy = 10; logs.push(`SYNERGY BONUS: Perfect harmony. +10%`); }

  score = Math.floor(rawScore + effMod - conflictPenalty + synergy);
  let overperformance = 0;
  if (score > 100) { overperformance = Math.min(20, score - 100); score = 100; }
  if (score < 0) score = 0;

  // 5. PAYOUT
  let earned = 0, isSuccess = false;
  if (score >= state.mission.minReq) {
    isSuccess = true;
    earned = Math.floor(state.mission.reward * (score/100));
    if (overperformance > 0) { let bonus = Math.floor(state.mission.reward * (overperformance/100)); earned += bonus; logs.push(`OVERPERFORMANCE BONUS: +${bonus} CR`); }
  } else {
    let diff = (state.mission.minReq - score) / 100;
    earned = -Math.floor(state.mission.reward * diff);
    logs.push(`FINE APPLIED: Mission requirement (${state.mission.minReq}%) not met.`);
  }
  state.money += earned;

  document.getElementById('res-score').innerText = score + "%";
  document.getElementById('res-score').style.color = "";
  document.getElementById('res-msg').innerText = isSuccess ? "MISSION SUCCESS" : "MISSION FAILED";
  let logHTML = logs.map(l => `<div>> ${l}</div>`).join('');
  logHTML += `<br><div>> NET FINANCIAL CHANGE: ${earned >= 0 ? '+'+earned : earned} CR</div>`;
  document.getElementById('res-log').innerHTML = logHTML;
  document.getElementById('res-title').innerText = "DEBRIEFING";
  document.getElementById('modal-btn').onclick = nextDay;
  document.querySelector('#modal-btn .launch-btn-text').innerText = "CONTINUE";
  document.getElementById('result-overlay').classList.add('visible');
  if (state.money < 0) state.gameOver = true;
}

function nextDay() {
  document.getElementById('result-overlay').classList.remove('visible');
  if (state.gameOver) {
    document.getElementById('res-title').innerText = "SYSTEM LOCKOUT";
    document.getElementById('res-score').innerText = "BANKRUPT";
    document.getElementById('res-score').style.color = "red";
    document.getElementById('res-msg').innerText = "Your career is over.";
    document.getElementById('res-log').innerHTML = "> Liquidating assets...<br>> Reclaiming organic material...";
    document.querySelector('#modal-btn .launch-btn-text').innerText = "START OVER";
    document.getElementById('modal-btn').onclick = function() {
      state.day=1; state.money=800; state.gameOver=false; state.roster=[]; state.pool=[];
      document.getElementById('res-score').style.color = "";
      document.querySelector('#modal-btn .launch-btn-text').innerText = "CONTINUE";
      document.getElementById('modal-btn').onclick = nextDay;
      document.getElementById('result-overlay').classList.remove('visible');
      closeDrawer();
      startDay();
    };
    document.getElementById('result-overlay').classList.add('visible');
  } else {
    state.day++;
    closeDrawer();
    startDay();
  }
}

// ══════════════════════════════════════════════
// DEBUG MENU
// Set to false to hide the debug button
// ══════════════════════════════════════════════
const DEBUG_ENABLED = true;

function openDebug() {
  if (!DEBUG_ENABLED) return;
  const overlay = document.getElementById('debug-overlay');
  const grid = document.getElementById('debug-days');
  grid.innerHTML = '';
  for (let d = 1; d <= 20; d++) {
    grid.insertAdjacentHTML('beforeend',
      `<button class="debug-day-btn" onclick="debugJumpToDay(${d})">${d}</button>`
    );
  }
  document.getElementById('debug-credits').value = state.money;
  overlay.style.display = 'flex';
}

function closeDebug() {
  document.getElementById('debug-overlay').style.display = 'none';
}

function debugJumpToDay(day) {
  closeDebug();
  if (activeDrawer) closeDrawer();
  state.day = day;
  state.money = 800;
  state.gameOver = false;
  state.roster = [];
  state.pool = [];
  document.getElementById('result-overlay').classList.remove('visible');
  startDay();
}

function debugSetCredits() {
  let val = parseInt(document.getElementById('debug-credits').value) || 0;
  val = Math.max(0, Math.min(10000, val));
  state.money = val;
  document.getElementById('debug-credits').value = val;
  document.getElementById('ui-money').innerText = val - state.roster.reduce((s, a) => s + (a ? a.cost : 0), 0);
}

// Hide debug button if disabled
if (!DEBUG_ENABLED) {
  const dbtn = document.querySelector('.debug-btn');
  if (dbtn) dbtn.style.display = 'none';
}

// INIT
startDay();
</script>
