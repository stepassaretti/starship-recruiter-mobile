// ══════════════════════════════════════════════
// SLOT RENDERING
// ══════════════════════════════════════════════

function renderSlots() {
  const slotsRow = document.getElementById('slots-row');
  const max = state.ship.max;

  slotsRow.innerHTML = '';

  if (max > 15) {
    // Compact mode: SLOTS [X/MAX]: icon x count per species
    renderSlotsCompact(slotsRow, max);
  } else {
    for (let i = 0; i < max; i++) {
      slotsRow.insertAdjacentHTML('beforeend', slotHTML(i));
    }
    slotsRow.style.justifyContent = 'flex-start';
  }

  updateMissionProgress();
}

function renderSlotsCompact(slotsRow, max) {
  const hired = state.roster.filter(a => a !== null);
  const count = hired.length;

  // Label
  const label = document.createElement('span');
  label.style.cssText = 'font-family:"VT323",monospace;font-size:17px;white-space:nowrap;flex-shrink:0;margin-right:8px;';
  label.textContent = `SLOTS [${count}/${max}]:`;
  slotsRow.appendChild(label);

  if (count === 0) {
    const empty = document.createElement('span');
    empty.style.cssText = 'font-family:"VT323",monospace;font-size:17px;opacity:0.5;white-space:nowrap;';
    empty.textContent = '— AWAITING CREW —';
    slotsRow.appendChild(empty);
    return;
  }

  // Group by species
  const groups = {};
  hired.forEach(a => { groups[a.race] = (groups[a.race] || 0) + 1; });

  Object.entries(groups).forEach(([race, n]) => {
    const rd = RACES[race];
    if (!rd) return;
    const item = document.createElement('span');
    item.style.cssText = 'display:inline-flex;align-items:center;gap:3px;flex-shrink:0;margin-right:6px;cursor:pointer;';
    item.title = `Tap to remove a ${race}`;
    item.innerHTML = `<img src="${rd.icon}" style="width:20px;height:20px;image-rendering:pixelated;" onerror="this.style.display='none'"><span style="font-family:'VT323',monospace;font-size:17px;white-space:nowrap;">x${n}</span>`;
    item.onclick = () => {
      // Find last slot with this race and remove it
      for (let i = state.roster.length - 1; i >= 0; i--) {
        if (state.roster[i] && state.roster[i].race === race) {
          state.roster[i] = null;
          syncAllSlots();
          updateUI();
          break;
        }
      }
    };
    slotsRow.appendChild(item);
  });
}

function updateMissionProgress() {
  const m = state.mission;
  const hired = state.roster.filter(a => a !== null);
  const crewCount = hired.length;
  const max = state.ship.max;

  // Per-stat satisfaction
  let total = 0;
  const statMet = {};
  m.reqs.forEach(stat => {
    const sum = hired.reduce((acc, a) => acc + a[stat], 0);
    const pct = Math.min(100, (sum / m.targets[stat]) * 100);
    statMet[stat] = pct >= 100;
    total += pct;
  });
  const avg = m.reqs.length > 0 ? total / m.reqs.length : 0;

  // Progress bar
  const fill = document.getElementById('mission-progress-fill');
  if (fill) fill.style.width = avg.toFixed(1) + '%';

  // Info row: MISSION REQ: <stat vals bold, black if met> | SHIP: 0/5
  const minPct = m.minReq;
  const reqParts = m.reqs.map(r => {
    const met = statMet[r];
    return `<span class="stat-val${met ? ' met' : ''}">${t(r)} ${m.targets[r]}</span>`;
  }).join(' &nbsp;|&nbsp; ');

  const minMet = avg >= minPct;
  const minSpan = `<span class="stat-val${minMet ? ' met' : ''}">${t('min')} ${minPct}%</span>`;

  const shipMet = crewCount >= state.ship.min;
  const shipSpan = `<span class="stat-val${shipMet ? ' met' : ''}">${crewCount}/${max}</span>`;

  const expMet = state.mission && state.mission.expReq
    && state.roster.some(a => a && a.exp === state.mission.expReq);
  const expPart = state.mission && state.mission.expReq
    ? ` &nbsp;|&nbsp; <span class="stat-val${expMet ? ' met' : ''}">${roleName(state.mission.expReq)}</span>`
    : '';
  document.getElementById('slot-info-row').innerHTML =
    `${t('missionLabel')}&nbsp;${reqParts}${expPart} &nbsp;|&nbsp; ${minSpan} &nbsp;|&nbsp; ${shipSpan}`;

  // Compress letter-spacing only if content overflows one line
  const row = document.getElementById('slot-info-row');
  row.style.letterSpacing = '';
  row.style.fontSize = '17px';
  if (row.scrollWidth > row.clientWidth) {
    row.style.letterSpacing = '-1px';
  }
  if (row.scrollWidth > row.clientWidth) {
    row.style.letterSpacing = '-2px';
  }
  if (row.scrollWidth > row.clientWidth) {
    row.style.fontSize = '15px';
    row.style.letterSpacing = '-1px';
  }
}

function slotHTML(i) {
  const app = state.roster[i];
  let h = `<div class="slot${app ? ' filled' : ''}" onclick="tapSlot(${i})">`;
  h += `<svg class="slot-fill-bg" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;"><polygon fill="#000" points="0,2 2,2 2,0 38,0 38,2 40,2 40,38 38,38 38,40 2,40 2,38 0,38"/></svg>`;
  if (app) {
    let slotIconSrc;
    if (app.isSaboteur) {
      // Mimic a species already in the roster, or random from pool if none yet
      const otherHired = state.roster.filter(a => a && !a.isSaboteur && a.id !== app.id);
      if (otherHired.length > 0) {
        const mimic = otherHired[rand(0, otherHired.length - 1)];
        slotIconSrc = RACES[mimic.race] ? RACES[mimic.race].icon : '';
      } else {
        const poolSpecies = state.pool.filter(a => !a.isSaboteur && RACES[a.race]);
        const mimic = poolSpecies.length > 0 ? poolSpecies[rand(0, poolSpecies.length - 1)] : null;
        slotIconSrc = mimic ? RACES[mimic.race].icon : '';
      }
    } else {
      slotIconSrc = RACES[app.race] ? RACES[app.race].icon : '';
    }
    h += `<img class="slot-icon" src="${slotIconSrc}" style="position:absolute;width:32px;height:32px;top:4px;left:4px;z-index:2;image-rendering:pixelated;" onerror="this.style.display='none'">`;
  }
  h += `</div>`;
  return h;
}

function updateLaunchState() {
  const crewCount = state.roster.filter(a => a !== null).length;
  const disabled = crewCount === 0;
  const btn = document.getElementById('btn-launch');
  if (btn) btn.classList.toggle('disabled', disabled);
  const warn = document.getElementById('launch-warning');
  if (warn && !activeDrawer) warn.style.display = disabled ? '' : 'none';

  // Threshold sounds: fire target.mp3 when crossing min crew, max crew, or min success %
  const m = state.mission;
  const prevCount = state._prevCrewCount || 0;
  if (m) {
    const minCrew = state.ship ? state.ship.min : 0;
    const maxCrew = state.ship ? state.ship.max : 0;
    // Min crew threshold
    if (prevCount < minCrew && crewCount >= minCrew) { playSfx('target'); hapticTarget(); }
    // Max crew threshold
    else if (prevCount < maxCrew && crewCount >= maxCrew) { playSfx('target'); hapticTarget(); }
    // Min success % — check estimated score crosses minReq
    else {
      const prevScore = estimateScore(prevCount);
      const newScore = estimateScore(crewCount);
      if (prevScore < m.minReq && newScore >= m.minReq) { playSfx('target'); hapticTarget(); }
    }
  }
  state._prevCrewCount = crewCount;
}

function estimateScore(crewCount) {
  const m = state.mission;
  const ship = state.ship;
  if (!m || !ship) return 0;
  const hired = state.roster.filter(a => a !== null);
  if (hired.length === 0) return 0;
  let power = 0;
  hired.forEach(a => {
    m.reqs.forEach(s => {
      if (s === 'str') power += a.str;
      else if (s === 'int') power += a.int;
      else if (s === 'cha') power += a.cha;
    });
  });
  const maxPower = ship.max * m.reqs.length * 50;
  return Math.round((power / maxPower) * 100);
}

function syncAllSlots() {
  renderSlots();
  updateLaunchState();
}

// ══════════════════════════════════════════════
// CARD TAP — original index.html interaction model
// Card stays in pool, gets dither highlight, fills slot
// ══════════════════════════════════════════════

function sortRoster() {
  const filled = state.roster.filter(a => a !== null);
  filled.sort((a, b) => state.speciesOrder.indexOf(a.race) - state.speciesOrder.indexOf(b.race));
  for (let i = 0; i < state.ship.max; i++) state.roster[i] = filled[i] || null;
}

function tapCard(appId) {
  const card = document.getElementById('card-' + appId);
  if (!card) return;

  // Instant bounce via class toggle
  card.classList.remove('bounce');
  requestAnimationFrame(() => card.classList.add('bounce'));

  const app = state.pool.find(a => a.id === appId);
  if (!app) return;

  // Already assigned — unassign
  const rosterIdx = state.roster.findIndex(a => a && a.id === appId);
  if (rosterIdx !== -1) {
    state.roster[rosterIdx] = null;
    card.classList.remove('selected');
    playSfx('unselect_card');
    // Compact and sort
    sortRoster();
    renderSlots();
    updateLaunchState();
    updateCostDisplay();
    return;
  }

  // Check funds — allow up to -100cr overdraft
  const currentCost = state.roster.reduce((sum, a) => sum + (a ? a.cost : 0), 0);
  if (state.money - currentCost - app.cost < -100) {
    const warn = document.getElementById('launch-warning');
    playSfx('wrong');
    warn.innerText = t('creditLimit');
    warn.style.display = 'block';
    setTimeout(() => { warn.innerText = t('hireCrew'); warn.style.display = state.roster.some(a=>a) ? 'none' : 'block'; }, 1500);
    return;
  }

  // Find next empty slot
  const nextSlot = state.roster.indexOf(null);
  if (nextSlot === -1) { playSfx('wrong'); return; }

  // Assign — instant visual feedback first
  card.classList.add('selected');
  playSfx('select_card');
  state.roster[nextSlot] = app;
  // Track species selection order (first time only)
  if (!state.speciesOrder.includes(app.race)) state.speciesOrder.push(app.race);
  sortRoster();

  // Cost float animation
  const floater = document.createElement('div');
  floater.className = 'mc-cost-float';
  floater.textContent = `-${app.cost} cr`;
  card.appendChild(floater);
  floater.addEventListener('animationend', () => floater.remove());

  // Update just the one slot that changed
  updateSingleSlot(nextSlot);
  updateLaunchState();
  updateCostDisplay();
}

function tapSlot(index) {
  const app = state.roster[index];
  if (!app) return;

  const card = document.getElementById('card-' + app.id);
  if (card) card.classList.remove('selected');
  playSfx('unselect_card');

  state.roster[index] = null;
  const filled = state.roster.filter(a => a !== null);
  filled.sort((a, b) => a.race.localeCompare(b.race));
  for (let i = 0; i < state.ship.max; i++) state.roster[i] = filled[i] || null;
  renderSlots();
  updateLaunchState();
  updateCostDisplay();
}

function updateSingleSlot(index) {
  // With dual slot areas (row + expanded), just re-render all
  renderSlots();
}

function updateCostDisplay() {
  const currentCost = state.roster.reduce((sum, a) => sum + (a ? a.cost : 0), 0);
  document.getElementById('ui-money').innerText = state.money - currentCost;
}

// ══════════════════════════════════════════════
// RESOLUTION LOGIC (V4.0 Math)
// ══════════════════════════════════════════════

function launchMission() {
  // Bounce
  playSfx('button');
  const lBtn = document.getElementById('btn-launch');
  if (lBtn) { lBtn.classList.remove('bounce'); requestAnimationFrame(() => lBtn.classList.add('bounce')); }

  const hired = state.roster.filter(a => a !== null);
  if (hired.length === 0) { document.getElementById('launch-warning').style.display = 'block'; return; }

  const cost = hired.reduce((sum, app) => sum + app.cost, 0);
  const preDeductionBalance = state.money;
  state.money -= cost;
  const isSabotaged = hired.some(a => a.isSaboteur);
  const debitUsed = state.money < 0 ? Math.abs(state.money) : 0;
  let score = 0;

  // 1. RAW SKILL
  let statScores = [];
  state.mission.reqs.forEach(stat => {
    let sum = hired.reduce((acc, app) => acc + app[stat], 0);
    statScores.push((sum / state.mission.targets[stat]) * 100);
  });
  let rawScore = statScores.reduce((a,b)=>a+b, 0) / statScores.length;

  // 2. SHIP EFFICIENCY
  let effPct = hired.length / state.ship.min, effMod = 0;
  if (hired.length === state.ship.max) { effMod = 5; }
  else if (effPct >= 1) { effMod = 0; }
  else if (effPct >= 0.8) { effMod = -15; }
  else if (effPct >= 0.6) { effMod = -25; }
  else if (effPct >= 0.4) { effMod = -50; }
  else if (effPct >= 0.15) { effMod = -70; }
  else { effMod = -80; }

  // 3. CONFLICTS — collect all into a list
  let conflictPenalty = 0, conflictCount = 0;
  let conflictLines = [];
  for(let i=0;i<hired.length;i++) {
    for(let j=i+1;j<hired.length;j++) {
      let a=hired[i], b=hired[j];
      if (!RACES[a.race] || !RACES[b.race]) continue; // skip saboteur in conflict calc
      let rA=RACES[a.race], rB=RACES[b.race];
      // Cheesponge absorbs Drakhen hate completely — show as 0% conflict
      const isCheespongeVsDrakhen = (a.race==='Cheesponge'&&b.race==='Drakhen')||(a.race==='Drakhen'&&b.race==='Cheesponge');
      if (isCheespongeVsDrakhen) {
        const cheesp = a.race==='Cheesponge' ? a : b;
        const drakhen = a.race==='Drakhen' ? a : b;
        conflictCount++;
        conflictLines.push({raceA:'Cheesponge',raceB:'Drakhen',text:`${speciesName('Cheesponge')} absorbed ${speciesName('Drakhen')}'s hate (-0%)`,absorbed:true});
        continue;
      }
      let aHatesB = rA.hates.includes(b.race)||(rA.hates.includes("ALL")&&a.race!==b.race);
      let bHatesA = rB.hates.includes(a.race)||(rB.hates.includes("ALL")&&b.race!==a.race);
      if (aHatesB && bHatesA) {
        let aW=0,bW=0;
        if(a.str>b.str)aW++;else if(b.str>a.str)bW++;
        if(a.int>b.int)aW++;else if(b.int>a.int)bW++;
        if(a.cha>b.cha)aW++;else if(b.cha>a.cha)bW++;
        if(aW>bW){let p=5 + (a.hate / 100) * 25;conflictPenalty+=p;conflictCount++;conflictLines.push({raceA:a.race,raceB:b.race,text:`${speciesName(a.race)} dominated ${speciesName(b.race)} (-${Math.floor(p)}%)`});}
        else if(bW>aW){let p=5 + (b.hate / 100) * 25;conflictPenalty+=p;conflictCount++;conflictLines.push({raceA:b.race,raceB:a.race,text:`${speciesName(b.race)} dominated ${speciesName(a.race)} (-${Math.floor(p)}%)`});}
        else{let pA=(5 + (a.hate / 100) * 25)/2,pB=(5 + (b.hate / 100) * 25)/2;conflictPenalty+=(pA+pB);conflictCount++;conflictLines.push({raceA:a.race,raceB:b.race,text:`${speciesName(a.race)} vs ${speciesName(b.race)} (draw, -${Math.floor(pA+pB)}%)`});}
      } else if(aHatesB){let p=5 + (a.hate / 100) * 25;conflictPenalty+=p;conflictCount++;conflictLines.push({raceA:a.race,raceB:b.race,text:`${speciesName(a.race)} attacked ${speciesName(b.race)} (-${Math.floor(p)}%)`});}
      else if(bHatesA){let p=5 + (b.hate / 100) * 25;conflictPenalty+=p;conflictCount++;conflictLines.push({raceA:b.race,raceB:a.race,text:`${speciesName(b.race)} attacked ${speciesName(a.race)} (-${Math.floor(p)}%)`});}
    }
  }

  // 4. SYNERGY — any conflict (even absorbed) blocks synergy
  let synergy = 0;
  if (hired.length >= 3 && conflictLines.length === 0) { synergy = 10; }

  // 5. DRAKH FORCE BONUS
  const drakhCount = hired.filter(a => a.race === 'Drakhen').length;
  let drakhForce = 0;
  if (drakhCount >= 3) {
    if (state.day >= 25) {
      drakhForce = 20 + (drakhCount - 3) * 5;
    } else {
      drakhForce = 10;
    }
  }

  // 6. EXPERIENCE MANDATE
  let expMandateMod = 0;
  if (state.mission.expReq) {
    const hasExp = hired.some(a => a.exp === state.mission.expReq);
    expMandateMod = hasExp ? 10 : -10;
  }

  score = Math.floor(rawScore + effMod - conflictPenalty + synergy + drakhForce + expMandateMod);
  let overperformance = 0;
  if (score > 100) { overperformance = Math.min(20, score - 100); score = 100; }
  if (score < 0) score = 0;

  // 5. PAYOUT
  let earned = 0, isSuccess = false;
  let fineDetail = '';
  if (score >= state.mission.minReq) {
    isSuccess = true;
    earned = Math.floor(state.mission.reward * (score/100));
    if (overperformance > 0) { let bonus = Math.floor(state.mission.reward * (overperformance/100)); earned += bonus; }
  } else {
    let diff = (state.mission.minReq - score) / 100;
    earned = -Math.floor(state.mission.reward * diff);
    fineDetail = t('fineDetail').replace('%min%', state.mission.minReq).replace('%score%', score);
  }
  // Sabotage overrides payout — reward stolen, no fine
  if (isSabotaged) {
    earned = 0;
    isSuccess = false;
  }

  state.money += earned;

  // Track mission result and hires for checkpoint
  state.missionLog.push({ day: state.day, score, success: isSuccess });
  if (earned > 0) state.totalEarned += earned;
  hired.forEach(a => { if (!a.isSaboteur) state.allTimeHires[a.race] = (state.allTimeHires[a.race] || 0) + 1; });

  // Build structured HTML
  function resRow(label, value, isNet) {
    return `<div class="res-row${isNet?' net':''}"><span class="res-row-label">${label}</span><span class="res-row-value">${value}</span></div>`;
  }
  function resDivider() { return `<div class="res-divider"></div>`; }

  let html = '';

  // Base power
  html += resRow(t('crewPowerOutput'), `${Math.floor(rawScore)}%`);
  html += resDivider();

  // Ship efficiency
  let effLabel = '', effVal = '';
  if (hired.length === state.ship.max) { effLabel = t('effMaxCapacity'); effVal = '+5%'; }
  else if (effPct >= 1) { effLabel = t('effMinMet'); effVal = '0%'; }
  else if (effPct >= 0.8) { effLabel = t('effTier1'); effVal = '-15%'; }
  else if (effPct >= 0.6) { effLabel = t('effTier2'); effVal = '-25%'; }
  else if (effPct >= 0.4) { effLabel = t('effTier3'); effVal = '-50%'; }
  else if (effPct >= 0.15) { effLabel = t('effCritical'); effVal = '-70%'; }
  else { effLabel = t('effFatal'); effVal = '-80%'; }
  html += resRow(effLabel, effVal);
  html += resDivider();

  // Conflicts block
  if (conflictCount > 0) {
    html += `<div class="res-conflicts-header">${t('conflictsHeader')} [${conflictCount}]</div>`;
    conflictLines.forEach(c => {
      const iconA = RACES[c.raceA] ? RACES[c.raceA].icon : '';
      const iconB = RACES[c.raceB] ? RACES[c.raceB].icon : '';
      html += `<div class="res-conflict-line" data-conflict="true">
        <div class="res-conflict-icons">
          <img class="res-conflict-icon" src="${iconA}" onerror="this.style.display='none'">
          <span class="res-conflict-vs">VS</span>
          <img class="res-conflict-icon" src="${iconB}" onerror="this.style.display='none'">
        </div>
        <span class="res-conflict-text">${c.text}</span>
      </div>`;
    });
    html += `<div class="res-row"><span class="res-row-label"></span><span class="res-row-value">-${Math.floor(conflictPenalty)}%</span></div>`;
    html += resDivider();
  }

  // Synergy
  if (synergy > 0) {
    html += resRow(t('synergyBonus'), '+10%');
    html += resDivider();
  }

  // Drakh Force Bonus
  if (drakhForce > 0) {
    html += resRow(t('drakhForceBonus'), `+${drakhForce}%`);
    html += resDivider();
  }

  // Experience mandate
  if (state.mission.expReq) {
    if (expMandateMod > 0) {
      html += resRow(t('expMandateFulfilled'), '+10%');
    } else {
      html += resRow(t('expMandateIgnored'), '-10%');
    }
    html += resDivider();
  }

  // Overperformance
  if (overperformance > 0) {
    let bonus = Math.floor(state.mission.reward * (overperformance/100));
    html += resRow(t('overperformBonus'), `+${bonus} CR`);
    html += resDivider();
  }

  // Fine
  if (fineDetail) {
    html += `<div class="res-fine-header">${t('fineApplied')}</div>`;
    html += `<div class="res-fine-detail">${fineDetail}</div>`;
    html += resDivider();
  }

  // Net financial change (no divider after)
  const netStr = earned >= 0 ? `+${earned} CR` : `${earned} CR`;
  html += resRow(t('netFinancialChange'), netStr, true);

  // Reset UI — hide msg and button until animation completes
  document.getElementById('res-score').innerText = '0%';
  document.getElementById('res-score').style.color = '';
  document.getElementById('res-msg').style.color = '';
  document.getElementById('res-msg').innerText = isSuccess ? t('missionSuccess') : t('missionFailed');
  if (!isSuccess && !isSabotaged) document.getElementById('res-msg').style.color = '#ff4444';
  document.getElementById('res-msg').style.visibility = 'hidden';
  document.getElementById('res-log').innerHTML = '';
  document.getElementById('res-title').innerText = isSabotaged ? t('debriefing') : t('debriefing');
  document.getElementById('modal-btn').onclick = function() {
    bounceThen(document.getElementById('modal-btn'), nextDay);
  };
  const willBankrupt = (state.money < -100) || (state.money <= 0);
  document.getElementById('modal-btn-text').innerText = willBankrupt ? t('continue') : t('nextDay');
  document.getElementById('modal-btn').style.visibility = 'hidden';
  document.getElementById('result-overlay').classList.add('visible');
  setStatusBar('dark');
  if (state.money < -100) state.gameOver = true;

  // Score duration is proportional: 2500ms for 100%, so score/100 * 2500
  const scoreEl = document.getElementById('res-score');
  const targetScore = isSabotaged ? 85 : score;
  const duration = (targetScore / 100) * 2500;
  const startTime = performance.now();
  let lastDisplayed = -1;

  function animateScore(now) {
    if (duration === 0) {
      scoreEl.innerText = targetScore + '%';
      isSabotaged ? triggerSabotageGlitch() : revealMsg();
      return;
    }
    const elapsed = now - startTime;
    const t0 = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - t0, 3);
    const current = Math.floor(eased * targetScore);
    scoreEl.innerText = current + '%';
    if (current !== lastDisplayed) {
      playSfx('typing', 0.4);
      hapticTick();
    }
    lastDisplayed = current;
    if (t0 < 1) {
      requestAnimationFrame(animateScore);
    } else {
      scoreEl.innerText = targetScore + '%';
      playSfx('target');
      hapticTarget();
      if (isSabotaged) triggerSabotageGlitch();
      else revealMsg();
    }
  }
  requestAnimationFrame(animateScore);

  function triggerSabotageGlitch() {
    // 1-bit glitch: corrupt the score counter with block chars, then snap to SABOTAGED
    const glitchFrames = ['█5%', '##%', '█%', '  %', '███'];
    let f = 0;
    const glitchTimer = setInterval(() => {
      scoreEl.innerText = glitchFrames[f % glitchFrames.length];
      f++;
      if (f >= 8) {
        clearInterval(glitchTimer);
        scoreEl.innerText = '—';
        scoreEl.style.color = '#ff4444';
        document.getElementById('res-msg').innerText = 'MISSION SABOTAGED';
        document.getElementById('res-msg').style.color = '#ff4444';
        document.getElementById('res-msg').style.visibility = '';
        // Show sabotage log after short pause
        setTimeout(() => animateLogRows(sabotageHTML), 400);
      }
    }, 120);
  }

  // Sabotage debriefing HTML
  const sabotageHTML = `
    <div class="res-row"><span class="res-row-label">An unidentified crew member has compromised the operation and absconded with all recovered assets.</span></div>
    <div class="res-divider"></div>
    <div class="res-row net"><span class="res-row-label">${t('netFinancialChange')}</span><span class="res-row-value">0 CR</span></div>
  `;

  function revealMsg() {
    document.getElementById('res-msg').style.visibility = '';
    // Small pause then start log typewriter
    setTimeout(() => animateLogRows(html), 200);
  }

  function animateLogRows(fullHtml) {
    const logEl = document.getElementById('res-log');
    const parser = new DOMParser();
    const doc = parser.parseFromString(`<div>${fullHtml}</div>`, 'text/html');
    const children = Array.from(doc.querySelector('div').childNodes);
    let i = 0;

    function smoothScroll() { logEl.scrollTop = logEl.scrollHeight; }

    function showNext() {
      if (i >= children.length) {
        document.getElementById('modal-btn').style.visibility = '';
        smoothScroll();
        return;
      }
      const node = children[i];
      const clone = node.cloneNode(true);

      if (clone.nodeType === Node.TEXT_NODE) {
        logEl.appendChild(clone); i++;
        smoothScroll();
        setTimeout(showNext, 0);
        return;
      }

      const fullText = clone.innerText || clone.textContent || '';

      // Divider — instant
      if (fullText.trim().length === 0) {
        logEl.appendChild(clone); i++;
        smoothScroll();
        setTimeout(showNext, 50);
        return;
      }

      // Batch all consecutive conflict lines together within 0.5s total
      if (clone.dataset && clone.dataset.conflict === 'true') {
        const conflictNodes = [];
        while (i < children.length) {
          const c = children[i];
          if (c.nodeType === Node.ELEMENT_NODE && c.dataset && c.dataset.conflict === 'true') {
            conflictNodes.push(c.cloneNode(true)); i++;
          } else break;
        }
        const total = conflictNodes.length;
        const perItem = Math.min(200, Math.round(500 / total));
        let ci = 0;
        function showConflict() {
          if (ci >= total) { setTimeout(showNext, 0); return; }
          logEl.appendChild(conflictNodes[ci++]);
          smoothScroll();
          setTimeout(showConflict, perItem);
        }
        showConflict();
        return;
      }

      // res-row with label + right-justified value
      const labelEl = clone.querySelector('.res-row-label');
      const valueEl = clone.querySelector('.res-row-value');
      if (labelEl && valueEl) {
        const fullLabel = labelEl.textContent;
        const fullValue = valueEl.textContent;
        labelEl.textContent = '';
        valueEl.textContent = '';
        logEl.appendChild(clone); i++;
        smoothScroll();
        const liveClone = logEl.lastElementChild;
        const liveLabelEl = liveClone.querySelector('.res-row-label');
        const liveValueEl = liveClone.querySelector('.res-row-value');
        typewriteElement(liveLabelEl, fullLabel, 0, () => {
          liveValueEl.textContent = fullValue;
          smoothScroll();
          setTimeout(showNext, 0);
        });
        return;
      }

      // Everything else (headers, fine detail) — typewrite full text
      clone.innerHTML = '';
      logEl.appendChild(clone); i++;
      smoothScroll();
      const liveEl = logEl.lastElementChild;
      typewriteElement(liveEl, fullText, 0, () => {
        smoothScroll();
        setTimeout(showNext, 0);
      });
    }
    showNext();
  }

  function typewriteElement(el, text, charIndex, onDone) {
    if (charIndex >= text.length) { onDone(); return; }
    el.textContent = text.slice(0, charIndex + 1);
    // 3-4 ticks for short text (<20 chars), 8-10 for longer — always within 0.2s total
    const ticks = text.length < 20 ? Math.floor(Math.random() * 2) + 3 : Math.floor(Math.random() * 3) + 8;
    const step = Math.max(1, Math.floor(text.length / ticks));
    if (charIndex % step === 0) { playSfx('typing', 0.5); hapticTick(); }
    const delay = 100 / Math.max(text.length, 1);
    setTimeout(() => typewriteElement(el, text, charIndex + 1, onDone), delay);
  }
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getPerformanceTier(avgScore) {
  if (avgScore >= 90) return 'excellent';
  if (avgScore >= 75) return 'good';
  if (avgScore >= 65) return 'acceptable';
  if (avgScore >= 55) return 'concerning';
  return 'catastrophic';
}

function buildCheckpointDialogue() {
  const log = state.missionLog;
  const last5 = log.slice(-5);
  const avg5 = last5.length ? Math.round(last5.reduce((s, m) => s + m.score, 0) / last5.length) : 0;
  const allSucc = log.filter(m => m.success).length;
  const allFail = log.filter(m => !m.success).length;
  const last5Succ = last5.filter(m => m.success).length;
  const last5Fail = last5.filter(m => !m.success).length;
  const allAvg = log.length ? Math.round(log.reduce((s, m) => s + m.score, 0) / log.length) : 0;
  // If fails exceed 1/3 of successes, drop tier one level
  const TIERS = ['excellent','good','acceptable','concerning','catastrophic'];
  let tier = getPerformanceTier(avg5);
  if (last5Fail > 0 && last5Succ === 0) {
    tier = 'catastrophic';
  } else if (last5Fail * 3 > last5Succ) {
    const idx = TIERS.indexOf(tier);
    if (idx < TIERS.length - 1) tier = TIERS[idx + 1];
  }

  // Top 3 species hired all time
  const hireEntries = Object.entries(state.allTimeHires).sort((a, b) => b[1] - a[1]);
  const topSpecies = hireEntries.slice(0, 3).map(([r]) => speciesName(r));
  const speciesStr = topSpecies.length >= 2
    ? topSpecies.slice(0, -1).join(', ') + ' and ' + topSpecies[topSpecies.length - 1]
    : topSpecies[0] || 'no one in particular';

  const GREETINGS = [
    'Sit down, Recruit. This will only take a moment.',
    'Recruit. Your five-day review is due.',
    'Welcome back. The Agency has compiled your recent decisions.',
    'Another five days completed. Let\'s review the damage.',
    'Time for your operational review.'
  ];

  const PERFORMANCE = {
    excellent: [
      'Your results are unusually competent.\nWe try not to encourage this, but well done.',
      'A very strong performance.\nPlease avoid becoming complacent.',
      'The numbers look good.\nThe Agency appreciates predictable competence.',
      'You are exceeding expectations.\nThis makes accounting considerably easier.'
    ],
    good: [
      'Solid work so far.\nNothing alarming has occurred.',
      'Your results are above average.\nTry to keep them there.',
      'The Agency is satisfied with this level of performance.',
      'A stable record. Continue.'
    ],
    acceptable: [
      'Adequate results.\nThere is room for improvement.',
      'The outcomes are acceptable, if uninspiring.',
      'Nothing catastrophic so far. That is encouraging.',
      'A mixed record. You may want to review your hiring decisions.'
    ],
    concerning: [
      'Your results are… inconsistent.',
      'Several missions have underperformed.\nWe recommend reading the contracts more carefully.',
      'Your conflict management could improve.',
      'The Agency has noticed a pattern of avoidable failures.'
    ],
    catastrophic: [
      'These results are difficult to defend.',
      'Your decisions are becoming expensive.',
      'The Agency is reviewing whether continued investment is justified.',
      'You are approaching levels of inefficiency usually associated with sabotage.\nWe would recommend improvement.'
    ]
  };

  const showAllTime = state.day >= 10;
  const allTimeLine = showAllTime ? `All-time average: ${allAvg}%\n` : '';
  const STATS_LINES = [
    `Your average success rate from the past 5 days is ${avg5}%.\n\n${allTimeLine}Missions succeeded: ${last5Succ}\nMissions failed: ${last5Fail}.`,
    `Over the last five days, your average success rate was ${avg5}%.\n\n${allTimeLine}Missions succeeded: ${last5Succ}\nMissions failed: ${last5Fail}.`,
    `Your recent performance averages at ${avg5}% over the past five days.\n\n${allTimeLine}Missions succeeded: ${last5Succ}\nMissions failed: ${last5Fail}.`
  ];

  const SPECIES_LINES = [
    `You appear to favour ${speciesStr}.`,
    `Your hiring patterns suggest a preference for ${speciesStr}.`,
    `We notice a recurring reliance on ${speciesStr}.`,
    `Your recruitment habits favour ${speciesStr}.\nDiversification may reduce future incidents.`
  ];

  const PROFIT_LINES = [
    ``, ``, ``, ``
  ];

  const ADVICE = [
    'Consider reviewing species compatibility before hiring.',
    'Conflicts are avoidable with minimal research.',
    'Larger crews tend to perform more reliably.',
    'High HATE applicants should be used cautiously.',
    'Meeting mission requirements is generally recommended.',
    'Contracts should be read before launching ships.'
  ];

  const CLOSINGS = [
    'That will be all.',
    'Try to maintain this level of competence.',
    'We will review your progress again soon.',
    'Return to your workstation.',
    'The Agency is watching your numbers.'
  ];

  const parts = [
    pick(GREETINGS),
    pick(PERFORMANCE[tier]),
    pick(STATS_LINES),
    topSpecies.length > 0 ? pick(SPECIES_LINES) : null,
    pick(PROFIT_LINES),
    tier !== 'excellent' ? pick(ADVICE) : null,
    pick(CLOSINGS)
  ].filter(Boolean);

  return parts.join('\n\n');
}

let checkpointTypewriterTimer = null;

function showCheckpoint(onDone) {
  const overlay = document.getElementById('checkpoint-overlay');
  const textEl = document.getElementById('checkpoint-text');
  const btnRow = document.getElementById('checkpoint-btn-row');
  const btn = document.getElementById('checkpoint-btn');

  textEl.textContent = '';
  btnRow.classList.add('hidden');
  overlay.classList.add('visible');

  const fullText = buildCheckpointDialogue();

  // Set image based on tier
  const last5 = state.missionLog.slice(-5);
  const avg5 = last5.length ? Math.round(last5.reduce((s, m) => s + m.score, 0) / last5.length) : 0;
  const tier = getPerformanceTier(avg5);
  const imgMap = { excellent: 'review_very_good', good: 'review_very_good', acceptable: 'review_neutral', concerning: 'review_very_bad', catastrophic: 'review_very_bad' };
  document.getElementById('checkpoint-img').src = `images/${imgMap[tier]}.png`;

  let i = 0;
  const delay = 30;

  if (checkpointTypewriterTimer) clearInterval(checkpointTypewriterTimer);
  checkpointTypewriterTimer = setInterval(() => {
    if (i >= fullText.length) {

      btnRow.classList.remove('hidden');
      btn.onclick = function() {

      const scrollEl = document.getElementById('checkpoint-scroll');
      scrollEl.scrollTo({ top: scrollEl.scrollHeight, behavior: 'smooth' });
      return;
    }
    textEl.textContent = fullText.slice(0, i + 1);
    // Typing sound on printable chars, skip newlines
    if (fullText[i] !== '\n' && i % 3 === 0) playSfx('typing', 0.4);
    document.getElementById('checkpoint-scroll').scrollTop = 999999;
    i++;
  }, delay);
}

// Bounce button then run callback after animation
function haptic(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}
function hapticTick()   { haptic(2); }   // very mild — typewriting / counter
function hapticTarget() { haptic([8, 20, 8]); } // two gentle pulses — threshold reached

function bounceThen(btn, callback) {

// ── AUDIO (Web Audio API — works on iOS) ──
let audioCtx = null;
let gainNode = null;
let audioSourceCreated = false;
let fadeTimer = null;

// Resume AudioContext when app returns to foreground (iOS/Android backgrounding fix)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
});

// ── SFX SYSTEM — Audio element pool (reliable on iOS/Android) ──
const SFX_FILES = {
  button:       'sound/button.m4a',
  page1:        'sound/page1.m4a',
  page2:        'sound/page2.m4a',
  page3:        'sound/page3.m4a',
  page4:        'sound/page4.m4a',
  opening:      'sound/opening.m4a',
  select_card:  'sound/select_card.m4a',
  unselect_card:'sound/unselect_card.m4a',
  typing:       'sound/typing.m4a',
  target:       'sound/target.m4a',
  menu_open:    'sound/menu_open.m4a',
  menu_close:   'sound/menu_close.m4a',
  wrong:        'sound/wrong.m4a',
};

// Pool of Audio elements per key — allows overlapping playback
const sfxPool = {};

function preloadSfx() {
  Object.keys(SFX_FILES).forEach(key => {
    const pool = [];
    // 3 instances per sound — enough for overlapping taps/ticks
    for (let i = 0; i < 3; i++) {
      const a = new Audio(SFX_FILES[key]);
      a.preload = 'auto';
      a.load();
      pool.push(a);
    }
    pool._idx = 0;
    sfxPool[key] = pool;
  });
}

function playSfx(key, volume, rate) {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (!SFX_FILES[key]) return;
  const pool = sfxPool[key];
  if (!pool || pool.length === 0) return;
  // Round-robin through pool to allow overlapping playback
  const a = pool[pool._idx % pool.length];
  pool._idx = (pool._idx + 1) % pool.length;
  a.currentTime = 0;
  a.volume = (volume !== undefined) ? volume : 1;
  a.playbackRate = (rate !== undefined) ? rate : 1;
  a.play().catch(() => {});
}

function playSfxPage() {
  const pages = ['page1','page2','page3','page4'];
  playSfx(pages[Math.floor(Math.random() * pages.length)]);
}

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.7;
    gainNode.connect(audioCtx.destination);
  }
  return audioCtx;
}

function playTheme() {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
  gainNode.gain.cancelScheduledValues(ctx.currentTime);
  gainNode.gain.setValueAtTime(0.7, ctx.currentTime);

  const audio = document.getElementById('theme-audio');
  // Connect source only once — MediaElementSource can't be recreated
  if (!audioSourceCreated) {
    const src = ctx.createMediaElementSource(audio);
    src.connect(gainNode);
    audioSourceCreated = true;
  }
  audio.currentTime = 0;
  audio.loop = true;
  audio.play().catch(() => {});
}

function stopTheme() {
  if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
  const audio = document.getElementById('theme-audio');
  audio.pause();
  audio.currentTime = 0;
  if (gainNode && audioCtx) {
    gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.7, audioCtx.currentTime);
  }
}

function fadeOutTheme(duration) {
  if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
  const ctx = getAudioCtx();
  const audio = document.getElementById('theme-audio');
  gainNode.gain.cancelScheduledValues(ctx.currentTime);
  gainNode.gain.setValueAtTime(gainNode.gain.value, ctx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + duration / 1000);
  fadeTimer = setTimeout(() => {
    audio.pause();
    audio.currentTime = 0;
    gainNode.gain.cancelScheduledValues(ctx.currentTime);
    gainNode.gain.setValueAtTime(0.7, ctx.currentTime);
    fadeTimer = null;
  }, duration);
}

function startTypewriter() {
  const el = document.getElementById('welcome-lore-text');
  el.innerHTML = '';
  const fullText = LANG[currentLang].lore.join('\n');
  let i = 0;
  if (typewriterTimer) clearInterval(typewriterTimer);
  typewriterTimer = setInterval(() => {
    if (i >= fullText.length) { clearInterval(typewriterTimer); return; }
    const ch = fullText[i];
    if (ch === '\n') {
      el.innerHTML += '<br>';
    } else {
      el.appendChild(document.createTextNode(ch));
    }
    i++;
  }, 30);
}

function pixelFadeIn(onComplete) {
  const canvas = document.getElementById('pixel-transition');
  const W = window.innerWidth;
  const H = window.innerHeight;
  const TILE = 8;
  const cols = Math.ceil(W / TILE);
  const rows = Math.ceil(H / TILE);
  const total = cols * rows;

  // Only init canvas if not already primed
  if (canvas.style.display !== 'block') {
    canvas.width = cols;
    canvas.height = rows;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, cols, rows);
  }

  const ctx = canvas.getContext('2d');

  // Create shuffled list of all pixel blocks
  const tiles = Array.from({ length: total }, (_, i) => i);
  for (let i = tiles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }

  const batchSize = Math.max(1, Math.floor(total / 40));
  let revealed = 0;

  function step() {
    const end = Math.min(revealed + batchSize, total);
    ctx.clearRect(0, 0, cols, rows);
    ctx.fillStyle = '#000';
    for (let i = end; i < total; i++) {
      const t = tiles[i];
      ctx.fillRect(t % cols, Math.floor(t / cols), 1, 1);
    }
    revealed = end;
    if (revealed < total) {
      requestAnimationFrame(step);
    } else {
      canvas.style.display = 'none';
      if (onComplete) onComplete();
    }
  }
  requestAnimationFrame(step);
}

function goToSplash() {
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }

  // Apply language to all screens
  const L = LANG[currentLang];
  document.getElementById('btn-splash-text').innerText = L.newCareer;
  document.getElementById('btn-welcome-text').innerText = L.continue;
  document.getElementById('modal-btn-text').innerText = L.nextDay;
  document.querySelector('#btn-launch .launch-btn-text').innerText = L.launch;

  // Re-render cards and UI with selected language
  updateUI();

  preloadSfx();
  playTheme();

  const canvas = document.getElementById('pixel-transition');
  const W = window.innerWidth;
  const H = window.innerHeight;
  const TILE = 8;
  const cols = Math.ceil(W / TILE);
  const rows = Math.ceil(H / TILE);

  // Prime canvas as solid black cover BEFORE any DOM changes
  canvas.width = cols;
  canvas.height = rows;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cols, rows);

  // Now safe to swap screens — canvas covers the transition
  requestAnimationFrame(() => {
    document.getElementById('screen-pre').classList.add('hidden');
    document.getElementById('screen-welcome').classList.add('hidden');
    document.getElementById('screen-splash').classList.remove('hidden');
    document.getElementById('intro-cover').classList.add('gone');

    // Now animate the dissolve
    pixelFadeIn(null);
  });
}

function goToWelcome() {
  document.getElementById('screen-splash').classList.add('hidden');
  document.getElementById('screen-welcome').classList.remove('hidden');
  startTypewriter();
}

function goToGame() {
  document.getElementById('screen-welcome').classList.add('hidden');
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }

  // Stop theme instantly, play menu_close 2x as sheet appears
  stopTheme();
  playSfx('menu_close', 1, 2);

  // Prep game background
  document.body.style.backgroundColor = '#fff';
  document.body.style.backgroundImage = 'radial-gradient(circle, #ccc 1px, transparent 1px)';
  document.body.style.backgroundSize = '16px 16px';

  // Bars start off-screen via transform (already set in CSS), just make visible
  document.getElementById('top-bar').style.visibility = '';
  // scroll-area hidden until rules dismissed
  document.getElementById('scroll-area').style.visibility = 'hidden';
  document.getElementById('bottom-bar').style.visibility = '';

  // Remove cover so game renders behind rules screen
  document.getElementById('intro-cover').classList.add('gone');

  // Show rules screen
  document.getElementById('screen-rules').classList.remove('hidden');
  initRulesSheet();
}

function fixScrollPadding() {
  const bb = document.getElementById('bottom-bar');
  const sa = document.getElementById('scroll-area');
  if (!bb || !sa) return;
  const bbH = bb.getBoundingClientRect().height;
  sa.style.paddingBottom = (bbH + 24) + 'px';
}

function setStatusBar(mode) {
  const themeColor = mode === 'dark' ? '#000000' : '#ffffff';
  const appleStyle = mode === 'dark' ? 'black' : 'default';
  document.getElementById('meta-theme-color').setAttribute('content', themeColor);
  document.getElementById('meta-apple-status').setAttribute('content', appleStyle);
  document.documentElement.style.backgroundColor = themeColor;
  document.body.style.backgroundColor = themeColor;
}

function goToGameForReal() {
  const rulesScreen = document.getElementById('screen-rules');
  const topBar = document.getElementById('top-bar');
  const bottomBar = document.getElementById('bottom-bar');
  const scrollArea = document.getElementById('scroll-area');
  const barsAlreadyIn = topBar.classList.contains('slid-in');

  // Step 1: slide sheet down and out
  playSfx('opening');
  rulesScreen.classList.add('slide-out');

  rulesScreen.addEventListener('transitionend', () => {
    rulesScreen.classList.add('hidden');
    rulesScreen.classList.remove('slide-out');
    document.getElementById('intro-cover').classList.add('gone');

    if (barsAlreadyIn) {
      // Day 2+: bars already visible, just reveal cards
      fixScrollPadding();
      scrollArea.style.visibility = '';
    } else {
      // Day 1: bars slide in for first time
      topBar.classList.add('slid-in');
      bottomBar.classList.add('slid-in');
      topBar.addEventListener('transitionend', () => {
        fixScrollPadding();
        scrollArea.style.visibility = '';
      }, { once: true });
    }
  }, { once: true });
}

function acknowledgeIntro() {
  // no-op — acknowledge flow replaced by rules sheet
}



// When returning from game over, restore intro-cover then pixel fade
function goToSplashFromGame() {
  document.body.style.backgroundColor = '#000';
  document.body.style.backgroundImage = 'none';
  // Reset bars back off-screen (no transition during reset)
  const topBar = document.getElementById('top-bar');
  const bottomBar = document.getElementById('bottom-bar');
  topBar.style.transition = 'none';
  bottomBar.style.transition = 'none';
  topBar.classList.remove('slid-in');
  bottomBar.classList.remove('slid-in');
  document.getElementById('scroll-area').style.visibility = 'hidden';
  document.getElementById('intro-cover').classList.remove('gone');
  document.getElementById('screen-splash').classList.add('hidden');
  document.getElementById('screen-welcome').classList.add('hidden');
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  playTheme();
  requestAnimationFrame(() => {
    // Re-enable transitions after a frame
    requestAnimationFrame(() => {
      topBar.style.transition = '';
      bottomBar.style.transition = '';
    });
    pixelFadeIn(() => {
      document.getElementById('intro-cover').classList.add('gone');
      document.getElementById('screen-splash').classList.remove('hidden');
    });
  });
}


// INIT
startDay();

// ══════════════════════════════════════════════
// RULES SHEET (Mission Briefing — shown every day)
// ══════════════════════════════════════════════
(function() {
  let rulesPage = 1;
  let RULES_TOTAL = 2;

  const BASE_SIZE = 24;
  const SHRINK_SIZE = 16;
  const MAX_SIZE = 196;
  let activeDrag = null;
  let startX = 0;

  function generateSteps(size, isLeft) {
    let path = '';
    for (let i = 0; i < size; i += 2) {
      let x = isLeft ? (size - 2 - i) : i;
      let y = size - 2 - i;
      path += `M${x} ${y} h2 v2 h-2 z `;
    }
    return path;
  }

  function updateCornerVisuals(side, size) {
    const icon = document.getElementById(`rules-icon-${side}`);
    if (!icon) return;
    icon.style.width = size + 'px';
    icon.style.height = size + 'px';
    const svg = document.getElementById(`rules-svg-${side}`);
    svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
    const path = document.getElementById(`rules-path-${side}`);
    path.setAttribute('d', generateSteps(size, side === 'prev'));
  }

  function buildMissionPage(pageEl) {
    const m = state.mission;
    const s = state.ship;
    const reqStr = m.reqs.map(r => `${t(r)} ${m.targets[r]}`).join(', ');
    const rawTitle = m.title.charAt(0).toUpperCase() + m.title.slice(1).toLowerCase();
    const mType = missionTypeName(m.type);
    const missionLabel = `${mType}: ${missionTitle(rawTitle)}`;
    pageEl.innerHTML = `
      <div class="rules-briefing-header">
        <span class="rules-briefing-day">${t('day').toUpperCase()} ${state.day}</span>
        <span class="rules-briefing-sub">${t('missionBriefing')}</span>
      </div>
      <div class="rules-divider"></div>
      <div class="rules-mission-title">${missionLabel}</div>
      <div class="rules-flat-row"><span class="rules-flat-label">${t('requirements')}</span><span class="rules-flat-value">${reqStr}</span></div>
      ${m.expReq ? `<div class="rules-flat-row"><span class="rules-flat-label">${t('experienceReq')}</span><span class="rules-flat-value">1 ${roleName(m.expReq)}</span></div>` : ''}
      <div class="rules-flat-row"><span class="rules-flat-label">${t('minSuccess')}</span><span class="rules-flat-value">${m.minReq}%</span></div>
      <div class="rules-flat-row"><span class="rules-flat-label">${t('minCrew')}</span><span class="rules-flat-value">${s.min}</span></div>
      <div class="rules-flat-row"><span class="rules-flat-label">${t('maxCrew')}</span><span class="rules-flat-value">${s.max}</span></div>
      <div class="rules-flat-row"><span class="rules-flat-label">${t('reward')}</span><span class="rules-flat-value">${m.reward} CR</span></div>
    `;
  }

  function buildShipPage(pageEl) {
    const s = state.ship;
    const shipSrc = `images/ships_${(s.base || s.name).toLowerCase().replace(/\s+/g, '_')}.png`;

    pageEl.innerHTML = `
      <div class="rules-briefing-header">
        <span class="rules-briefing-day">${t('day').toUpperCase()} ${state.day}</span>
        <span class="rules-briefing-sub">${t('yourShip')}</span>
      </div>
      <div class="rules-divider"></div>
      <div class="rules-ship-section">
        <img class="rules-ship-img" src="${shipSrc}" onerror="this.style.display='none'">
        <div class="rules-ship-name">${s.name}</div>
      </div>
    `;
  }

  function buildNewSpeciesPage(pageEl) {
    const prevUnlocked = state.day > 1 ? new Set(getUnlockedSpeciesForDay(state.day - 1)) : new Set();
    const newSpecies = getUnlockedSpeciesForDay(state.day).filter(r => !prevUnlocked.has(r));

    const rows = newSpecies.map(r => {
      const rd = RACES[r];
      const icon = rd ? rd.icon : '';
      const hateNames = rd ? rd.hates.map(h => speciesName(h)).join(', ') : '';
      const shortDesc = (rd ? (rd.shortDesc || '') : '').replace(/\s*\[.*?\]/g, '').trim();
      const fullDesc = rd ? (rd.desc || '') : '';
      // Hate context = full desc minus the shortDesc opening
      const hateContext = (fullDesc.startsWith(shortDesc)
        ? fullDesc.slice(shortDesc.length).trim()
        : fullDesc).replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      return `<div class="rules-newsp-row">
        <div class="rules-newsp-name-row">
          <img class="rules-newsp-icon" src="${icon}" onerror="this.style.display='none'">
          <span class="rules-newsp-name">${speciesName(r).toUpperCase()}</span>
        </div>
        <div class="rules-newsp-desc">${shortDesc}</div>
        <div class="rules-newsp-hates">${t('hates')} <strong>${hateNames}</strong></div>
        ${hateContext ? `<div class="rules-newsp-hatecontext">${hateContext}</div>` : ''}
      </div>`;
    }).join('');

    pageEl.innerHTML = `
      <div class="rules-briefing-header">
        <span class="rules-briefing-day">${t('day').toUpperCase()} ${state.day}</span>
        <span class="rules-briefing-sub">${t('newSpeciesApplying').toUpperCase()}</span>
      </div>
      <div class="rules-divider"></div>
      <div class="rules-newsp-list">${rows}</div>
    `;
  }

  function buildSaboteurWarningPage(pageEl) {
    pageEl.innerHTML = `
      <div class="rules-briefing-header">
        <span class="rules-briefing-day">${t('day').toUpperCase()} ${state.day}</span>
        <span class="rules-briefing-sub">AGENCY ALERT</span>
      </div>
      <div class="rules-divider"></div>
      <ul>
        <li>Intelligence has reached the Agency that rival syndicates are attempting to place operatives aboard contracted vessels.</li>
        <li>We have no reliable method of identifying them.</li>
        <li>Stay alert.</li>
      </ul>
    `;
  }

  function buildExpMandatePage(pageEl) {
    pageEl.innerHTML = `
      <div class="rules-briefing-header">
        <span class="rules-briefing-day">${t('day').toUpperCase()} ${state.day}</span>
        <span class="rules-briefing-sub">NEW DIRECTIVE</span>
      </div>
      <div class="rules-divider"></div>
      <ul>
        <li>Effective immediately, certain clients are specifying crew <strong>experience requirements</strong> alongside standard performance metrics.</li>
        <li>When an <strong>EXPERIENCE REQ</strong> is listed, assign at least one crew member with the requested classification. Failure to comply will result in a formal performance penalty.</li>
      </ul>
    `;
  }

  function populateSheetContent() {
    // Clear all pages first
    for (let i = 1; i <= 6; i++) {
      const p = document.getElementById('rules-page-' + i);
      if (p) p.innerHTML = '';
    }

    if (state.day === 1) {
      // Day 1: 5 pages — cover, rules 1-2 (merged), mission briefing, ship
      document.getElementById('rules-page-1').innerHTML = `
        <div style="margin-top: 60px; text-align: center; font-family: 'VT323', monospace; font-size: 26px; font-weight: bold; line-height: 1.3;">
          ${t('rulesAndBriefing')}
        </div>
        <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">
          <img src="images/doc_icon.png" style="width:80px;height:80px;image-rendering:pixelated;display:block;" onerror="this.style.display='none'">
        </div>
      `;
      document.getElementById('rules-page-2').innerHTML = `
        <ul>
          <li>${t('rule1')}</li>
          <li>${t('rule2')}</li>
          <li>${t('rule3')}</li>
        </ul>
      `;
      document.getElementById('rules-page-3').innerHTML = `
        <ul>
          <li>${t('rule4')}</li>
          <li>${t('rule5')}</li>
          <li>${t('rule6')}</li>
        </ul>
        <div style="position: absolute; bottom: 0px; left: 0; right: 0; font-family: 'VT323', monospace; font-size: 18px; line-height: 1.4; color: #000;">${t('rulesClosing')}</div>
      `;
      document.getElementById('rules-page-4').innerHTML = '';
      buildMissionPage(document.getElementById('rules-page-4'));
      buildShipPage(document.getElementById('rules-page-5'));
    } else {
      // Day 2+: pages depend on new species and exp mandate introduction
      const prevUnlocked = new Set(getUnlockedSpeciesForDay(state.day - 1));
      const hasNewSpecies = getUnlockedSpeciesForDay(state.day).some(r => !prevUnlocked.has(r));
      const isExpMandateDay = state.day === 10;

      const isSaboteurDay = state.day === 15;

      if (isExpMandateDay && isSaboteurDay) {
        // Both on same day (shouldn't happen but handle gracefully)
        RULES_TOTAL = hasNewSpecies ? 5 : 4;
        buildExpMandatePage(document.getElementById('rules-page-1'));
        buildSaboteurWarningPage(document.getElementById('rules-page-2'));
        buildMissionPage(document.getElementById('rules-page-3'));
        buildShipPage(document.getElementById('rules-page-4'));
        if (hasNewSpecies) buildNewSpeciesPage(document.getElementById('rules-page-5'));
      } else if (isExpMandateDay) {
        RULES_TOTAL = hasNewSpecies ? 4 : 3;
        buildExpMandatePage(document.getElementById('rules-page-1'));
        buildMissionPage(document.getElementById('rules-page-2'));
        buildShipPage(document.getElementById('rules-page-3'));
        if (hasNewSpecies) buildNewSpeciesPage(document.getElementById('rules-page-4'));
      } else if (isSaboteurDay) {
        RULES_TOTAL = hasNewSpecies ? 4 : 3;
        buildSaboteurWarningPage(document.getElementById('rules-page-1'));
        buildMissionPage(document.getElementById('rules-page-2'));
        buildShipPage(document.getElementById('rules-page-3'));
        if (hasNewSpecies) buildNewSpeciesPage(document.getElementById('rules-page-4'));
      } else {
        RULES_TOTAL = hasNewSpecies ? 3 : 2;
        buildMissionPage(document.getElementById('rules-page-1'));
        buildShipPage(document.getElementById('rules-page-2'));
        if (hasNewSpecies) buildNewSpeciesPage(document.getElementById('rules-page-3'));
      }
    }
  }

  function updateRulesUI() {
    document.getElementById('rules-page-text').innerText = `${rulesPage}/${RULES_TOTAL}`;
    document.querySelectorAll('.rules-page').forEach(p => p.classList.remove('active'));
    document.getElementById('rules-page-' + rulesPage).classList.add('active');

    // If this is the new species page, fit content by reducing spacing if needed
    if (rulesPage === RULES_TOTAL && RULES_TOTAL > 2) {
      const pageEl = document.getElementById('rules-page-' + rulesPage);
      const container = pageEl.closest('.rules-pages-container');
      const list = pageEl.querySelector('.rules-newsp-list');
      if (container && list) {
        let gap = 14, hateGap = 8;
        list.style.gap = gap + 'px';
        while (container.scrollHeight > container.clientHeight && (gap > 4 || hateGap > 2)) {
          if (gap > 4) gap = Math.max(4, gap - 2);
          if (hateGap > 2) hateGap = Math.max(2, hateGap - 1);
          list.style.gap = gap + 'px';
          pageEl.querySelectorAll('.rules-newsp-hates, .rules-newsp-hatecontext').forEach(el => {
            el.style.marginTop = hateGap + 'px';
          });
        }
      }
    }

    const showPrev = rulesPage > 1;
    document.getElementById('rules-zone-prev').style.display = showPrev ? 'block' : 'none';
    document.getElementById('rules-icon-prev').style.display = showPrev ? 'block' : 'none';

    const isLast = rulesPage === RULES_TOTAL;
    document.getElementById('rules-zone-next').style.display = isLast ? 'none' : 'block';
    document.getElementById('rules-icon-next').style.display = isLast ? 'none' : 'block';

    // Ack button: show once last page reached, never hide again
    const ackRow = document.getElementById('rules-ack-btn-row');
    if (ackRow && isLast) ackRow.classList.add('visible');
  }

  function nextRulesPage() {
    if (rulesPage < RULES_TOTAL) { rulesPage++; playSfxPage(); updateRulesUI(); }
  }

  function prevRulesPage() {
    if (rulesPage > 1) { rulesPage--; playSfxPage(); updateRulesUI(); }
  }

  function handlePointerDown(e, side) {
    if (activeDrag) return;
    activeDrag = side;
    startX = e.clientX;
    e.target.setPointerCapture(e.pointerId);
    updateCornerVisuals(side, SHRINK_SIZE);
  }

  function handlePointerMove(e) {
    if (!activeDrag) return;
    let deltaX = e.clientX - startX;
    let targetSize = SHRINK_SIZE;
    if (activeDrag === 'next') targetSize += -deltaX;
    else targetSize += deltaX;
    targetSize = Math.max(SHRINK_SIZE, Math.min(MAX_SIZE, targetSize));
    targetSize = Math.round(targetSize / 2) * 2;
    updateCornerVisuals(activeDrag, targetSize);
    if (targetSize >= MAX_SIZE) {
      const side = activeDrag;
      activeDrag = null;
      if (side === 'next') nextRulesPage();
      else prevRulesPage();
      updateCornerVisuals(side, BASE_SIZE);
    }
  }

  function handlePointerUp(e) {
    if (!activeDrag) return;
    const side = activeDrag;
    activeDrag = null;
    if (side === 'next') nextRulesPage();
    else prevRulesPage();
    updateCornerVisuals(side, BASE_SIZE);
  }

  window.initRulesSheet = function() {
    setStatusBar('light');
    rulesPage = 1;
    RULES_TOTAL = state.day === 1 ? 5 : 2; // day 2+ overridden in populateSheetContent
    // Reset ack button — starts hidden each day
    const ackRow = document.getElementById('rules-ack-btn-row');
    if (ackRow) ackRow.classList.remove('visible');
    document.getElementById('btn-ack-text').innerText = t('acknowledge').toUpperCase();
    populateSheetContent();
    updateCornerVisuals('prev', BASE_SIZE);
    updateCornerVisuals('next', BASE_SIZE);
    updateRulesUI();

    const zonePrev = document.getElementById('rules-zone-prev');
    const zoneNext = document.getElementById('rules-zone-next');
    const newPrev = zonePrev.cloneNode(true);
    const newNext = zoneNext.cloneNode(true);
    zonePrev.parentNode.replaceChild(newPrev, zonePrev);
    zoneNext.parentNode.replaceChild(newNext, zoneNext);

    newPrev.addEventListener('pointerdown', (e) => handlePointerDown(e, 'prev'));
    newPrev.addEventListener('pointermove', handlePointerMove);
    newPrev.addEventListener('pointerup', handlePointerUp);
    newPrev.addEventListener('pointercancel', handlePointerUp);

    newNext.addEventListener('pointerdown', (e) => handlePointerDown(e, 'next'));
    newNext.addEventListener('pointermove', handlePointerMove);
    newNext.addEventListener('pointerup', handlePointerUp);
    newNext.addEventListener('pointercancel', handlePointerUp);
  };

  window.acknowledgeRules = function() {
    goToGameForReal();
  };
})();
